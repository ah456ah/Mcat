<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{min-height:100%;width:100%;background:#0f0f14;color:#e8e6e3;overflow-x:hidden}
body{font-family:'SF Mono','Menlo','Fira Code',monospace;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
button{font-family:inherit;-webkit-tap-highlight-color:transparent;cursor:pointer;outline:none;border:none;background:none;color:inherit}
button:active{opacity:.85}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(128,128,128,.3);border-radius:2px}
.conf-bar{display:flex;gap:6px;margin:10px 0}
.conf-btn{flex:1;padding:10px 6px;border-radius:8px;font-size:inherit;font-weight:600;text-align:center;border:1.5px solid var(--conf-border,rgba(255,255,255,.1));background:var(--conf-bg,rgba(255,255,255,.03));color:var(--conf-color,#e8e6e3)}
.conf-btn:active{border-color:var(--conf-active-border,#667eea);background:var(--conf-active-bg,rgba(102,126,234,.15))}
table{font-size:inherit}
.screen-fade{animation:screenFadeIn .15s ease-out}
@keyframes screenFadeIn{from{opacity:0}to{opacity:1}}
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:56px;display:flex;align-items:stretch;z-index:9999;border-top:1px solid var(--tab-border,rgba(255,255,255,.06));background:var(--tab-bg,rgba(15,15,20,.97));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding-bottom:env(safe-area-inset-bottom)}
.tab-bar button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--tab-color,#888);font-size:9px;font-weight:600;letter-spacing:.5px;transition:color .15s,transform .15s;font-family:inherit}
.tab-bar button.active{color:#667eea;transform:scale(1.05)}
.tab-bar button .tab-icon{font-size:20px;line-height:1}
.settings-slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:var(--slider-bg,rgba(255,255,255,.1));outline:none}
.settings-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#667eea;cursor:pointer;border:2px solid rgba(255,255,255,.2)}
.pill-selector{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding:2px 0}
.pill-selector::-webkit-scrollbar{display:none}
.pill-btn{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid var(--pill-border,rgba(255,255,255,.1));background:var(--pill-bg,transparent);color:var(--pill-color,#888);transition:all .15s}
.pill-btn.active{background:rgba(102,126,234,.15);border-color:rgba(102,126,234,.5);color:#667eea}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mode-card{padding:14px 12px;border-radius:12px;text-align:left;border:1px solid var(--card-border,rgba(255,255,255,.06));background:var(--card-bg,rgba(255,255,255,.03));transition:border-color .15s}
.mode-card:active{border-color:#667eea}
.progress-ring-container{position:relative;display:inline-flex;align-items:center;justify-content:center}
.progress-ring-text{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center}
/* V17: AI animated dots */
.ai-dots{display:inline-flex;gap:3px}
.ai-dots::before,.ai-dots::after,.ai-dots .d{content:'';width:6px;height:6px;border-radius:50%;background:#667eea;animation:aiDot .8s infinite}
.ai-dots::after{animation-delay:.2s}
.ai-dots::before{animation-delay:.4s}
@keyframes aiDot{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
/* V18: Flip card */
.fc-inner.fc-flipped{transform:rotateY(180deg)}
.fc-face{box-sizing:border-box}
/* V18: Notes panel slide */
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fG{0%,100%{box-shadow:inset 0 0 0 2000px transparent}50%{box-shadow:inset 0 0 0 2000px rgba(74,222,128,.08)}}
@keyframes sS{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes sU{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pI{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fI{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes gI{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
</style>
