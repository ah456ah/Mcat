const COL = "mcatquest";
async function loadFromCloud(p) {
  try {
    var timeoutPromise = new Promise(function(_, reject) {
      setTimeout(function() { reject(new Error("timeout")); }, 8000);
    });
    var fetchPromise = db.collection(COL).doc(p).get().then(function(d) {
      if (d.exists) return d.data();
      return null;
    });
    return await Promise.race([fetchPromise, timeoutPromise]);
  } catch (e) {
    console.log("loadFromCloud error:", e.message);
    return null;
  }
}
async function saveToCloud(p, d) {
  try {
    var timeoutPromise = new Promise(function(_, reject) {
      setTimeout(function() { reject(new Error("timeout")); }, 8000);
    });
    var savePromise = db.collection(COL).doc(p).set(d);
    await Promise.race([savePromise, timeoutPromise]);
    return true;
  } catch (e) {
    console.log("saveToCloud error:", e.message);
    return false;
  }
}
function getSavedPin() {
  try {
    return localStorage.getItem("mcat_pin") || "";
  } catch (e) {
    return "";
  }
}
function rememberPin(p) {
  try {
    localStorage.setItem("mcat_pin", p);
  } catch (e) {}
}

return data.questionStats[qid] && data.questionStats[qid].nextReview || 0;
}
function isDueForReview(data, qid) {
const nr = getNextReview(data, qid);
return nr === 0 || Date.now() >= nr;
}
function updateBox(data, qid, correct) {
const st = data.questionStats[qid] || {
seen: 0,
correct: 0,
box: 1,
nextReview: 0,
lastSeen: 0,
streak: 0,
confHistory: []
};
const newBox = correct ? Math.min(st.box + 1, 5) : 1;
const days = BOX_INTERVALS[newBox];
return {
…st,
box: newBox,
nextReview: Date.now() + days * 86400000
};
}
function getDueCount(data) {
return QS.filter(q => isDueForReview(data, q.id)).length;
