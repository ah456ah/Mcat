async function loadFromCloud(p) {
  try {
    var tp = new Promise(function (_, rej) {
      setTimeout(function () {
        rej(new Error("timeout"));
      }, 8000);
    });
    var fp = db.collection(COL).doc(p).get().then(function (d) {
      if (d.exists) return d.data();
      return null;
    });
    return await Promise.race([fp, tp]);
  } catch (e) {
    return null;
  }
}
async function saveToCloud(p, d) {
  try {
    var tp = new Promise(function (_, rej) {
      setTimeout(function () {
        rej(new Error("timeout"));
      }, 8000);
    });
    await Promise.race([db.collection(COL).doc(p).set(d), tp]);
    return true;
  } catch (e) {
    return false;
  }
}
function getSavedPin() {

    return localStorage.getItem("mcat_pin") || "";
  } catch (e) {
    return "";

}
function rememberPin(p) {
  try {
    localStorage.setItem("mcat_pin", p);

  mn: "Rough = ribosomes = secretory/membrane proteins. Smooth = lipids + detox + Ca2+."
}, {
  id: "cb7",
  cat: "CELL_BIO",
  tags: ["Membrane Transport"],
  diff: 2,
  q: "Na+/K+ ATPase pumps:",
  o: ["3 Na+ out, 2 K+ in per ATP", "3 K+ out, 2 Na+ in", "Equal Na+ and K+", "Only Na+ out"],
  a: 0,
  ex: "The Na+/K+ ATPase is an electrogenic antiporter that uses 1 ATP to pump 3 Na+ OUT and 2 K+ IN. This creates: (1) the Na+ concentration gradient (high outside, low inside), (2) the K+ gradient (high inside, low outside), (3) a net negative resting membrane potential (~-70mV in neurons). These gradients are essential for nerve impulses, muscle contraction, and secondary active transport (Na+-glucose cotransporter).",
  mn: "3 Na+ out, 2 K+ in. Creates resting potential and drives secondary transport."
}, {
  id: "cb8",
  cat: "CELL_BIO",
  tags: ["Membrane Transport"],
  diff: 2,
  q: "Facilitated diffusion differs from active transport because:",
  o: ["It requires no ATP and moves DOWN the gradient", "It requires ATP", "It moves against the gradient", "It uses vesicles"],
  a: 0,
  ex: "Passive transport: down the concentration gradient, no energy. Includes simple diffusion (O2, CO2, steroid hormones cross membrane directly) and facilitated diffusion (needs a channel or carrier protein but still no ATP -- glucose via GLUT transporters, ions via channels). Active transport: against the gradient, requires energy. Primary active: directly uses ATP (Na+/K+ ATPase). Secondary active: uses gradient established by primary (Na+-glucose symporter).",
  mn: "Facilitated = protein-assisted but still passive (no ATP, downhill)."
}, {
  id: "cb9",
  cat: "CELL_BIO",
  tags: ["Signal Transduction"],
  diff: 3,
  q: "G-protein coupled receptors (GPCRs) activate:",
  o: ["G-proteins that trigger second messenger cascades", "Receptor tyrosine kinases", "Nuclear receptors directly", "Ion channels directly"],
  a: 0,
  ex: "GPCRs are the largest family of cell surface receptors. When a ligand binds, the receptor activates a G-protein (exchanges GDP for GTP). Two main pathways: (1) Gs activates adenylyl cyclase -> increases cAMP -> activates PKA. (2) Gq activates phospholipase C -> cleaves PIP2 into IP3 (releases Ca2+ from ER) + DAG (activates PKC). Gi inhibits adenylyl cyclase. Key GPCR examples: beta-adrenergic receptors (epinephrine), muscarinic ACh receptors, glucagon receptor.",
  mn: "GPCR -> G-protein -> second messengers (cAMP or IP3/DAG)"
}, {
  id: "pcb1",
  cat: "CELL_BIO",
  tags: ["Cell Cycle", "Tumor Suppressors", "Apoptosis"],
  diff: 3,
  pass: "p8",
  q: "G1/S arrest at low UV doses is mediated by:",
  o: ["p53 activating p21 to inhibit cyclin-CDK", "Increased ATP use", "Direct DNA pol inhibition", "Caspase activation"],
  a: 0,
  ex: "Low UV causes DNA damage (thymine dimers). This activates p53 -> p21 (CDK inhibitor) -> blocks cyclin-CDK -> halts G1/S transition for repair. At HIGH UV doses, damage is irreparable -> p53 triggers apoptosis via caspases instead. This demonstrates p53's dual role: damage cop (low damage = arrest) and executioner (high damage = death).",
  mn: "Low damage = p53 arrests (p21). High damage = p53 kills (caspases)."
},
// ============ GENETICS (12) ============
{

  cat: "GENETICS",

  q: "Two carriers (Aa x Aa) -- chance offspring is affected:",
  o: ["25%", "50%", "75%", "100%"],
  a: 0,
  ex: "Punnett square: AA(25%), Aa(50%), aa(25%). Only aa is affected = 25%. Among UNAFFECTED offspring, 2/3 are carriers. Autosomal recessive examples: cystic fibrosis, sickle cell, PKU, Tay-Sachs. For X-linked recessive: carrier mother x normal father = 50% of sons affected, 0% daughters affected.",
  mn: "Aa x Aa = 1:2:1 ratio. 1/4 affected, 2/4 carriers, 1/4 normal."
}, {
  id: "gen2",
  cat: "GENETICS",
  tags: ["Population Genetics", "Hardy-Weinberg"],
  diff: 2,
  q: "If q-squared = 0.0025, carrier frequency (2pq) is:",
  o: ["~9.5%", "5%", "0.5%", "25%"],
  a: 0,
  ex: "q^2 = 0.0025 -> q = 0.05 -> p = 0.95 -> 2pq = 2(0.95)(0.05) = 0.095 = 9.5%. Key insight: carriers (9.5%) vastly outnumber affected (0.25%). HW assumptions: large population, random mating, no selection/mutation/migration.",
  mn: "Carriers (2pq) always >> affected (q^2)."
}, {
  id: "gen3",
  cat: "GENETICS",
  tags: ["X-Linked Inheritance"],
  diff: 2,
  q: "X-linked recessive traits are expressed more in:",
  o: ["Males (one X, no backup)", "Females", "Equal in both", "Depends on environment"],
  a: 0,
  ex: "Males are hemizygous for X-linked genes (XY). One affected X = trait expressed. Females need two affected X's (homozygous). Examples: hemophilia A/B, color blindness, Duchenne muscular dystrophy, G6PD deficiency. Affected father passes X to ALL daughters (carriers) but NEVER to sons (sons get Y).",
  mn: "Males: one X, no backup. All daughters of affected father are carriers."
}, {
  id: "gen4",
  cat: "GENETICS",
  tags: ["Inheritance Patterns"],
  diff: 3,
  q: "Codominance vs incomplete dominance:",
  o: ["Codominance: both fully expressed. Incomplete: blended", "Both mean the same thing", "Codominance is blended", "Incomplete means one masks other"],
  a: 0,
  ex: "Codominance: BOTH alleles fully and separately expressed in heterozygote. Example: AB blood type (both A and B antigens present), sickle cell heterozygote (both HbA and HbS produced). Incomplete dominance: heterozygote shows INTERMEDIATE phenotype. Example: red x white = pink flowers. Key difference: codominance = both visible distinctly, incomplete = blend.",
  mn: "Codominance = both show (AB blood). Incomplete = blend (pink flowers)."
}, {
  id: "gen5",
  cat: "GENETICS",
  tags: ["Chromosomal Abnormalities"],
  diff: 2,
  q: "Meiosis I nondisjunction causes:",
  o: ["All 4 gametes to have wrong chromosome number", "Only 1 abnormal gamete", "Normal cells", "Polyploidy"],
  a: 0,
  ex: "Meiosis I: homologs fail to separate, both go to one cell. After meiosis II: 2 gametes are n+1, 2 are n-1. ALL FOUR are abnormal. Meiosis II nondisjunction: sisters fail to separate, only 2 of 4 gametes abnormal. If n+1 gamete fertilized: trisomy (Down=21, Edwards=18, Patau=13). If n-1: monosomy (Turner=45,X).",
  mn: "Meiosis I nondisjunction = all 4 wrong. Meiosis II = only 2 of 4."
}, {
  id: "gen6",
  cat: "GENETICS",
  tags: ["Mendelian Genetics"],
  diff: 2,
  q: "A testcross involves crossing an unknown genotype with:",
  o: ["A homozygous recessive (aa)", "A homozygous dominant (AA)", "Another heterozygote", "A different species"],
  a: 0,
  ex: "A testcross determines if an organism showing the dominant phenotype is AA or Aa. Cross with aa: if ALL offspring show dominant phenotype -> unknown is AA. If ~50% show recessive -> unknown is Aa. This works because aa can only contribute a recessive allele, so the offspring phenotype reveals the unknown parent's genotype.",
  mn: "Testcross = cross with aa to reveal unknown genotype."
}, {
  id: "pgen1",
  cat: "GENETICS",
  tags: ["Population Genetics", "Hardy-Weinberg"],
  diff: 3,
  pass: "p5",
  q: "Disease allele frequency (q) is:",
  o: ["0.05", "0.0025", "0.25", "0.5"],
  a: 0,
  ex: "25 affected / 10,000 = q^2 = 0.0025. q = sqrt(0.0025) = 0.05. This is the ALLELE frequency, not genotype frequency. Common mistake: confusing q^2 (genotype) with q (allele).",
  mn: "q^2 = affected proportion. q = square root."
}, {

  cat: "GENETICS",
  tags: ["Population Genetics", "Hardy-Weinberg"],
  diff: 3,
  pass: "p5",
  q: "Carriers in this population:",
  o: ["~950", "~25", "~500", "~5000"],
  a: 0,
  ex: "2pq = 2(0.95)(0.05) = 0.095. In 10,000 people: 950 carriers vs only 25 affected. For rare recessive diseases, the carrier pool is always much larger than the affected pool.",
  mn: "2pq x population = carriers. Always >> affected."
},

  q: "Hemoglobin's O2 curve is:",

  a: 0,
  ex: "Hb: 4 subunits (alpha2-beta2), cooperative binding -> sigmoidal (S-shaped) curve. Myoglobin: 1 subunit, no cooperativity -> hyperbolic. Hb's sigmoidal shape allows efficient loading in lungs (high PO2) and efficient unloading in tissues (low PO2).",

  q: "Right shift of Hb O2 curve is caused by:",

  a: 0,
  ex: "Right shift = decreased O2 affinity = release O2 to active tissues. Caused by conditions in metabolizing tissues: increased CO2 (Bohr effect), decreased pH (H+), increased temperature, increased 2,3-BPG. Left shift (hold O2 tighter): opposite conditions, fetal Hb (HbF), CO poisoning.",

  q: "Aldosterone's main effects:",

  a: 0,
  ex: "Aldosterone (adrenal cortex) acts on DCT/collecting duct principal cells. Increases Na+/K+ ATPase and ENaC channels. Na+ reabsorbed, K+ and H+ secreted. Water follows Na+ passively. Part of RAAS: low BP -> renin -> angiotensin II -> aldosterone. Hyperaldosteronism = hypertension + hypokalemia + metabolic alkalosis.",

  q: "T cells mature in the:",

  a: 0,
  ex: "T = Thymus (positive + negative selection for self-tolerance). B = Bone marrow. CD4+ = helper (activate others via cytokines). CD8+ = cytotoxic (kill infected/cancer cells). Treg = suppress immune response. Positive selection: must recognize self-MHC. Negative selection: must NOT react to self-antigens.",

}, {

  cat: "BIO_SYSTEMS",
  tags: ["Renal System"],

  q: "GFR is primarily regulated by:",

  a: 0,
  ex: "GFR controlled by adjusting afferent (arriving) and efferent (exiting) arteriole diameter. Dilate afferent OR constrict efferent -> increased GFR. RAAS: angiotensin II constricts efferent -> maintains GFR when BP low. NSAIDs block prostaglandins that dilate afferent -> can dangerously reduce GFR.",

}, {

  cat: "BIO_SYSTEMS",
  tags: ["Nervous System", "Action Potential"],
  diff: 2,
  q: "During an action potential, depolarization is caused by:",
  o: ["Na+ influx through voltage-gated Na+ channels", "K+ efflux", "Cl- influx", "Ca2+ efflux"],
  a: 0,
  ex: "Resting potential: ~-70mV (maintained by Na+/K+ ATPase and K+ leak channels). When threshold (-55mV) is reached: voltage-gated Na+ channels open -> Na+ rushes IN (down its electrochemical gradient) -> rapid depolarization to ~+30mV. Then Na+ channels inactivate and K+ channels open -> K+ flows OUT -> repolarization back to negative. Refractory period prevents backward signal propagation.",

}, {

  cat: "BIO_SYSTEMS",
  tags: ["Nervous System", "Neurotransmitters"],
  diff: 2,
  q: "The neurotransmitter at the neuromuscular junction is:",
  o: ["Acetylcholine (ACh)", "Norepinephrine", "Dopamine", "GABA"],
  a: 0,
  ex: "Motor neurons release ACh at the NMJ, which binds nicotinic receptors on skeletal muscle -> Na+ influx -> muscle contraction. ACh is rapidly degraded by acetylcholinesterase (AChE) in the synaptic cleft. Clinical relevance: myasthenia gravis = autoimmune antibodies against nicotinic ACh receptors -> muscle weakness. Organophosphates inhibit AChE -> ACh accumulates -> overstimulation.",
  mn: "NMJ always = ACh at nicotinic receptors. Myasthenia gravis = Ab against these receptors."

  tags: ["Endocrine System", "Hormones"],

  q: "Thyroid hormone's primary effect:",
  o: ["Increases basal metabolic rate", "Decreases heart rate", "Promotes fat storage", "Suppresses growth"],
  a: 0,
  ex: "Thyroid hormones (T3, T4) increase basal metabolic rate, O2 consumption, and heat production in nearly all tissues. T4 is the major circulating form; T3 is the active form (converted from T4 by deiodinases). Regulation: hypothalamus (TRH) -> anterior pituitary (TSH) -> thyroid (T3/T4) -> negative feedback on hypothalamus and pituitary. Hyper = Graves' disease. Hypo = Hashimoto's (autoimmune).",

}, {

  cat: "BIO_SYSTEMS",

  q: "MHC Class I presents antigens to:",

  a: 0,
  ex: "MHC I is on ALL nucleated cells. It presents intracellular (endogenous) antigens -- pieces of proteins being made inside the cell. If the cell is infected or cancerous, abnormal peptides appear on MHC I, flagging CD8+ T cells to kill. MHC II is on antigen-presenting cells only (dendritic cells, macrophages, B cells). It presents extracellular (exogenous) antigens to CD4+ helper T cells.",

}, {

  q: "Pepsin is active in the:",

  cat: "MOLECULAR_BIO",
