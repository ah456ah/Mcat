async function loadFromCloud(p) {
  try {
    var tp = new Promise(function (_, rej) {
      setTimeout(function () {
        rej(new Error("timeout"));
      }, 8000);
    });
    var fp = db.collection(COL).doc(p).get().then(function (d) {
      if (d.exists) return d.data();
      return null;
    });
    return await Promise.race([fp, tp]);
  } catch (e) {
    return null;
  }
}
async function saveToCloud(p, d) {
  try {
    var tp = new Promise(function (_, rej) {
      setTimeout(function () {
        rej(new Error("timeout"));
      }, 8000);
    });
    await Promise.race([db.collection(COL).doc(p).set(d), tp]);
    return true;
  } catch (e) {
    return false;
  }
}

// ==== METABOLISM ====
{
  id: "met1",

  tags: ["ATP yield", "aerobic respiration", "glycolysis", "oxidative phosphorylation"],

  q: "Net ATP from one glucose (aerobic):",
  o: ["30-32", "36-38", "2", "4"],
  a: 0,
  ex: "This is a classic MCAT trap. The OLD textbook answer was 36-38 ATP, but modern biochemistry has revised this to 30-32 ATP. The revision came from more accurate measurements of the P/O ratio (ATP produced per oxygen atom reduced). Here is the breakdown: Glycolysis produces 2 ATP + 2 NADH. The pyruvate dehydrogenase reaction produces 2 NADH (one per pyruvate). The Krebs cycle produces 2 GTP + 6 NADH + 2 FADH2 (per glucose, since 2 pyruvates enter). In oxidative phosphorylation, each NADH yields approximately 2.5 ATP and each FADH2 yields approximately 1.5 ATP. Totaling: 2 + 2(2.5) + 2(2.5) + 2(1) + 6(2.5) + 2(1.5) = 30-32. If you see 36-38 as an answer choice, it is almost certainly the trap.",
  mn: "30-32 ATP is the modern answer. 36-38 is the OLD number -- it is a trap answer."
}, {
  id: "met2",
  cat: "METABOLISM",
  tags: ["glycolysis", "PFK-1", "rate-limiting", "allosteric regulation"],
  diff: 2,
  q: "Rate-limiting enzyme of glycolysis:",
  o: ["PFK-1", "Hexokinase", "Pyruvate kinase", "Aldolase"],
  a: 0,
  ex: "Phosphofructokinase-1 (PFK-1) catalyzes fructose-6-phosphate to fructose-1,6-bisphosphate. This is the COMMITTED step of glycolysis -- once past PFK-1, the molecule is committed to being processed through glycolysis. Hexokinase is the first step, but glucose-6-phosphate (its product) has other possible fates: it can enter the pentose phosphate pathway or be used for glycogen synthesis. PFK-1 is heavily regulated by allosteric effectors: ACTIVATED by AMP (signals low energy), ADP, and fructose-2,6-bisphosphate (the most potent activator, made by PFK-2). INHIBITED by ATP (signals high energy) and citrate (signals Krebs cycle is backed up). This makes PFK-1 the master switch of glycolysis.",
  mn: "PFK-1 = the gatekeeper of glycolysis. AMP turns it ON, ATP turns it OFF."
}, {
  id: "met3",
  cat: "METABOLISM",
  tags: ["beta-oxidation", "fatty acids", "mitochondria", "carnitine shuttle", "CPT-1"],
  diff: 2,
  q: "Beta-oxidation occurs in:",
  o: ["Mitochondrial matrix", "Cytoplasm", "Smooth ER", "Peroxisomes only"],
  a: 0,
  ex: "Fatty acid breakdown (beta-oxidation) happens in the mitochondrial matrix, but getting the fatty acids there requires a special transport system called the carnitine shuttle. Step 1: Fatty acids are activated in the cytoplasm by acyl-CoA synthetase (costs 2 ATP equivalents). Step 2: The acyl group is transferred from CoA to carnitine by CPT-I (carnitine palmitoyltransferase I) on the outer mitochondrial membrane -- this is the RATE-LIMITING step. Step 3: Acyl-carnitine crosses the inner membrane. Step 4: CPT-II transfers acyl back to CoA in the matrix. Each cycle of beta-oxidation removes a 2-carbon acetyl-CoA unit and produces 1 FADH2 + 1 NADH. Key regulation: CPT-I is INHIBITED by malonyl-CoA (the first intermediate of fatty acid SYNTHESIS), ensuring the cell does not simultaneously make and break down fats.",
  mn: "Carnitine shuttle (CPT-I) is the gatekeeper. Malonyl-CoA blocks it."
}, {
  id: "met4",
  cat: "METABOLISM",
  tags: ["anaerobic", "lactate", "NAD+", "LDH", "fermentation"],
  diff: 2,
  q: "Pyruvate is converted to lactate primarily to:",
  o: ["Regenerate NAD+ for glycolysis", "Produce extra ATP", "Feed the Krebs cycle", "Store energy long-term"],
  a: 0,
  ex: "This is about understanding WHY cells make lactate, not just that they do. During anaerobic conditions (intense exercise, or in cells like red blood cells that lack mitochondria), the electron transport chain cannot run, so NADH cannot donate its electrons and NAD+ gets depleted. Glycolysis REQUIRES NAD+ at the glyceraldehyde-3-phosphate dehydrogenase (GAPDH) step. Without NAD+, glycolysis stops and the cell produces ZERO ATP. Lactate dehydrogenase (LDH) solves this by converting pyruvate to lactate while simultaneously oxidizing NADH back to NAD+. This allows glycolysis to continue producing 2 ATP per glucose -- not efficient, but enough to survive. The lactate is then exported to the blood and recycled to glucose in the liver (the Cori cycle).",
  mn: "No O2 means no ETC means NAD+ runs out. LDH recycles NAD+ so glycolysis can keep running."
}, {
  id: "met5",
  cat: "METABOLISM",
  tags: ["Krebs cycle", "TCA", "NADH", "FADH2", "GTP", "mitochondrial matrix"],
  diff: 2,
  q: "Products per turn of the Krebs cycle:",
  o: ["3 NADH + 1 FADH2 + 1 GTP", "2 NADH + 2 FADH2 + 1 GTP", "4 NADH + 1 FADH2", "1 NADH + 1 FADH2 + 2 GTP"],
  a: 0,
  ex: "Each turn of the Krebs cycle (also called TCA or citric acid cycle) processes one acetyl-CoA and produces: 3 NADH (at isocitrate dehydrogenase, alpha-ketoglutarate dehydrogenase, and malate dehydrogenase), 1 FADH2 (at succinate dehydrogenase, which is also Complex II of the ETC -- the only enzyme of the Krebs cycle embedded in the inner membrane), and 1 GTP (at succinyl-CoA synthetase, energetically equivalent to 1 ATP). Since each glucose generates 2 acetyl-CoA molecules, multiply everything by 2 for the per-glucose yield: 6 NADH, 2 FADH2, 2 GTP. The Krebs cycle occurs in the mitochondrial matrix.",
  mn: "Per turn: 3 NADH, 1 FADH2, 1 GTP. Per glucose: double everything."
}, {
  id: "met6",
  cat: "METABOLISM",
  tags: ["insulin", "fed state", "glycogen synthesis", "GLUT4"],
  diff: 2,
  q: "Insulin promotes:",
  o: ["Glycolysis and glycogen synthesis", "Gluconeogenesis", "Beta-oxidation", "Ketogenesis"],
  a: 0,
  ex: "Insulin is the 'fed state' hormone, released by pancreatic beta-cells when blood glucose rises after a meal. It tells the body: 'We have plenty of fuel -- store it and use glucose.' Insulin ACTIVATES: glycolysis (increases PFK-1/2 activity), glycogen synthesis (activates glycogen synthase), lipogenesis (fat synthesis), protein synthesis, and GLUT4 translocation (moves glucose transporters to the cell surface in muscle and adipose tissue so glucose can enter). Insulin INHIBITS: gluconeogenesis, glycogenolysis, lipolysis, ketogenesis, and proteolysis. Glucagon (from alpha-cells) does the opposite: it is the 'fasting state' hormone and mobilizes stored fuel.",
  mn: "Insulin = fed = STORE everything and USE glucose. Glucagon = fasting = MOBILIZE everything."
}, {
  id: "met7",
  cat: "METABOLISM",
  tags: ["glucagon", "liver", "glycogenolysis", "gluconeogenesis"],
  diff: 2,
  q: "Glucagon primarily targets:",
  o: ["Liver", "Skeletal muscle", "Brain", "Adipose tissue"],
  a: 0,
  ex: "Glucagon is released by pancreatic alpha-cells when blood glucose is LOW (fasting, between meals). It primarily targets the LIVER to raise blood glucose through two pathways: (1) glycogenolysis (breaking down glycogen into glucose) and (2) gluconeogenesis (making new glucose from non-carbohydrate precursors like lactate, amino acids, and glycerol). A critical MCAT fact: skeletal muscle does NOT have glucagon receptors. Muscle can break down its own glycogen, but only for local use -- it cannot export glucose because it lacks glucose-6-phosphatase. Epinephrine (not glucagon) activates glycogenolysis in muscle during the fight-or-flight response.",
  mn: "Glucagon = liver ONLY. Muscle has NO glucagon receptors (use epinephrine instead)."
}, {
  id: "met8",
  cat: "METABOLISM",
  tags: ["ETC", "electron transport chain", "Complex II", "FADH2", "NADH"],
  diff: 3,
  q: "FADH2 enters the ETC at:",
  o: ["Complex II", "Complex I", "Complex III", "Complex IV"],
  a: 0,
  ex: "The electron transport chain has four complexes (I-IV) plus two mobile carriers (CoQ and cytochrome c). NADH donates electrons to Complex I (NADH dehydrogenase). FADH2 donates electrons to Complex II (succinate dehydrogenase) -- bypassing Complex I entirely. Why does this matter? Because Complexes I, III, and IV are the three proton pumps. NADH uses all three pumps (I, III, IV) so it generates more proton gradient and therefore more ATP (~2.5 ATP). FADH2 uses only two pumps (III and IV, skipping I) so it generates less ATP (~1.5 ATP). The flow: NADH -> I -> CoQ -> III -> CytC -> IV -> O2. FADH2 -> II -> CoQ -> III -> CytC -> IV -> O2.",
  mn: "FADH2 enters at Complex II, skips Complex I = 1.5 ATP. NADH enters at Complex I = 2.5 ATP."
}, {
  id: "met9",
  cat: "METABOLISM",
  tags: ["ketogenesis", "ketone bodies", "liver", "fasting", "acetyl-CoA"],
  diff: 3,
  q: "Ketone bodies are produced from:",
  o: ["Excess acetyl-CoA in the liver", "Pyruvate in muscle", "Glucose in the brain", "Fatty acids in adipose tissue"],
  a: 0,
  ex: "During fasting or uncontrolled diabetes, the liver ramps up beta-oxidation of fatty acids, generating large amounts of acetyl-CoA. Normally, acetyl-CoA enters the Krebs cycle, but the Krebs cycle requires oxaloacetate (OAA) to accept acetyl-CoA. The problem: OAA is being diverted to gluconeogenesis (to make glucose for the brain). With insufficient OAA, excess acetyl-CoA is shunted into ketogenesis, producing three ketone bodies: acetoacetate, beta-hydroxybutyrate, and acetone. Critical fact: the liver MAKES ketone bodies but CANNOT USE them because it lacks the enzyme succinyl-CoA:acetoacetate-CoA transferase (thiophorase). The brain, heart, and skeletal muscle can use ketones as fuel. During prolonged starvation, the brain adapts to derive up to 75% of its energy from ketones.",
  mn: "Liver makes ketones but cannot use them. Brain adapts to use them during starvation."
}, {
  id: "met10",
  cat: "METABOLISM",
  tags: ["PDH", "pyruvate dehydrogenase", "acetyl-CoA", "cofactors"],
  diff: 2,
  q: "Pyruvate dehydrogenase complex produces:",
  o: ["Acetyl-CoA + CO2 + NADH", "Oxaloacetate", "Lactate + NAD+", "Alanine"],
  a: 0,
  ex: "The pyruvate dehydrogenase (PDH) complex is the critical bridge between glycolysis (in the cytoplasm) and the Krebs cycle (in the mitochondrial matrix). It performs an irreversible oxidative decarboxylation: pyruvate (3C) loses one carbon as CO2, gets oxidized (producing NADH from NAD+), and the remaining 2-carbon fragment joins Coenzyme A to form acetyl-CoA. PDH requires FIVE cofactors, which is a frequently tested fact: Thiamine pyrophosphate (TPP, from vitamin B1), FAD (from B2), NAD+ (from B3), Coenzyme A (from B5/pantothenic acid), and lipoic acid. PDH is activated by insulin and exercise, and inhibited by its own products (acetyl-CoA and NADH) as well as by phosphorylation from PDH kinase.",
  mn: "PDH = bridge reaction. 5 cofactors: TPP(B1), FAD(B2), NAD+(B3), CoA(B5), lipoate."
}, {
  id: "met11",
  cat: "METABOLISM",
  tags: ["PPP", "pentose phosphate pathway", "NADPH", "ribose", "G6PD"],
  diff: 3,
  q: "The pentose phosphate pathway primarily produces:",
  o: ["NADPH and ribose-5-phosphate", "ATP and NADH", "FADH2 and acetyl-CoA", "Lactate and CO2"],
  a: 0,
  ex: "The pentose phosphate pathway (PPP, also called HMP shunt) branches off glycolysis at glucose-6-phosphate. It has two essential products: (1) NADPH -- used for reductive biosynthesis (fatty acid and cholesterol synthesis both require NADPH) and for maintaining glutathione in its reduced form. Reduced glutathione is the cell's primary defense against reactive oxygen species (oxidative damage). This is especially critical in RED BLOOD CELLS which have no mitochondria and depend entirely on the PPP for antioxidant defense. (2) Ribose-5-phosphate -- the sugar backbone needed to synthesize nucleotides for DNA and RNA. The rate-limiting enzyme is glucose-6-phosphate dehydrogenase (G6PD). G6PD deficiency is the most common enzyme deficiency worldwide, causing hemolytic anemia when patients are exposed to oxidative stressors (certain drugs, fava beans, infections).",
  mn: "PPP = NADPH (antioxidant + biosynthesis) + Ribose-5-P (nucleotides). G6PD deficiency = hemolysis."
},

// ==== AMINO ACIDS ====
{

  q: "Positively charged AAs at physiological pH (7.4):",

  ex: "Amino acids are classified by their side chain charge at pH 7.4. The BASIC (positively charged) amino acids are Lysine (K, side chain pKa ~10.5), Arginine (R, pKa ~12.5), and Histidine (H, pKa ~6.0). At pH 7.4, Lys and Arg are well below their pKas so they are fully protonated and carry a +1 charge. His is trickier: its pKa (~6.0) is below physiological pH, so it is mostly deprotonated (~90%) at pH 7.4, but it is still classified as basic because its imidazole ring can accept a proton. This makes His an excellent biological buffer and a common participant in enzyme active sites for acid-base catalysis. Arginine has the highest pKa of any amino acid because its guanidinium group stabilizes the positive charge through resonance across three nitrogen atoms.",
  mn: "Kings Rule History (K, R, H). Lys and Arg always +. His is the flexible one (buffer)."
}, {
  id: "aa2",
  cat: "AMINO_ACIDS",
  tags: ["histidine", "buffer", "pKa", "imidazole", "acid-base catalysis"],
  diff: 2,
  q: "Best biological buffer amino acid:",
  o: ["Histidine", "Tryptophan", "Proline", "Phenylalanine"],
  a: 0,
  ex: "A buffer works best within +/-1 pH unit of its pKa (Henderson-Hasselbalch equation: pH = pKa + log[A-]/[HA]). At pH = pKa, the ratio of protonated to deprotonated forms is 1:1, giving maximum buffering capacity. Histidine's imidazole side chain has pKa ~6.0 -- the closest of any amino acid to physiological pH (7.4). This means His can both donate and accept protons near physiological pH, making it an ideal buffer. His is critical in hemoglobin (the Bohr effect: His residues in Hb buffer H+ ions released in active tissues, which promotes O2 release), and in enzyme active sites where it acts as a general acid-base catalyst (chymotrypsin's catalytic triad uses His-57 to shuttle protons during peptide bond hydrolysis).",
  mn: "His pKa ~6 = closest to 7.4 = best physiological buffer. Used in Hb and enzyme active sites."
}, {
  id: "aa3",
  cat: "AMINO_ACIDS",
  tags: ["disulfide bond", "cysteine", "tertiary structure", "covalent", "oxidizing"],
  diff: 1,
  q: "Disulfide bonds form between:",
  o: ["Two cysteine residues", "Two methionine residues", "Serine and threonine", "Any two amino acids"],
  a: 0,
  ex: "Cysteine has a thiol (-SH) side chain. When two cysteine residues come close together in a protein's 3D structure, their -SH groups can undergo an oxidation reaction to form a covalent -S-S- (disulfide) bond. This is the ONLY covalent bond involved in stabilizing protein tertiary or quaternary structure -- all other stabilizing forces (hydrogen bonds, ionic/salt bridges, hydrophobic interactions, van der Waals forces) are non-covalent. Disulfide bonds typically form in the oxidizing environment of the endoplasmic reticulum lumen or the extracellular space. The reducing environment of the cytoplasm (maintained by glutathione and thioredoxin) generally prevents disulfide bond formation. Insulin has 3 disulfide bonds critical for its function; antibodies (immunoglobulins) use interchain disulfide bonds to link heavy and light chains.",
  mn: "Cys-Cys = the ONLY covalent bond in protein folding. Forms in oxidizing environments (ER, extracellular)."

  q: "Negatively charged amino acids at pH 7.4:",

  ex: "Aspartate (Asp, D, side chain pKa ~3.65) and Glutamate (Glu, E, pKa ~4.25) are the ACIDIC amino acids. At pH 7.4, both are well above their pKas, meaning their carboxyl (-COOH) side chains are fully deprotonated to carboxylate (-COO-), giving each a -1 charge. Glu is essentially Asp with one extra CH2 in the side chain. Both commonly participate in enzyme active sites (as general acid-base catalysts), in salt bridges (ionic interactions with Lys or Arg), and in metal ion coordination (their negative charges attract positively charged metal cofactors like Zn2+ or Mg2+).",
  mn: "D and E = Dangerously nEgative. Both have COOH side chains (pKa ~3-4, deprotonated at 7.4)."
}, {

  tags: ["proline", "alpha helix", "secondary structure", "helix breaker"],

  q: "Which amino acid is called a 'helix breaker'?",

  a: 0,
  ex: "Proline is unique among amino acids because its side chain cyclizes back onto the backbone nitrogen, forming a rigid pyrrolidine ring. This has two consequences that disrupt alpha-helices: (1) The nitrogen is part of the ring and has no hydrogen to donate for the backbone N-H...O=C hydrogen bond that stabilizes alpha-helices (every turn of an alpha-helix requires an H-bond from the N-H of residue n to the C=O of residue n-4). (2) The ring constrains the backbone phi angle to about -60 degrees, introducing a rigid kink. Proline is commonly found in turns and loops between secondary structure elements. Glycine is also considered a helix destabilizer, but for the OPPOSITE reason -- it is so small and flexible that it has too much conformational freedom, which is entropically unfavorable for the ordered helix structure.",
  mn: "Proline = rigid ring = can't donate H-bond = kink in helix. Gly = too flexible."

{

  a: 0,
  ex: "Mitosis (division of the nucleus) has four phases, remembered by PMAT: Prophase: chromosomes condense from loose chromatin into visible structures, the nuclear envelope breaks down, and the mitotic spindle begins forming from centrosomes. Metaphase: chromosomes align along the metaphase plate (the cell's equator), with kinetochore microtubules from each pole attached to sister chromatids. Anaphase: cohesin proteins holding sister chromatids together are cleaved by separase, and the sisters are pulled to opposite poles by shortening of kinetochore microtubules. Telophase: chromosomes decondense, nuclear envelopes reform around each set of chromosomes. Cytokinesis (division of the cytoplasm) typically overlaps with telophase: in animal cells, a cleavage furrow (contractile ring of actin and myosin) pinches the cell in two.",
  mn: "PMAT: Prophase (condense), Metaphase (middle/align), Anaphase (apart), Telophase (two nuclei)."
}, {
  id: "cb2",
  cat: "CELL_BIO",
  tags: ["cell cycle", "p53", "Rb", "tumor suppressor", "G1/S checkpoint", "CDK"],
  diff: 2,
  q: "G1/S checkpoint is regulated by:",
  o: ["p53 and Rb", "Cyclins alone", "ATP levels only", "Cell size alone"],
  a: 0,
  ex: "The G1/S checkpoint is the cell's most important decision point: should it commit to DNA replication? Two tumor suppressors guard this checkpoint: p53 (the 'guardian of the genome') monitors DNA integrity. If DNA damage is detected, p53 activates p21, which inhibits cyclin-CDK complexes, halting the cell cycle to allow repair. If damage is irreparable, p53 triggers apoptosis. Rb (retinoblastoma protein) normally binds and inhibits the E2F transcription factor. When the cell receives appropriate growth signals, cyclin D/CDK4 and cyclin E/CDK2 progressively phosphorylate Rb, releasing E2F. Free E2F then activates genes needed for S phase (DNA replication enzymes). Loss of p53 or Rb removes these brakes, allowing uncontrolled proliferation -- this is why both are mutated in many cancers.",
  mn: "p53 = checks DNA damage. Rb = gates S-phase by holding E2F hostage until phosphorylated."
}, {
  id: "cb3",
  cat: "CELL_BIO",
  tags: ["meiosis", "haploid", "diploid", "crossing over", "genetic diversity"],
  diff: 2,
  q: "Meiosis produces:",
  o: ["4 haploid cells", "2 diploid cells", "4 diploid cells", "2 haploid cells"],
  a: 0,
  ex: "Meiosis is the specialized cell division that produces gametes (sperm and eggs). It differs from mitosis in critical ways: Meiosis I (reductional division): HOMOLOGOUS chromosomes pair up and separate. This is where crossing over occurs (in prophase I) -- homologs exchange segments of DNA, creating new allele combinations. The result: 2 cells, each with half the chromosome number (haploid). Meiosis II (equational division): SISTER chromatids separate, similar to mitosis. The result: 4 haploid cells, each genetically unique. Three sources of genetic diversity in meiosis: (1) crossing over, (2) independent assortment of homologs (2^23 possible arrangements in humans), (3) random fertilization. Compare to mitosis: 1 cell becomes 2 genetically identical diploid cells.",
  mn: "Meiosis: 1 diploid cell -> 4 unique haploid cells. Mitosis: 1 -> 2 identical diploid cells."
}, {

  cat: "CELL_BIO",
  tags: ["lysosome", "pH", "acid hydrolase", "storage disease"],
  diff: 2,

  o: ["~5 (acidic)", "~7 (neutral)", "~9 (basic)", "~3 (very acidic)"],
  a: 0,
  ex: "Lysosomes are membrane-bound organelles that serve as the cell's recycling center. They contain approximately 50 different acid hydrolases (enzymes that break down proteins, lipids, carbohydrates, and nucleic acids) that are optimized for pH ~5. This acidic pH is maintained by proton pumps (V-type H+ ATPases) in the lysosomal membrane. The acidic pH serves as a safety mechanism: if a lysosome ruptures, the enzymes become inactive at the neutral cytoplasmic pH (~7.2), preventing self-digestion. Lysosomal storage diseases occur when a specific lysosomal enzyme is deficient, causing its substrate to accumulate. Examples: Tay-Sachs (hexosaminidase A deficiency -- ganglioside accumulation), Gaucher's (glucocerebrosidase deficiency), Pompe's (acid maltase deficiency -- glycogen accumulation).",
  mn: "Lysosomes = pH 5 recycling centers. Enzyme deficiency = storage disease."
}, {
  id: "cb5",
  cat: "CELL_BIO",
  tags: ["apoptosis", "necrosis", "caspase", "programmed cell death"],
  diff: 3,
  q: "Apoptosis vs necrosis:",
  o: ["Apoptosis is programmed and clean; necrosis is uncontrolled and inflammatory", "Both are programmed", "Necrosis is programmed; apoptosis is accidental", "They produce identical outcomes"],
  a: 0,
  ex: "Apoptosis (programmed cell death) is a carefully controlled process: the cell activates a cascade of cysteine proteases called caspases. Initiator caspases (8, 9) activate effector caspases (3, 6, 7), which systematically dismantle the cell. The cell shrinks, chromatin condenses, DNA is fragmented by endonucleases, and the cell breaks into membrane-bound apoptotic bodies that are phagocytosed cleanly by macrophages -- NO inflammation. Apoptosis is essential for development (eliminating webbed fingers, shaping the nervous system) and immune function (eliminating self-reactive T cells). Necrosis is uncontrolled cell death from injury, toxins, or ischemia: the cell swells, the membrane ruptures, and cellular contents spill out, triggering a strong inflammatory response.",
  mn: "Apoptosis = clean suicide (caspases, no inflammation). Necrosis = messy explosion (inflammation)."
}, {

  q: "If q-squared = 0.0025, carrier frequency (2pq) is approximately:",
  o: ["~9.5%", "5%", "0.5%", "25%"],
  a: 0,
  ex: "Hardy-Weinberg equilibrium: p^2 + 2pq + q^2 = 1, where p = frequency of dominant allele, q = frequency of recessive allele, p + q = 1. The key steps: Given q^2 = 0.0025 (frequency of affected individuals). q = sqrt(0.0025) = 0.05. p = 1 - q = 0.95. Carrier frequency = 2pq = 2(0.95)(0.05) = 0.095 = 9.5%. A critical insight for the MCAT: carriers VASTLY outnumber affected individuals in recessive conditions. Here, there are about 38 times more carriers than affected individuals (9.5% vs 0.25%). HW assumptions: large population, random mating, no selection, no mutation, no migration.",
  mn: "q-squared = affected. q = sqrt. p = 1-q. Carriers (2pq) always >> affected (q-squared)."

  cat: "GENETICS",

  q: "X-linked recessive traits are expressed more in:",

  a: 0,
  ex: "Males have one X chromosome (XY). If that single X carries a recessive allele, the male WILL express the trait because there is no second X to mask it with a dominant allele -- males are said to be 'hemizygous' for X-linked genes. Females have two X chromosomes (XX) and would need to be homozygous (both X's carrying the recessive allele) to express the trait, which is much rarer. Classic X-linked recessive conditions: hemophilia A and B (clotting factor deficiencies), red-green color blindness, Duchenne muscular dystrophy, G6PD deficiency. An affected father CANNOT pass X-linked traits to his sons (sons get Y from father), but ALL his daughters will be carriers (they get his affected X).",

  a: 0,
  ex: "In codominance, BOTH alleles are fully expressed simultaneously in the heterozygote -- you can detect both gene products distinctly. The classic example is ABO blood type: a person with genotype I^A I^B expresses BOTH A and B antigens on their red blood cells (blood type AB). This is DIFFERENT from incomplete dominance, where the heterozygote shows an INTERMEDIATE (blended) phenotype -- like crossing red and white snapdragons to get PINK flowers. In codominance, both traits are distinctly visible (A AND B); in incomplete dominance, neither is fully visible (a blend). Another codominance example: sickle cell heterozygotes (HbA/HbS) produce both normal and sickle hemoglobin.",

  a: 0,
  ex: "ADH (antidiuretic hormone, also called vasopressin) is produced in the hypothalamus and released from the posterior pituitary when blood osmolarity is HIGH (dehydration) or blood volume is LOW. ADH travels through the blood to the kidneys, where it acts on the collecting duct by inserting aquaporin-2 (AQP2) water channels into the apical (lumen-facing) membrane. This makes the normally water-impermeable collecting duct permeable to water, which is then reabsorbed by osmosis into the hypertonic medullary interstitium. Result: concentrated, low-volume urine. Without ADH: the collecting duct stays impermeable, water stays in the tubule, and you produce dilute, high-volume urine (diabetes insipidus). Alcohol INHIBITS ADH release, which is why drinking causes frequent urination and dehydration.",

  ex: "Hemoglobin (Hb) is a tetramer with 4 subunits (alpha-2, beta-2), each containing a heme group with an iron atom that binds one O2 molecule. Hb displays cooperative binding: when the first O2 binds, it induces a conformational change (T-state to R-state) that increases the affinity of the remaining subunits. This produces the characteristic SIGMOIDAL (S-shaped) curve on the oxygen dissociation plot. Myoglobin (Mb) is a monomer with a single heme -- no cooperativity is possible, so it shows a HYPERBOLIC curve. Mb has higher O2 affinity than Hb at all partial pressures, making it ideal for storing O2 in muscle. The sigmoidal shape is physiologically brilliant: Hb loads O2 efficiently in the lungs (high PO2) and unloads it efficiently in tissues (low PO2).",

  a: 0,
  ex: "Aldosterone is a mineralocorticoid hormone produced by the zona glomerulosa of the adrenal cortex. It acts on principal cells of the distal convoluted tubule (DCT) and collecting duct. Its molecular mechanism: aldosterone enters cells, binds intracellular receptors, and increases transcription of Na+/K+-ATPase pumps (basolateral membrane) and ENaC sodium channels (apical membrane). Net effects: Na+ is reabsorbed from tubular fluid into blood; K+ is secreted from blood into tubular fluid; H+ is also secreted. Water follows Na+ passively, increasing blood volume and pressure. Aldosterone is the final effector of the RAAS cascade: low BP -> renin (from kidney) -> angiotensin I -> angiotensin II (via ACE in lungs) -> aldosterone. Clinical: hyperaldosteronism causes hypertension + hypokalemia + metabolic alkalosis.",

{

  q: "Helicase's role in replication:",
  o: ["Unwinds the DNA double helix", "Relieves supercoiling tension", "Synthesizes RNA primers", "Joins Okazaki fragments"],
  a: 0,
  ex: "DNA replication requires a team of enzymes at the replication fork, each with a specific job. Helicase uses ATP hydrolysis to break the hydrogen bonds between complementary base pairs, unwinding the double helix into two single strands. Working ahead of helicase, topoisomerase (DNA gyrase in prokaryotes) relieves the positive supercoiling tension that builds up as the helix unwinds -- like holding one end of a twisted rope while untwisting the other end. Single-strand binding proteins (SSBs) coat the exposed single strands to prevent them from re-annealing or being degraded. Primase synthesizes short RNA primers (about 10 nucleotides) that provide the free 3'-OH group that DNA polymerase needs to start synthesis. DNA polymerase III (prokaryotes) or delta/epsilon (eukaryotes) then extends from the primer.",
  mn: "Helicase = unzips. Topoisomerase = prevents tangling. Primase = makes starter primers."
}, {
  id: "mb2",
  cat: "MOLECULAR_BIO",
  tags: ["Okazaki fragments", "lagging strand", "DNA ligase", "leading strand", "replication"],
  diff: 2,
  q: "Okazaki fragments are found on the:",
  o: ["Lagging strand", "Leading strand", "Both strands equally", "mRNA"],
  a: 0,
  ex: "DNA polymerase can ONLY synthesize in the 5' to 3' direction. This creates an asymmetry at the replication fork: the LEADING strand runs toward the fork, so it can be synthesized continuously with just one primer. The LAGGING strand runs AWAY from the fork, so it must be synthesized in short, discontinuous pieces called Okazaki fragments (about 1000-2000 nucleotides in prokaryotes, 100-200 in eukaryotes). Each Okazaki fragment requires its own RNA primer. After synthesis, DNA Polymerase I (prokaryotes) removes the RNA primers using its 5' to 3' exonuclease activity and fills the gaps with DNA. Finally, DNA ligase seals the nicks (phosphodiester bonds) between adjacent Okazaki fragments, creating a continuous strand.",
  mn: "Lagging = lots of fragments, lots of primers, lots of ligase. Leading = one primer, continuous."
}, {
  id: "mb3",
  cat: "MOLECULAR_BIO",
  tags: ["DNA polymerase", "5 to 3", "proofreading", "3 to 5 exonuclease"],
  diff: 1,
  q: "DNA polymerase synthesizes in which direction?",
  o: ["5' to 3' only", "3' to 5' only", "Both directions", "Random"],
  a: 0,
  ex: "ALL known DNA polymerases synthesize exclusively in the 5' to 3' direction. This is because they can only ADD nucleotides to a free 3'-OH group. The polymerase reads the template strand in the 3' to 5' direction while building the new complementary strand in the 5' to 3' direction. DNA polymerase also has proofreading capability via 3' to 5' exonuclease activity: if a wrong nucleotide is incorporated, the enzyme detects the mismatch, reverses direction briefly (3' to 5'), removes the incorrect nucleotide, and resumes forward synthesis. This proofreading gives DNA replication an extraordinarily low error rate of approximately 1 in 10^9 base pairs. RNA polymerase also synthesizes 5' to 3' but does NOT require a primer (it can initiate de novo).",
  mn: "ALWAYS 5' to 3'. Build forward, read template backward, proofread by backing up."
}, {

  cat: "MOLECULAR_BIO",
  tags: ["nonsense mutation", "stop codon", "missense", "frameshift", "point mutation"],
  diff: 3,
  q: "A nonsense mutation produces:",
  o: ["A premature stop codon", "A different amino acid", "A reading frame shift", "No change in protein"],
  a: 0,
  ex: "Point mutations are single-nucleotide changes with four possible outcomes: SILENT (synonymous): the codon changes but still codes for the SAME amino acid -- most common at the 3rd (wobble) position due to genetic code degeneracy. MISSENSE: the codon changes to specify a DIFFERENT amino acid (e.g., sickle cell disease: GAG to GTG changes glutamate to valine at position 6 of beta-globin). NONSENSE: the codon changes to one of the three STOP codons (UAA, UAG, UGA), causing premature termination and a truncated, usually nonfunctional protein. FRAMESHIFT: an insertion or deletion of nucleotides NOT in multiples of 3 shifts the entire reading frame downstream, usually producing a completely altered and nonfunctional protein with a premature stop codon.",
  mn: "Nonsense = STOP sign appears too early. Missense = wrong letter. Silent = no effect. Frameshift = everything after is garbled."
}, {
  id: "mb5",
  cat: "MOLECULAR_BIO",
  tags: ["lac operon", "gene regulation", "allolactose", "CAP", "cAMP", "prokaryotic"],
  diff: 2,
  q: "The lac operon is fully induced when:",
  o: ["Lactose is present AND glucose is absent", "Glucose is present", "ATP levels are high", "Tryptophan is abundant"],
  a: 0,
  ex: "The lac operon is the classic model of prokaryotic gene regulation and requires understanding TWO signals: (1) LACTOSE PRESENT: lactose is converted to allolactose (an isomer), which binds the lac repressor protein and causes it to release from the operator. With the repressor gone, RNA polymerase can access the promoter and transcribe the structural genes (lacZ, lacY, lacA). (2) GLUCOSE ABSENT: when glucose is low, cAMP levels rise. cAMP binds the catabolite activator protein (CAP), and the cAMP-CAP complex binds upstream of the promoter, dramatically enhancing RNA polymerase binding and transcription. If glucose IS present (even with lactose present), cAMP stays low, CAP is inactive, and only minimal (basal) transcription occurs. The logic: glucose is the preferred carbon source -- why waste energy making lactose-processing enzymes when glucose is available?",
  mn: "Full induction = lactose ON (removes repressor) + glucose OFF (activates CAP). Glucose always wins."
}, {

  q: "p53 responds to DNA damage by:",
  o: ["Arresting the cell cycle and triggering apoptosis if needed", "Promoting cell division", "Activating telomerase", "Increasing mutation rate"],
  a: 0,
  ex: "p53 is called the 'guardian of the genome' and is arguably the most important tumor suppressor. When DNA damage is detected (by kinases like ATM/ATR), p53 protein is stabilized (normally it is rapidly degraded by MDM2). Stabilized p53 acts as a transcription factor that activates multiple downstream targets: (1) p21 -- a CDK inhibitor that blocks cyclin-CDK complexes, arresting the cell at the G1/S checkpoint to allow time for DNA repair. (2) DNA repair enzymes. (3) If the damage is too severe for repair, p53 activates pro-apoptotic genes (BAX, PUMA, NOXA) that trigger the intrinsic (mitochondrial) apoptotic pathway, eliminating the potentially dangerous cell. Loss of BOTH p53 alleles (two-hit hypothesis) removes this entire safety checkpoint, allowing damaged cells to divide uncontrollably. p53 is mutated in over 50% of all human cancers.",

{

  q: "A buffer works best at pH within +/-1 of its:",

  ex: "The Henderson-Hasselbalch equation describes buffer behavior: pH = pKa + log([A-]/[HA]), where [A-] is the conjugate base concentration and [HA] is the weak acid concentration. A buffer resists pH change by converting added acid or base into its conjugate: added H+ reacts with A- (converting it to HA), added OH- reacts with HA (converting it to A-). The buffer is most effective when there is plenty of BOTH forms available, which occurs when [A-] is approximately equal to [HA] -- this happens when pH = pKa (because log(1) = 0). Beyond +/-1 of pKa, one form becomes depleted (less than 10% of the total), and buffering capacity drops sharply. Practical application: to buffer at pH 7.4, choose a weak acid with pKa near 7.4.",
  mn: "Buffer = best at pKa +/- 1. At pH = pKa, the ratio of acid:base is 1:1 (maximum resistance to pH change)."

  q: "A reaction is spontaneous at ALL temperatures when:",

  a: 0,
  ex: "The Gibbs free energy equation: Delta-G = Delta-H - T(Delta-S). A reaction is spontaneous when Delta-G is negative. To be spontaneous at ALL temperatures, BOTH terms must push Delta-G negative: Delta-H < 0 (exothermic -- the enthalpy term is already negative) AND Delta-S > 0 (entropy increases -- the -T*Delta-S term is also negative since T is always positive). The four combinations and when they are spontaneous: (1) H<0, S>0: ALWAYS spontaneous. (2) H>0, S<0: NEVER spontaneous. (3) H<0, S<0: spontaneous at LOW temperatures (enthalpy-driven). (4) H>0, S>0: spontaneous at HIGH temperatures (entropy-driven).",
  mn: "Exothermic + more disorder = always spontaneous. Endothermic + less disorder = never."
}, {
  id: "gc3",
  cat: "GEN_CHEM",
  tags: ["Le Chatelier", "equilibrium", "product", "stress", "Keq"],
  diff: 1,
  q: "Adding product to a system at equilibrium:",
  o: ["Shifts the reaction toward reactants", "Produces more product", "Has no effect", "Increases Keq"],
  a: 0,
  ex: "Le Chatelier's principle: a system at equilibrium responds to stress by shifting to REDUCE that stress. Adding product increases the concentration of product -- the system shifts LEFT (toward reactants) to consume the excess. Similarly: adding reactant shifts RIGHT, removing reactant shifts LEFT, removing product shifts RIGHT. CRITICAL: changing concentrations or pressure shifts the POSITION of equilibrium (changes Q relative to K) but does NOT change Keq itself. Only TEMPERATURE changes the actual value of Keq. For exothermic reactions, increasing T decreases Keq (think of heat as a product). For endothermic reactions, increasing T increases Keq.",

  ex: "HCl is a strong acid, meaning it completely dissociates in water: HCl -> H+ + Cl-. So [H+] = 10^-3 M. pH = -log[H+] = -log(10^-3) = 3. Useful shortcuts for the MCAT: for concentrations that are exact powers of 10, pH equals the positive value of the exponent. So 10^-5 M = pH 5, 10^-1 M = pH 1. For non-powers of 10, pH falls between the two flanking integers: 5 x 10^-4 M has pH between 3 and 4 (closer to 3 since 5 is closer to 10^-3 than to 10^-4). Remember: strong acids to memorize: HCl, HBr, HI, HNO3, H2SO4, HClO3, HClO4. Their conjugate bases are negligibly weak.",

  tags: ["electrochemistry", "cell voltage", "spontaneous", "galvanic", "Gibbs"],

  q: "A positive standard cell voltage (E-cell) indicates:",

  ex: "The relationship between electrochemistry and thermodynamics: Delta-G = -nFE-cell, where n = moles of electrons transferred and F = Faraday's constant (96,485 C/mol). When E-cell is positive, Delta-G is negative, meaning the reaction is SPONTANEOUS -- this is a galvanic (voltaic) cell that PRODUCES electrical energy. When E-cell is negative, Delta-G is positive -- NON-spontaneous, requiring external voltage (electrolytic cell). To calculate E-cell: E-cell = E-cathode - E-anode, using standard reduction potentials. The species with the MORE positive reduction potential gets REDUCED (cathode); the species with the less positive (or more negative) reduction potential gets OXIDIZED (anode).",

  cat: "GEN_CHEM",

  q: "First-order reaction half-life:",

  a: 0,
  ex: "For a first-order reaction (rate = k[A]), the half-life is t1/2 = ln(2)/k = 0.693/k. The remarkable feature: half-life is INDEPENDENT of the starting concentration. Whether you start with 100 molecules or 1 million, it takes the same amount of time for half to react. This is also the equation governing radioactive decay and most drug elimination in pharmacokinetics. Compare: Zero-order (rate = k): t1/2 = [A]_0 / 2k (depends on [A]). Second-order (rate = k[A]^2): t1/2 = 1 / (k[A]_0) (depends on [A]). The constant half-life is unique to first-order and is a commonly tested concept.",
  mn: "First order: t1/2 = 0.693/k. CONSTANT, like radioactive decay. Does not depend on concentration."

// ==== ORGO ====
{
  id: "org1",
  cat: "ORGO",
  tags: ["SN1", "substitution", "carbocation", "protic solvent", "racemization"],
  diff: 2,
  q: "SN1 reactions are favored by:",
  o: ["Tertiary substrate + weak nucleophile + polar protic solvent", "Primary substrate + strong nucleophile", "Secondary + polar aprotic", "Methyl substrate + strong base"],
  a: 0,
  ex: "SN1 (Substitution, Nucleophilic, Unimolecular) proceeds in TWO steps: Step 1 (rate-determining): the leaving group departs, forming a carbocation intermediate. Step 2: the nucleophile attacks the carbocation. Because the rate depends ONLY on carbocation formation (unimolecular), you need: (1) A STABLE carbocation: 3-degree > 2-degree >> never methyl or 1-degree. Stability comes from hyperconjugation and inductive effects of alkyl groups. (2) A WEAK nucleophile: strong nucleophiles would push the reaction toward SN2 instead. (3) Polar PROTIC solvent (like water, alcohols): these stabilize the carbocation intermediate through solvation. Stereochemistry: the planar carbocation can be attacked from EITHER face, giving a RACEMIC mixture (50/50 R and S).",
  mn: "SN1: 3-degree + weak nuc + protic = racemic. Rate = k[substrate] only."
}, {
  id: "org2",
  cat: "ORGO",
  tags: ["SN2", "substitution", "inversion", "backside attack", "Walden"],
  diff: 1,
  q: "SN2 reactions produce:",
  o: ["Inversion of configuration", "Retention of configuration", "Racemic mixture", "No stereochemical change"],
  a: 0,
  ex: "SN2 (Substitution, Nucleophilic, Bimolecular) occurs in a SINGLE concerted step: the nucleophile attacks from the BACK side (180 degrees opposite the leaving group) while the leaving group simultaneously departs. This 'backside attack' forces an umbrella-like flip of the three remaining groups, called Walden inversion. If the starting material is R-configuration, the product is S-configuration, and vice versa. SN2 is favored by: methyl > primary > secondary (NEVER tertiary -- too sterically hindered for backside attack), strong nucleophile, polar APROTIC solvent (does not solvate the nucleophile, keeping it reactive). Rate = k[substrate][nucleophile] -- bimolecular.",
  mn: "SN2 = one step, backside attack, Walden inversion. Always inverts. Never on 3-degree."
}, {
  id: "org3",
  cat: "ORGO",
  tags: ["E2", "elimination", "bulky base", "anti-periplanar", "Zaitsev"],
  diff: 2,
  q: "Bulky base + secondary substrate most likely gives:",
  o: ["E2 elimination", "SN2 substitution", "SN1 substitution", "E1 elimination"],
  a: 0,
  ex: "When a strong, BULKY base (like tert-butoxide, t-BuO-) encounters a secondary substrate, E2 wins. Why? The base is too large to perform the backside attack required for SN2, so instead it abstracts a beta-proton (a hydrogen on the carbon next to the leaving group). E2 is concerted: the base removes the proton while the leaving group departs simultaneously, forming a double bond. E2 requires ANTI-PERIPLANAR geometry: the H being removed and the leaving group must be 180 degrees apart (anti to each other). The product follows Zaitsev's rule (more substituted alkene is the major product) UNLESS the base is very bulky, in which case the Hofmann product (less substituted, less sterically hindered) may dominate.",
  mn: "Bulky base cannot sneak in for SN2 -> grabs a proton instead -> E2."
}, {
  id: "org4",
  cat: "ORGO",
  tags: ["Markovnikov", "electrophilic addition", "carbocation", "regioselectivity"],
  diff: 2,
  q: "In Markovnikov addition, H adds to the carbon with:",
  o: ["More existing hydrogen atoms", "Fewer hydrogen atoms", "More substituents", "The leaving group"],
  a: 0,
  ex: "When HX (like HBr) adds across a double bond, the reaction follows Markovnikov's rule: the hydrogen adds to the LESS substituted carbon of the double bond (the one that already has MORE hydrogens), and X adds to the MORE substituted carbon. The reason: this produces the MORE STABLE carbocation intermediate. When H+ adds first, it can go to either carbon of the double bond. Adding it to the less substituted carbon places the positive charge on the more substituted carbon, which is stabilized by hyperconjugation. This rule applies to addition of HCl, HBr, HI, and acid-catalyzed hydration (H2O/H+). The exception: anti-Markovnikov addition occurs with HBr + peroxides (radical mechanism), where Br adds to the less substituted carbon.",
  mn: "H goes where H's already are -> more stable carbocation on the other carbon."
}, {
  id: "org5",
  cat: "ORGO",
  tags: ["enantiomers", "stereochemistry", "chirality", "optical rotation", "mirror image"],
  diff: 1,
  q: "Enantiomers differ at:",
  o: ["All stereocenters (R becomes S and vice versa)", "Only one stereocenter", "Their molecular connectivity", "Their molecular formula"],
  a: 0,
  ex: "Enantiomers are non-superimposable MIRROR IMAGES -- every stereocenter is inverted (all R become S, all S become R). They have identical physical properties: same melting point, same boiling point, same solubility, same Rf value on TLC, same IR and NMR spectra. They differ in only TWO ways: (1) they rotate plane-polarized light in OPPOSITE directions (equal magnitude but opposite sign: one is (+), the other is (-)). (2) They interact differently with other CHIRAL molecules -- this is critical for drug-receptor interactions, since biological receptors are chiral. A racemic mixture (50:50 R and S) shows zero net optical rotation because the rotations cancel.",
  mn: "Enantiomers = mirror images. Same everything EXCEPT optical rotation and chiral interactions."
}, {
  id: "org6",
  cat: "ORGO",
  tags: ["LiAlH4", "NaBH4", "reducing agent", "oxidation", "PCC"],
  diff: 3,
  q: "Which reagent reduces a carboxylic acid to a primary alcohol?",
  o: ["LiAlH4", "NaBH4", "H2/Pd", "PCC"],
  a: 0,
  ex: "Understanding reagent selectivity is essential for MCAT orgo. LiAlH4 (lithium aluminum hydride) is a POWERFUL, non-selective reducing agent. It reduces virtually everything: carboxylic acids -> primary alcohols, esters -> 2 alcohols, amides -> amines, aldehydes -> primary alcohols, ketones -> secondary alcohols. It is so reactive it must be used in anhydrous ether (reacts violently with water). NaBH4 (sodium borohydride) is MILDER and selective: it ONLY reduces aldehydes and ketones to alcohols. It does NOT reduce carboxylic acids, esters, or amides. PCC (pyridinium chlorochromate) is an OXIDIZING agent, not a reducing agent: it oxidizes primary alcohols to aldehydes (stops at aldehyde, does not go to carboxylic acid). H2/Pd is catalytic hydrogenation: reduces C=C double bonds.",

// ==== PHYSICS ====
{
  id: "ph1",
  cat: "PHYSICS",
  tags: ["Bernoulli", "fluid dynamics", "pressure", "velocity"],
  diff: 2,
  q: "According to Bernoulli's equation, increasing fluid velocity:",
  o: ["Decreases pressure", "Increases pressure", "Has no effect on pressure", "Increases density"],
  a: 0,
  ex: "Bernoulli's equation for ideal fluid flow: P + (1/2)rho*v^2 + rho*g*h = constant along a streamline. This is essentially conservation of energy for fluids: P is pressure energy, (1/2)rho*v^2 is kinetic energy, and rho*g*h is gravitational potential energy. If velocity (v) increases (as when fluid enters a narrower section of pipe), the kinetic energy term increases, so the pressure (P) must DECREASE to keep the sum constant. Applications: airplane wings (curved top surface = faster airflow = lower pressure above = net upward lift), the Venturi effect (narrow tube section creates low pressure that can draw in fluid), and cardiovascular medicine (stenosed arteries: blood speeds up through narrowing = lower lateral pressure = possible vessel collapse).",
  mn: "Fast flow = low pressure. Slow flow = high pressure. Think airplane wings."
}, {
  id: "ph2",
  cat: "PHYSICS",
  tags: ["Coulomb", "electrostatic force", "inverse square", "electric charge"],
  diff: 1,
  q: "Doubling the distance between two charges changes the force to:",
  o: ["1/4 of the original", "1/2 of the original", "Same as original", "Double the original"],
  a: 0,
  ex: "Coulomb's law: F = k*q1*q2/r^2, where k = 8.99 x 10^9 N*m^2/C^2. Force depends on the INVERSE SQUARE of distance. If you double r: F_new = k*q1*q2/(2r)^2 = k*q1*q2/(4r^2) = F_original/4. If you triple r: F_new = F/9. This inverse-square relationship appears throughout physics: gravitational force (F = G*m1*m2/r^2), electric field from a point charge (E = kQ/r^2), light intensity (I proportional to 1/r^2), and sound intensity (I proportional to 1/r^2). Recognizing this pattern lets you quickly solve many MCAT physics questions.",
  mn: "Inverse SQUARE: 2x distance = 1/4 force. 3x distance = 1/9 force. Same for gravity, E-field, light, sound."
}, {
  id: "ph3",
  cat: "PHYSICS",
  tags: ["work", "force", "displacement", "perpendicular", "dot product"],
  diff: 1,
  q: "Work equals zero when force is:",
  o: ["Perpendicular to displacement", "Parallel to displacement", "Antiparallel to displacement", "At any angle"],
  a: 0,
  ex: "Work is defined as W = F*d*cos(theta), where theta is the angle between the force vector and the displacement vector. When force is PERPENDICULAR to displacement (theta = 90 degrees), cos(90) = 0, so W = 0. Examples: the normal force does no work on a horizontally moving object, centripetal force does no work on an object moving in a circle (the force always points toward the center while displacement is tangential), and gravity does no work on an object moving horizontally. When force is PARALLEL to displacement (theta = 0): cos(0) = 1, W = F*d (maximum positive work). When ANTIPARALLEL (theta = 180): cos(180) = -1, W = -F*d (negative work, like friction slowing an object).",
  mn: "Perpendicular = zero work. Parallel = max work. Antiparallel = negative work (friction)."
}, {
  id: "ph4",
  cat: "PHYSICS",
  tags: ["sound", "speed", "medium", "solid", "gas"],
  diff: 1,
  q: "Sound travels fastest through:",
  o: ["Solids", "Liquids", "Gases", "Vacuum"],
  a: 0,
  ex: "Sound is a mechanical wave -- it requires a medium of particles to propagate (vibrations transferring from molecule to molecule). It CANNOT travel through a vacuum (unlike electromagnetic waves like light). Speed depends on how quickly molecules can transmit vibrations, which relates to the stiffness and density of the medium: Solids (~5000 m/s in steel) > Liquids (~1500 m/s in water) > Gases (~340 m/s in air at 20C). Within gases, v is proportional to sqrt(T/M), where T is temperature and M is molar mass: higher temperature and lower molecular mass both increase speed. This is the OPPOSITE of electromagnetic waves, which travel FASTEST in vacuum (c = 3 x 10^8 m/s) and slower in denser media.",
  mn: "Sound: solid > liquid > gas > vacuum (nothing). Opposite of EM waves."
}, {
  id: "ph5",
  cat: "PHYSICS",
  tags: ["series", "parallel", "resistors", "circuits", "Kirchhoff"],
  diff: 2,
  q: "Total resistance of resistors in series vs parallel:",
  o: ["Series: R adds up. Parallel: total is less than the smallest", "Parallel: R adds up", "Both: R adds up", "Series: less than smallest"],
  a: 0,
  ex: "In SERIES circuits, current must flow through each resistor sequentially (same current through all). Resistances ADD: R_total = R1 + R2 + R3... The total resistance is GREATER than any individual resistor. Voltage divides across resistors proportionally (V = IR for each). In PARALLEL circuits, current splits and flows through multiple paths simultaneously (same voltage across all). Reciprocals of resistance add: 1/R_total = 1/R1 + 1/R2 + 1/R3... The total resistance is LESS than the smallest individual resistor. Current divides inversely proportional to resistance (more current through lower resistance). For two equal resistors R in parallel: R_total = R/2.",
  mn: "Series: same current, voltages add, R adds. Parallel: same voltage, currents add, 1/R adds."
}, {
  id: "ph6",
  cat: "PHYSICS",
  tags: ["Doppler effect", "frequency", "sound", "approaching", "receding"],
  diff: 2,
  q: "A sound source approaching an observer produces:",
  o: ["Higher perceived frequency", "Lower perceived frequency", "Same frequency", "Doubled frequency"],
  a: 0,
  ex: "The Doppler effect describes how the perceived frequency of a wave changes when the source and observer are in relative motion. When a source APPROACHES the observer, the wavefronts are compressed (shorter wavelength) = HIGHER frequency (higher pitch). When the source MOVES AWAY, wavefronts are stretched (longer wavelength) = LOWER frequency (lower pitch). Think of an ambulance siren: high pitch as it approaches, sudden drop as it passes. The Doppler effect applies to ALL waves: sound (classic ambulance example), light (redshift of receding galaxies = lower frequency; blueshift of approaching objects = higher frequency), and ultrasound (used in echocardiography to measure blood flow velocity and in radar for speed detection).",
  mn: "Approaching = compressed waves = higher pitch. Receding = stretched = lower pitch."
}, {

  cat: "PHYSICS",
  tags: ["capacitor", "series", "parallel", "capacitance"],

  q: "Capacitors in series vs parallel:",

  ex: "Piaget described four stages of cognitive development: (1) SENSORIMOTOR (0-2): infant learns through senses and motor actions. Key milestone: object permanence (~8 months) -- understanding that objects continue to exist even when out of sight (before this, out of sight = out of mind, which is why peek-a-boo is entertaining). (2) PREOPERATIONAL (2-7): symbolic thinking develops (language, pretend play) but children show egocentrism (cannot take another's perspective -- mountain task) and lack conservation (pouring water into a taller glass = 'more' water). (3) CONCRETE OPERATIONAL (7-11): logical reasoning about concrete objects; conservation is mastered; can classify and seriate. (4) FORMAL OPERATIONAL (12+): abstract and hypothetical thinking; deductive reasoning; can think about thinking (metacognition).",

  q: "The bystander effect is primarily explained by:",
  o: ["Diffusion of responsibility", "Social facilitation", "Groupthink", "Deindividuation"],
  a: 0,
  ex: "The bystander effect (Darley and Latane): the more people present during an emergency, the LESS likely any individual is to help. Three psychological mechanisms explain this: (1) DIFFUSION OF RESPONSIBILITY: each person assumes someone else will step in -- responsibility is 'spread out' among all bystanders. (2) PLURALISTIC IGNORANCE: everyone looks at everyone else's calm reaction and concludes 'if nobody else is reacting, it must not be an emergency.' (3) EVALUATION APPREHENSION: fear of doing something wrong or looking foolish in front of others. The Kitty Genovese case (1964) originally inspired this research. How to overcome it: single out a specific individual ('You in the red shirt, please call 911') -- this eliminates diffusion of responsibility.",
  mn: "More bystanders = less help. Fix it by singling out ONE person for action."

  a: 0,
  ex: "Three major emotion theories to know for the MCAT: (1) JAMES-LANGE: stimulus -> physiological arousal -> brain interprets arousal -> emotion. 'I tremble, therefore I am afraid.' (2) CANNON-BARD: stimulus -> arousal AND emotion occur SIMULTANEOUSLY and independently. (3) SCHACHTER-SINGER (Two-Factor): stimulus -> physiological arousal -> COGNITIVE LABELING of the arousal based on context -> emotion. The key insight: the SAME physiological arousal (racing heart) can become different emotions depending on how you interpret it. The famous bridge study demonstrated this: men on a scary suspension bridge interpreted their fear-based arousal as attraction to a female interviewer, because the context suggested attraction rather than fear.",

  const st = d.questionStats[id] || {

  };
  const nb = ok ? Math.min(st.box + 1, 5) : 1;

  };

  let mn = Infinity;

  });
