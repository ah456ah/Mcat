<script type="text/babel">

const CATS={
  ENZYME_KINETICS:{name:"Enzyme Kinetics",icon:"🧬",color:"#e63946",sec:"Bio/Biochem"},
  METABOLISM:{name:"Metabolism",icon:"🔥",color:"#f4a261",sec:"Bio/Biochem"},
  AMINO_ACIDS:{name:"Amino Acids",icon:"🧪",color:"#2a9d8f",sec:"Bio/Biochem"},

  ORGO:{name:"Organic Chem",icon:"⬡",color:"#6a4c93",sec:"Chem/Phys"},
  PHYSICS:{name:"Physics",icon:"⚡",color:"#1d3557",sec:"Chem/Phys"},
  PSYCH_SOC:{name:"Psych/Soc",icon:"🧠",color:"#e76f51",sec:"Psych/Soc"},
  BIO_SYSTEMS:{name:"Bio Systems",icon:"🫀",color:"#d62828",sec:"Bio/Biochem"},
  MOLECULAR_BIO:{name:"Molecular Bio",icon:"🔬",color:"#588157",sec:"Bio/Biochem"},
};

const QS=[
{id:"ek1",cat:"ENZYME_KINETICS",pri:true,diff:2,q:"In uncompetitive inhibition, what happens to Km and Vmax?",o:["Both decrease","Km↑ Vmax↓","Both increase","Km↓ Vmax same"],a:0,ex:"Both Km and Vmax decrease. The inhibitor only binds the ES complex, removing it from equilibrium. By Le Chatelier's principle, more ES forms (apparent higher affinity = lower Km). The trapped ESI is catalytically dead (lower Vmax). Both parameters shift in the same direction — this is the key distinguishing feature of uncompetitive inhibition.",mn:"🔑 UN-competitive = everything UN-der (both down)"},
{id:"ek2",cat:"ENZYME_KINETICS",pri:true,diff:2,q:"Noncompetitive inhibition changes which parameter(s)?",o:["Only Vmax decreases","Only Km increases","Both decrease","Only Km decreases"],a:0,ex:"Noncompetitive inhibitors bind an allosteric site regardless of substrate binding. Substrate still binds normally (Km unchanged), but the enzyme-inhibitor complex has reduced or zero catalytic activity. It is like removing some enzymes from the pool — fewer functional enzymes means lower Vmax. This is the defining feature: Km stays the same because the inhibitor does not interfere with substrate binding at all.",mn:"🔑 NON-competitive = NO change to Km, only Vmax drops"},
{id:"ek3",cat:"ENZYME_KINETICS",pri:true,diff:2,q:"LB plot for uncompetitive inhibition:",o:["Parallel lines","Lines cross y-axis","Lines cross x-axis","Same line"],a:0,ex:"On a Lineweaver-Burk plot, uncompetitive inhibition produces parallel lines because both the y-intercept (1/Vmax) and x-intercept (-1/Km) change proportionally while the slope (Km/Vmax) stays constant. This is the most distinctive LB pattern — no other inhibition type produces parallel lines. Competitive = cross on y-axis. Noncompetitive = cross on x-axis.",mn:"🔑 Parallel lines = uncompetitive. The only type with this pattern."},
{id:"ek4",cat:"ENZYME_KINETICS",pri:true,diff:2,q:"Competitive inhibitor LB lines intersect on:",o:["Y-axis","X-axis","Origin","Don't intersect"],a:0,ex:"Competitive inhibitors compete with substrate for the active site. Adding enough substrate always outcompetes the inhibitor, so Vmax is unchanged (same y-intercept = 1/Vmax). But more substrate is needed to reach half-Vmax, so apparent Km increases (different x-intercept). Lines share the y-intercept and fan out along the x-axis.",mn:"🔑 Competitive = same y-intercept because Vmax unchanged"},
{id:"ek5",cat:"ENZYME_KINETICS",pri:true,diff:3,q:"Why does Km decrease in uncompetitive inhibition?",o:["Inhibitor traps ES shifting equilibrium toward ES","Inhibitor increases affinity directly","[S] increases","Enzyme conformation changes"],a:0,ex:"The inhibitor binds ES to form a dead-end ESI complex, effectively removing ES from the E + S ⇌ ES equilibrium. By Le Chatelier's principle, the system compensates by forming more ES, making it appear that the enzyme has higher substrate affinity (lower apparent Km). The enzyme is not actually binding substrate better — it is the equilibrium shift that creates the appearance of higher affinity.",mn:"🔑 Le Chatelier: removing ES product → equilibrium shifts toward more ES"},
{id:"ek6",cat:"ENZYME_KINETICS",pri:true,diff:1,q:"An uncompetitive inhibitor binds to:",o:["Only the ES complex","Only free enzyme","Both E and ES","Substrate directly"],a:0,ex:"The binding site for an uncompetitive inhibitor only exists (or becomes accessible) after substrate binds, causing a conformational change that creates the inhibitor binding site. This is the mechanistic basis: competitive binds only free E (active site), noncompetitive binds both E and ES (allosteric), uncompetitive binds only ES (allosteric site revealed by substrate).",mn:"🔑 UN-able to bind alone — needs substrate first"},
{id:"ek7",cat:"ENZYME_KINETICS",diff:1,q:"Km represents:",o:["[S] at half Vmax","Maximum rate","Binding energy","Turnover number"],a:0,ex:"Km is the substrate concentration at which reaction velocity = 1/2 Vmax. It is an inverse measure of apparent affinity: LOW Km means the enzyme reaches half-max speed at low [S] (very efficient at grabbing substrate). HIGH Km means lots of substrate needed. Km equals (k-1 + k2)/k1 from the Michaelis-Menten derivation. For simple cases where k2 << k-1, Km approximates Kd (true dissociation constant).",mn:"🔑 Low Km = hungry enzyme (high affinity)"},
{id:"ek8",cat:"ENZYME_KINETICS",diff:2,q:"Catalytic efficiency measured by:",o:["kcat/Km","Vmax/Km","Km/Vmax","kcat x Km"],a:0,ex:"kcat/Km (the specificity constant) captures both speed (kcat) and substrate affinity (Km). A 'perfect' diffusion-limited enzyme has kcat/Km around 10^8-10^9 per M per s — converting substrate as fast as it physically arrives. Examples: carbonic anhydrase, acetylcholinesterase, triose phosphate isomerase. This ratio is also used to compare how efficiently an enzyme acts on different substrates.",mn:"🔑 Efficiency = speed (kcat) / appetite (Km)"},
{id:"ek9",cat:"ENZYME_KINETICS",pri:true,diff:2,q:"Noncompetitive inhibitor LB lines intersect on:",o:["X-axis","Y-axis","Parallel","Origin"],a:0,ex:"Same Km means same x-intercept (-1/Km). Different Vmax means different y-intercept (1/Vmax). Lines converge on the x-axis. Quick summary: competitive = y-axis intersection, noncompetitive = x-axis intersection, uncompetitive = parallel (no intersection).",mn:"🔑 NON-competitive = cross on X-axis (Km unchanged)"},
{id:"ek10",cat:"ENZYME_KINETICS",pri:true,diff:3,q:"Mixed inhibition differs from noncompetitive because:",o:["It changes both Km and Vmax","Only changes Km","Only Vmax","Binds active site"],a:0,ex:"Mixed inhibitors bind allosterically but with DIFFERENT affinities for free enzyme (E) versus the ES complex. If the inhibitor prefers E, apparent Km increases; if it prefers ES, apparent Km decreases. Vmax always decreases. Pure noncompetitive is a special case where affinity for E and ES is EQUAL, so Km stays constant. Mixed always changes both parameters; it is actually the more general case.",mn:"🔑 Mixed = general case (both change). Noncompetitive = special case (only Vmax)"},
{id:"ek11",cat:"ENZYME_KINETICS",diff:2,q:"Allosteric enzymes do NOT follow:",o:["Michaelis-Menten kinetics","Le Chatelier's","Thermodynamics","Conservation of mass"],a:0,ex:"Allosteric enzymes have multiple subunits with cooperative binding, producing a sigmoidal (S-shaped) velocity curve instead of the hyperbolic MM curve. You cannot use V = Vmax[S]/(Km+[S]) for them. Instead, use the Hill equation with a Hill coefficient (n) > 1 for positive cooperativity. Classic example: hemoglobin O2 binding (not an enzyme but same principle). ATCase is the textbook allosteric enzyme example.",mn:"🔑 Allosteric = S-curve (sigmoidal), NOT hyperbola"},
{id:"ek12",cat:"ENZYME_KINETICS",diff:3,q:"Competitive inhibition overcome by:",o:["Increasing [substrate]","Increasing [enzyme]","Decreasing temp","More inhibitor"],a:0,ex:"At very high [S], virtually all active sites are occupied by substrate rather than inhibitor, and Vmax is reached. This is why Vmax is unchanged in competitive inhibition — it is always reachable if you add enough substrate. You simply need MORE substrate to get there, which is why apparent Km increases. This concept connects to drug design: competitive inhibitors can be overcome by the natural substrate.",mn:"🔑 It is a race — flood with substrate to win"},
{id:"ek13",cat:"ENZYME_KINETICS",diff:2,q:"kcat represents:",o:["Reactions per enzyme per sec at saturation","Total reactions per cell","Km/Vmax","Molecular weight"],a:0,ex:"kcat = Vmax/[E_total]. It is the maximum number of substrate molecules converted per enzyme molecule per second at full saturation. Carbonic anhydrase has kcat around 10^6 per second — one million CO2 molecules converted per second per enzyme. Typical enzymes: kcat = 1 to 10,000 per second.",mn:"🔑 kcat = speed limit of ONE enzyme molecule"},
{id:"ek14",cat:"ENZYME_KINETICS",diff:3,q:"Positive cooperativity means:",o:["First binding increases affinity for more","Enzyme activated by product","Km increases with [S]","Single subunit"],a:0,ex:"Binding of the first substrate causes a conformational change (T-state to R-state) that increases affinity of neighboring subunits. Hill coefficient n > 1. Hemoglobin: first O2 is hardest to bind, each subsequent one easier. This creates the sigmoidal curve. Negative cooperativity (n < 1) is the opposite — first binding decreases subsequent affinity.",mn:"🔑 More the merrier — each binding makes the next easier"},
{id:"ek15",cat:"ENZYME_KINETICS",pri:true,diff:2,q:"Which inhibition has NO effect on Vmax?",o:["Competitive","Noncompetitive","Uncompetitive","Mixed"],a:0,ex:"Only competitive inhibition leaves Vmax unchanged because the inhibitor can always be outcompeted by adding more substrate. Noncompetitive, uncompetitive, and mixed all create dead-end complexes that cannot be overcome by substrate concentration alone, so they all reduce Vmax.",mn:"🔑 Competitive = the only type that preserves Vmax"},
{id:"ek16",cat:"ENZYME_KINETICS",pri:true,diff:3,q:"Km drops from 2mM to 0.5mM, Vmax also decreases. Inhibitor type?",o:["Uncompetitive","Competitive","Noncompetitive","Irreversible"],a:0,ex:"Both Km and Vmax decreased — both arrows point down. This is the unique signature of uncompetitive inhibition. Competitive would INCREASE Km. Noncompetitive would leave Km UNCHANGED. On the exam, if they give numerical values and both decrease, choose uncompetitive immediately.",mn:"🔑 Both arrows down = UNcompetitive. Both arrows same direction."},
{id:"met1",cat:"METABOLISM",diff:1,q:"Net ATP from one glucose (aerobic):",o:["30-32","36-38","2","4"],a:0,ex:"Modern calculations yield 30-32 ATP. The old 36-38 number used theoretical P/O ratios that have been revised downward. Glycolysis: 2 ATP + 2 NADH; PDH: 2 NADH; Krebs: 2 GTP + 6 NADH + 2 FADH2. Each NADH yields about 2.5 ATP, each FADH2 about 1.5 ATP via oxidative phosphorylation. If you see 36-38 on the MCAT, it is likely a distractor.",mn:"🔑 30-32 ATP. The old 36-38 is a trap answer."},
{id:"met2",cat:"METABOLISM",diff:2,q:"Rate-limiting enzyme of glycolysis:",o:["PFK-1","Hexokinase","Pyruvate kinase","Aldolase"],a:0,ex:"PFK-1 catalyzes fructose-6-phosphate to fructose-1,6-bisphosphate, the committed step. Allosterically activated by AMP, ADP, fructose-2,6-bisphosphate (most potent activator). Inhibited by ATP and citrate (energy abundance signals). Hexokinase is the first step but G6P has other fates (PPP, glycogen), so PFK-1 is the true committed/rate-limiting step.",mn:"🔑 PFK-1 = gatekeeper. AMP activates, ATP inhibits."},
{id:"met3",cat:"METABOLISM",diff:1,q:"Beta-oxidation occurs in:",o:["Mitochondrial matrix","Cytoplasm","Smooth ER","Peroxisomes only"],a:0,ex:"Fatty acids are activated to acyl-CoA in the cytoplasm, transported into the mitochondrial matrix via the carnitine shuttle (CPT-I and CPT-II), then chopped into 2-carbon acetyl-CoA units. Each cycle: 1 FADH2 + 1 NADH + 1 acetyl-CoA. CPT-I is rate-limiting and inhibited by malonyl-CoA (first step of FA synthesis), ensuring synthesis and oxidation don't happen simultaneously.",mn:"🔑 Carnitine shuttle → matrix → chopped into 2C acetyl-CoA"},
{id:"met4",cat:"METABOLISM",diff:2,q:"Pyruvate to lactate primarily to:",o:["Regenerate NAD+","Produce ATP","Feed Krebs","Store energy"],a:0,ex:"Under anaerobic conditions, the ETC cannot accept electrons from NADH, so NADH accumulates and NAD+ is depleted. Glycolysis requires NAD+ at the GAPDH step. LDH converts pyruvate to lactate while oxidizing NADH back to NAD+, allowing glycolysis to continue producing 2 ATP per glucose. This is a survival mechanism, not efficient energy production.",mn:"🔑 No O2 → NAD+ depleted → LDH recycles NAD+ for glycolysis"},
{id:"met5",cat:"METABOLISM",diff:1,q:"Krebs cycle location:",o:["Mitochondrial matrix","Inner membrane","Cytoplasm","Outer membrane"],a:0,ex:"Spatial organization: glycolysis = cytoplasm; PDH and Krebs = mitochondrial matrix; ETC and ATP synthase = inner mitochondrial membrane; fatty acid synthesis = cytoplasm; beta-oxidation = matrix. Knowing WHERE each pathway occurs helps predict regulatory connections and is commonly tested.",mn:"🔑 Cytoplasm=glycolysis. Matrix=Krebs. Inner membrane=ETC."},
{id:"met6",cat:"METABOLISM",diff:2,q:"NADH per Krebs turn:",o:["3","2","4","1"],a:0,ex:"Per turn: 3 NADH (at isocitrate DH, alpha-ketoglutarate DH, malate DH), 1 FADH2 (at succinate DH, which is also Complex II of ETC), 1 GTP (at succinyl-CoA synthetase, equivalent to 1 ATP). Multiply by 2 for per-glucose yield since each glucose makes 2 acetyl-CoA.",mn:"🔑 Per turn: 3 NADH, 1 FADH2, 1 GTP. Double it for per-glucose."},
{id:"met7",cat:"METABOLISM",diff:3,q:"Gluconeogenesis bypasses PFK-1 with:",o:["Fructose-1,6-bisphosphatase","Glucose-6-phosphatase","Pyruvate carboxylase","PEP carboxykinase"],a:0,ex:"Glycolysis has 3 irreversible steps that gluconeogenesis must bypass: (1) Pyruvate kinase → pyruvate carboxylase + PEP carboxykinase; (2) PFK-1 → fructose-1,6-bisphosphatase; (3) Hexokinase → glucose-6-phosphatase (liver/kidney only — muscle cannot export glucose). Gluconeogenesis costs 6 ATP per glucose vs 2 ATP earned from glycolysis.",mn:"🔑 3 irreversible glycolysis steps → 4 bypass enzymes in gluconeogenesis"},
{id:"met8",cat:"METABOLISM",diff:2,q:"Insulin promotes:",o:["Glycolysis and glycogen synthesis","Gluconeogenesis","Beta-oxidation","Ketogenesis"],a:0,ex:"Insulin = fed state hormone from pancreatic beta-cells. Promotes: glycolysis, glycogen synthesis, lipogenesis, protein synthesis, GLUT4 translocation. Inhibits: gluconeogenesis, glycogenolysis, lipolysis, ketogenesis. Essentially: 'we have fuel — store it and use glucose.' Glucagon does the opposite for fasting state.",mn:"🔑 Insulin = store everything. Glucagon = mobilize everything."},
{id:"met9",cat:"METABOLISM",diff:2,q:"Glucagon targets:",o:["Liver","Skeletal muscle","Brain","Adipose"],a:0,ex:"Glucagon from pancreatic alpha-cells primarily targets the LIVER for glycogenolysis and gluconeogenesis to raise blood glucose. Skeletal muscle does NOT have glucagon receptors — muscle glycogen can only be used locally. Epinephrine (not glucagon) activates muscle glycogenolysis. This distinction is commonly tested on the MCAT.",mn:"🔑 Glucagon = liver only! Muscle has NO glucagon receptors."},
{id:"met10",cat:"METABOLISM",diff:3,q:"FADH2 enters ETC at:",o:["Complex II","Complex I","Complex III","Complex IV"],a:0,ex:"FADH2 donates electrons to Complex II (succinate dehydrogenase), bypassing Complex I. Since Complex I is one of three proton pumps (I, III, IV), FADH2 drives fewer protons → fewer ATP (about 1.5 vs 2.5 for NADH). Electron flow: NADH → I → CoQ → III → Cyt c → IV → O2. FADH2 → II → CoQ → III → Cyt c → IV → O2.",mn:"🔑 FADH2 → Complex II (skips I → 1.5 ATP vs 2.5 for NADH)"},
{id:"met11",cat:"METABOLISM",diff:3,q:"Ketone bodies from:",o:["Acetyl-CoA in liver","Pyruvate in muscle","Glucose in brain","FAs in adipose"],a:0,ex:"During fasting, the liver produces excess acetyl-CoA from beta-oxidation that overwhelms the Krebs cycle (OAA is depleted by gluconeogenesis). Excess acetyl-CoA is converted to ketone bodies: acetoacetate, beta-hydroxybutyrate, acetone. The liver makes ketones but CANNOT use them (lacks the enzyme thiophorase). Brain, heart, and muscle can use them. Brain adapts during prolonged starvation.",mn:"🔑 Liver makes ketones but cannot use them. Brain adapts to use them."},
{id:"met12",cat:"METABOLISM",diff:2,q:"Cori cycle:",o:["Muscle lactate → liver glucose","Liver lactate → muscle glucose","Brain → liver","Kidney → liver"],a:0,ex:"Working muscle produces lactate via anaerobic glycolysis → lactate travels via blood to liver → liver converts lactate back to glucose (gluconeogenesis, costs 6 ATP) → glucose returns to muscle via blood. Net cost: 4 ATP per cycle. The liver essentially subsidizes muscle activity during intense exercise.",mn:"🔑 Muscle: glucose→lactate (2 ATP). Liver: lactate→glucose (-6 ATP)."},
{id:"met13",cat:"METABOLISM",diff:2,q:"PDH converts pyruvate to:",o:["Acetyl-CoA + CO2 + NADH","Oxaloacetate","Lactate","Alanine"],a:0,ex:"Pyruvate dehydrogenase is the bridge between glycolysis and Krebs. It performs irreversible oxidative decarboxylation: pyruvate loses CO2, gets oxidized (NADH produced), and the 2C fragment joins CoA. Requires 5 cofactors: TPP, FAD, NAD+, CoA, lipoic acid. Activated by insulin and exercise, inhibited by acetyl-CoA and NADH (product inhibition).",mn:"🔑 PDH = bridge reaction. 5 cofactors: TPP, FAD, NAD+, CoA, lipoate"},
{id:"met14",cat:"METABOLISM",diff:3,q:"Pentose phosphate pathway produces:",o:["NADPH and ribose-5-phosphate","ATP and NADH","FADH2","Lactate"],a:0,ex:"The PPP branches from glycolysis at G6P. Two products: (1) NADPH — for reductive biosynthesis (fatty acid/cholesterol synthesis) and maintaining reduced glutathione (antioxidant defense, critical in RBCs); (2) Ribose-5-phosphate — sugar backbone for nucleotide synthesis. Rate-limiting enzyme: G6PD. G6PD deficiency causes hemolytic anemia upon oxidative stress because RBCs cannot regenerate NADPH to maintain glutathione.",mn:"🔑 PPP = NADPH (biosynthesis + antioxidant) + Ribose (nucleotides)"},
{id:"aa1",cat:"AMINO_ACIDS",diff:1,q:"Positively charged AAs at pH 7.4:",o:["Lys Arg His","Asp Glu","Ser Thr Tyr","Phe Trp Tyr"],a:0,ex:"Basic (positively charged) amino acids: Lysine (K, pKa ~10.5), Arginine (R, pKa ~12.5), Histidine (H, pKa ~6). At pH 7.4, Lys and Arg are fully protonated/positive. His is partially protonated (~10%). Arg has the highest pKa because its guanidinium group stabilizes the positive charge through resonance across three nitrogens.",mn:"🔑 Kings Rule History (K, R, H) = positive/basic"},
{id:"aa2",cat:"AMINO_ACIDS",diff:2,q:"Best biological buffer AA:",o:["Histidine","Tryptophan","Proline","Phenylalanine"],a:0,ex:"His pKa ~6 is closest to physiological pH of any AA side chain. A buffer works best within ±1 of its pKa. His is crucial in enzyme active sites for acid-base catalysis and in hemoglobin for the Bohr effect (His residues buffer H+ and modulate O2 binding). No other AA side chain has a pKa close enough to 7.4 for effective physiological buffering.",mn:"🔑 His pKa ~6 = closest to 7.4 = best buffer"},
{id:"aa3",cat:"AMINO_ACIDS",diff:1,q:"Disulfide bonds between:",o:["Cysteine","Methionine","Serine","Threonine"],a:0,ex:"Two Cys -SH groups oxidize to form a covalent -S-S- disulfide bond. This is the ONLY covalent bond in protein tertiary/quaternary structure. Everything else (H-bonds, ionic, hydrophobic, van der Waals) is non-covalent. Disulfide bonds form in the oxidizing ER/extracellular environment, not in the reducing cytoplasm.",mn:"🔑 Cys-Cys = only covalent bond in protein folding"},
{id:"aa4",cat:"AMINO_ACIDS",diff:2,q:"Negatively charged AAs at pH 7.4:",o:["Asp and Glu","Lys and Arg","Ser and Thr","Trp and Phe"],a:0,ex:"Aspartate (D, pKa ~3.65) and Glutamate (E, pKa ~4.25) are acidic AAs. At pH 7.4, their carboxyl side chains are fully deprotonated (COO-), giving a negative charge. Both commonly participate in salt bridges with basic AAs and in enzyme active sites as general acid-base catalysts.",mn:"🔑 D and E = Dangerously nEgative (acidic)"},
{id:"aa5",cat:"AMINO_ACIDS",diff:2,q:"Alpha-helix breaker:",o:["Proline","Glycine","Alanine","Leucine"],a:0,ex:"Proline's cyclic side chain bonds to both the alpha-carbon AND the backbone nitrogen, creating a rigid ring. Consequences: (1) cannot donate the backbone N-H hydrogen bond needed for alpha-helix stability; (2) the ring forces a fixed bend. Proline is found in turns between secondary structures. Glycine also destabilizes helices but for the opposite reason — too flexible.",mn:"🔑 Proline = rigid ring = cannot H-bond in helix = kink/break"},
{id:"aa6",cat:"AMINO_ACIDS",diff:1,q:"Essential AAs must be:",o:["From diet","Made in liver","From glucose","By bacteria"],a:0,ex:"Essential AAs cannot be synthesized by the body. PVT TIM HALL: Phe, Val, Thr, Trp, Ile, Met, His, Arg (conditionally essential), Leu, Lys. Tyrosine is NOT essential because it can be made from Phe by phenylalanine hydroxylase (the enzyme deficient in PKU). Similarly, cysteine can be made from methionine.",mn:"🔑 PVT TIM HALL = essential AAs"},
{id:"aa7",cat:"AMINO_ACIDS",diff:2,q:"At pI, an AA has:",o:["Net charge = zero","Max positive","Max negative","No charge at all"],a:0,ex:"pI = pH of zero net charge (zwitterion with balanced + and - charges). At pI, the molecule will NOT migrate in an electric field. For simple AAs: pI = average of two pKas flanking the zwitterion. For acidic AAs: average of two lowest pKas. For basic AAs: average of two highest pKas.",mn:"🔑 pI = zero net charge = no movement in electrophoresis"},
{id:"aa8",cat:"AMINO_ACIDS",diff:3,q:"UV 280nm absorbers:",o:["Trp Tyr Phe","Lys Arg His","Asp Glu","Ser Thr"],a:0,ex:"Aromatic AAs absorb UV at ~280nm due to conjugated ring systems. Tryptophan has strongest absorbance, then Tyrosine, then Phenylalanine (very weak). This property is used for protein quantification via A280 using Beer-Lambert law (A = epsilon*l*c). If a protein lacks Trp/Tyr, this method is unreliable.",mn:"🔑 A280 = protein concentration. Trp >> Tyr > Phe."},
{id:"gc1",cat:"GEN_CHEM",diff:1,q:"Buffer best at pH within ±1 of:",o:["pKa of weak acid","7.0","pKb","14"],a:0,ex:"Henderson-Hasselbalch: pH = pKa + log([A-]/[HA]). Buffer is most effective when [A-] ≈ [HA] (ratio near 1, log ≈ 0), which occurs at pH = pKa. Outside ±1 of pKa, one form is depleted and buffering capacity drops sharply. Choose a weak acid whose pKa matches your target pH.",mn:"🔑 Buffer zone = pKa ± 1. At pH=pKa, ratio is 1:1."},
{id:"gc2",cat:"GEN_CHEM",diff:2,q:"Spontaneous at ALL temperatures:",o:["ΔH<0 ΔS>0","ΔH>0 ΔS>0","ΔH<0 ΔS<0","ΔH>0 ΔS<0"],a:0,ex:"ΔG = ΔH - TΔS. For ΔG to always be negative: need ΔH negative (exothermic) AND ΔS positive (more disorder). Both terms push ΔG negative regardless of T. The four combos: ΔH-/ΔS+ = always; ΔH+/ΔS- = never; ΔH-/ΔS- = low T; ΔH+/ΔS+ = high T.",mn:"🔑 Exothermic + more entropy = always spontaneous"},
{id:"gc3",cat:"GEN_CHEM",diff:1,q:"Adding product at equilibrium:",o:["Shifts toward reactants","More products","No effect","Increases Keq"],a:0,ex:"Le Chatelier: system shifts to reduce stress. Adding product shifts LEFT toward reactants. Importantly, Keq does NOT change — only temperature changes Keq. Adding/removing substances changes Q relative to K, causing the shift until Q=K again.",mn:"🔑 System runs away from whatever you add"},
{id:"gc4",cat:"GEN_CHEM",diff:2,q:"Increase T for exothermic reaction:",o:["Decreases Keq","Increases Keq","No effect","Depends"],a:0,ex:"For exothermic (ΔH<0): heat is a product. Increasing T = adding product → shifts LEFT → Keq decreases. For endothermic: heat is a reactant → increasing T shifts RIGHT → Keq increases. Temperature is the ONLY factor that changes Keq itself.",mn:"🔑 Exothermic: heat = product. Adding heat → shifts left → smaller Keq."},
{id:"gc5",cat:"GEN_CHEM",diff:1,q:"Highest boiling point:",o:["H2O","CH4","Ne","C2H6"],a:0,ex:"BP depends on intermolecular forces. Ranking: ion-ion > H-bonding > dipole-dipole > London dispersion. Water has strong H-bonding (O-H with O lone pairs), giving an abnormally high BP (100C) for its mass. CH4 and C2H6 only have London forces. Water's H-bonding also explains its high specific heat and surface tension.",mn:"🔑 H-bonds >> London. Water BP is abnormally high for its size."},
{id:"gc6",cat:"GEN_CHEM",diff:1,q:"Strong acid in water:",o:["Completely dissociates","Partially","Does not","Forms buffer"],a:0,ex:"Strong acids: HCl, HBr, HI, HNO3, H2SO4, HClO3, HClO4. They fully dissociate — no equilibrium, 100% ionization. pH = -log[acid] directly. Their conjugate bases are negligibly weak. Weak acids partially dissociate with Ka describing the equilibrium.",mn:"🔑 Strong = 100% dissociation. pH = -log[acid]."},
{id:"gc7",cat:"GEN_CHEM",diff:2,q:"pH of 1x10^-3 M HCl:",o:["3","11","-3","0.001"],a:0,ex:"HCl is strong → [H+] = 10^-3 M → pH = -log(10^-3) = 3. Shortcut: for exact powers of 10, pH = the exponent (positive). 10^-5 M = pH 5. For non-powers: pH is between flanking integers (e.g., 5x10^-4 is between pH 3 and 4).",mn:"🔑 pH = -log[H+]. Powers of 10 make it easy."},
{id:"gc8",cat:"GEN_CHEM",diff:3,q:"Positive E cell means:",o:["Spontaneous ΔG<0","Non-spontaneous","Needs voltage","ΔG>0"],a:0,ex:"ΔG = -nFE. Positive E → negative ΔG → spontaneous → galvanic/voltaic cell (produces electricity). Negative E → positive ΔG → non-spontaneous → electrolytic cell (requires external voltage). E cell = E cathode - E anode using standard reduction potentials.",mn:"🔑 +E = -ΔG = spontaneous = galvanic cell"},
{id:"gc9",cat:"GEN_CHEM",diff:1,q:"Oxidation is:",o:["Loss of electrons","Gain of electrons","Loss of protons","Gain of protons"],a:0,ex:"OIL RIG: Oxidation Is Loss, Reduction Is Gain. The oxidized species loses electrons (oxidation number increases). In biology: NAD+ is an oxidizing agent (accepts electrons → NADH). NADH is a reducing agent (donates electrons → NAD+). The oxidizing agent itself gets reduced.",mn:"🔑 OIL RIG. LEO the lion goes GER."},
{id:"gc10",cat:"GEN_CHEM",diff:2,q:"Rate law order from:",o:["Experiment only","Balanced equation","Molecular weight","Temperature"],a:0,ex:"Rate law (rate = k[A]^m[B]^n) must be determined experimentally — you CANNOT deduce orders from the balanced equation unless it is an elementary step. Use the method of initial rates: compare experiments varying one reactant while holding others constant.",mn:"🔑 Rate law = experiments! (unless elementary step)"},
{id:"gc11",cat:"GEN_CHEM",diff:3,q:"First-order half-life:",o:["Constant independent of [A]","Doubles with [A]","Depends on initial [A]","Zero"],a:0,ex:"t1/2 = ln2/k = 0.693/k for first order. Half-life is CONSTANT regardless of starting concentration. This applies to radioactive decay and first-order drug elimination. Zero-order: t1/2 = [A]0/2k (depends on [A]). Second-order: t1/2 = 1/(k[A]0).",mn:"🔑 First order: t½ = 0.693/k. Constant like radioactive decay."},
{id:"org1",cat:"ORGO",diff:2,q:"SN1 favored by:",o:["3° weak nuc polar protic","1° strong nuc","2° polar aprotic","Methyl strong base"],a:0,ex:"SN1 proceeds through a carbocation intermediate (rate-determining step). Needs: (1) stable carbocation = 3°>2° (never methyl/1°); (2) weak nucleophile (strong would push SN2); (3) polar protic solvent (stabilizes carbocation through solvation). Gives racemization — nucleophile attacks the planar carbocation from both sides.",mn:"🔑 SN1: stable carbocation + weak nuc + protic → racemization"},
{id:"org2",cat:"ORGO",diff:1,q:"SN2 stereochemistry:",o:["Inversion","Retention","Racemic","No change"],a:0,ex:"SN2: single concerted step. Nucleophile attacks 180° from leaving group (backside attack), forcing Walden inversion — if R, product is S. Favored by: methyl>1°>2° (never 3°), strong nucleophile, polar aprotic solvent. Rate = k[substrate][nucleophile] (bimolecular).",mn:"🔑 Backside attack = umbrella flip = always inverts"},
{id:"org3",cat:"ORGO",diff:2,q:"Bulky base + 2° substrate:",o:["E2","SN2","SN1","E1"],a:0,ex:"E2 wins because the base is too large for the backside attack needed for SN2, so it abstracts a beta-proton instead. E2 is concerted, requires anti-periplanar geometry (H and LG 180° apart), and follows Zaitsev's rule (unless using a bulky base like t-BuOK which gives Hofmann product).",mn:"🔑 Too bulky to sneak in → grabs proton → E2 elimination"},
{id:"org4",cat:"ORGO",diff:2,q:"Markovnikov: H to carbon with:",o:["More existing H's","Fewer H's","More substituents","Leaving group"],a:0,ex:"In electrophilic addition of HX across a double bond, H adds to the less substituted carbon (more H's already), placing X on the more substituted carbon. This gives the more stable carbocation intermediate. Applies to HCl, HBr, HI, acid-catalyzed hydration. Anti-Markovnikov: HBr + peroxides only.",mn:"🔑 Rich get richer. H goes where H's already are."},
{id:"org5",cat:"ORGO",diff:2,q:"Anti-Markovnikov with:",o:["HBr + peroxides","HBr alone","H2O + acid","HCl + heat"],a:0,ex:"Peroxides initiate a radical chain reaction where Br radical adds first to the less substituted carbon (forming the more stable radical intermediate), and H ends up on the more substituted carbon. Only works with HBr + peroxides — not HCl or HI (unfavorable energetics for radical chain with those).",mn:"🔑 Peroxides = radicals = flip Markovnikov. HBr only."},
{id:"org6",cat:"ORGO",diff:1,q:"Enantiomers differ at:",o:["ALL stereocenters","One stereocenter","Connectivity","Formula"],a:0,ex:"Enantiomers are non-superimposable mirror images with ALL stereocenters inverted (R↔S). They have identical physical properties (MP, BP, Rf, solubility) EXCEPT optical rotation (equal and opposite). They also interact differently with other chiral molecules — critical for drug-receptor interactions.",mn:"🔑 Mirror images. Same everything except optical rotation."},
{id:"org7",cat:"ORGO",diff:2,q:"Diastereomers differ at:",o:["Some but not all stereocenters","All","None","Different formulas"],a:0,ex:"Diastereomers are stereoisomers that are NOT mirror images. They differ at some but not all stereocenters. Unlike enantiomers, they have DIFFERENT physical properties (MP, BP, solubility, Rf) and can be separated by standard techniques. Cis/trans (E/Z) isomers are also diastereomers.",mn:"🔑 Not mirrors → different physical properties → separable"},
{id:"org8",cat:"ORGO",diff:3,q:"Aldol condensation nucleophile:",o:["Enolate","Grignard","Alcohol","Halide"],a:0,ex:"A base deprotonates the alpha-carbon of a carbonyl to form an enolate (resonance-stabilized carbanion). This enolate attacks another carbonyl carbon, forming a beta-hydroxy carbonyl ('aldol'). Heating causes dehydration to an alpha-beta-unsaturated carbonyl ('condensation'). Creates new C-C bonds — important in biosynthesis.",mn:"🔑 Enolate = alpha-carbon nucleophile → new C-C bond"},
{id:"org9",cat:"ORGO",diff:2,q:"Zaitsev's rule predicts:",o:["More substituted alkene","Less substituted","Terminal","Cyclic"],a:0,ex:"In E1 and E2, the major product is the more substituted (more stable) alkene due to hyperconjugation. Exception: bulky bases (t-BuOK) give Hofmann product (less substituted) because they preferentially abstract the less hindered proton.",mn:"🔑 Zaitsev = more substituted alkene wins"},
{id:"org10",cat:"ORGO",diff:3,q:"Reduces COOH to 1° alcohol:",o:["LiAlH4","NaBH4","H2/Pd","PCC"],a:0,ex:"LiAlH4 = powerful, non-selective reducing agent. Reduces: COOH→1° alcohol, esters→2 alcohols, amides→amines, aldehydes→1° alcohols, ketones→2° alcohols. NaBH4 = milder, only reduces aldehydes and ketones. PCC = OXIDIZING agent (1° alcohol→aldehyde). H2/Pd = catalytic hydrogenation (reduces C=C).",mn:"🔑 LiAlH4 = reduces everything. NaBH4 = gentle. PCC = oxidizer."},
{id:"ph1",cat:"PHYSICS",diff:2,q:"Bernoulli: velocity up means:",o:["Pressure down","Pressure up","Same","Density up"],a:0,ex:"P + 1/2*rho*v^2 + rho*g*h = constant. If velocity increases (narrower pipe), pressure must decrease. Applications: airplane lift (faster air over curved top), Venturi effect, and cardiovascular stenosis (narrowing → faster blood → lower lateral pressure).",mn:"🔑 Fast flow = low pressure. Think airplane wings."},
{id:"ph2",cat:"PHYSICS",diff:1,q:"E-field units:",o:["N/C = V/m","C/m","J/C","N*m"],a:0,ex:"E = F/q (N/C) = -dV/dx (V/m). Both equivalent. For a point charge: E = kQ/r^2. Between parallel plates: E = V/d (uniform field). E-field lines: positive → negative. Inside a conductor at equilibrium: E = 0.",mn:"🔑 N/C = V/m. Both are electric field."},
{id:"ph3",cat:"PHYSICS",diff:1,q:"Double distance, electrostatic force:",o:["1/4","1/2","Same","Double"],a:0,ex:"Coulomb's law: F = kq1q2/r^2. Inverse SQUARE: double r → F/(2^2) = F/4. Triple r → F/9. Same relationship applies to gravity (F = Gm1m2/r^2), electric field from point charge, light intensity, and sound intensity.",mn:"🔑 Inverse square: 2x distance → 1/4 force"},
{id:"ph4",cat:"PHYSICS",diff:2,q:"Concave mirror object past C:",o:["Real inverted smaller","Virtual upright larger","Real upright","No image"],a:0,ex:"Object positions for concave mirrors: Beyond C → real, inverted, smaller (between F and C). At C → real, inverted, same size. Between C and F → real, inverted, larger. At F → no image (parallel rays). Inside F → virtual, upright, larger. Use 1/f = 1/do + 1/di.",mn:"🔑 Past C = small inverted real. Inside F = large upright virtual."},
{id:"ph5",cat:"PHYSICS",diff:2,q:"A1v1 = A2v2 applies to:",o:["Incompressible fluids","Compressible gases","Turbulent flow","Fluids at rest"],a:0,ex:"Continuity equation = conservation of mass for incompressible fluids. Volume flow rate Q = Av is constant throughout. Narrow pipe → faster flow. Combined with Bernoulli: narrow → faster → lower pressure. In blood vessels: atherosclerotic plaque → faster flow → lower lateral pressure.",mn:"🔑 Narrow = faster (garden hose trick). Q = Av = constant."},
{id:"ph6",cat:"PHYSICS",diff:2,q:"Open-open tube harmonics:",o:["All integers (f 2f 3f)","Odd only","Even only","None"],a:0,ex:"Open ends = antinodes. Closed ends = nodes. Open-open: antinodes at both ends → all harmonics, L = n*lambda/2. Closed-open: node + antinode → only ODD harmonics, L = n*lambda/4 (n=odd). Closed-open also has a lower fundamental frequency for the same length.",mn:"🔑 Open-open = ALL. Closed-open = ODD only."},
{id:"ph7",cat:"PHYSICS",diff:1,q:"Work = 0 when force is:",o:["Perpendicular to displacement","Parallel","Antiparallel","45 degrees"],a:0,ex:"W = Fd*cos(theta). At 90°, cos90 = 0 → W = 0. Examples: normal force on horizontally moving object, centripetal force (always perpendicular to velocity), gravity on horizontally carried box. Parallel (0°) = max work. Antiparallel (180°) = negative work (friction).",mn:"🔑 Perpendicular = zero work. Parallel = max work."},
{id:"ph8",cat:"PHYSICS",diff:2,q:"Thin lens equation:",o:["1/f = 1/do + 1/di","f = do + di","f = do*di","1/f = 1/do - 1/di"],a:0,ex:"Works for both mirrors and thin lenses. Converging lens: f positive. Diverging: f negative. Real image (opposite side): di positive. Virtual (same side): di negative. Magnification m = -di/do. Power (diopters) = 1/f (meters). Two lenses: 1/f_total = 1/f1 + 1/f2.",mn:"🔑 1/f = 1/do + 1/di. Memorize sign conventions!"},
{id:"ph9",cat:"PHYSICS",diff:1,q:"Sound fastest through:",o:["Solids","Liquids","Gases","Vacuum"],a:0,ex:"Sound requires a medium (cannot travel through vacuum — unlike EM waves). Speed: solids > liquids > gases because molecules are closer and transmit vibrations faster. Steel ~5000 m/s, water ~1500 m/s, air ~340 m/s. In gases: v proportional to sqrt(T/M). This is OPPOSITE to EM waves which travel fastest in vacuum.",mn:"🔑 Sound: solid > liquid > gas. Cannot travel through vacuum."},
{id:"ph10",cat:"PHYSICS",diff:2,q:"Total internal reflection requires:",o:["High n to low n","Low to high","Same n","Any direction"],a:0,ex:"TIR needs: (1) light from higher refractive index → lower, AND (2) angle of incidence exceeds critical angle (theta_c = arcsin(n2/n1)). Below critical angle: both refraction and reflection. At critical angle: refracted ray at 90°. Above: all light reflected. Applications: fiber optics, diamond brilliance.",mn:"🔑 High→Low + exceed critical angle = total reflection"},
{id:"ph11",cat:"PHYSICS",diff:3,q:"Parallel plate capacitance:",o:["epsilon_0*A/d","epsilon_0*d/A","Q/V^2","V/Q"],a:0,ex:"C = kappa*epsilon_0*A/d. Larger plates (A) or smaller gap (d) → more capacitance. Dielectric material between plates increases C by factor kappa. Disconnected from battery + insert dielectric: C up, Q same, V down. Connected: C up, V same, Q up.",mn:"🔑 C = epsilon*A/d. Big plates, small gap, dielectric = more."},
{id:"ps1",cat:"PSYCH_SOC",diff:1,q:"Object permanence — Piaget stage:",o:["Sensorimotor 0-2","Preoperational 2-7","Concrete operational 7-11","Formal operational 12+"],a:0,ex:"Piaget stages: (1) Sensorimotor (0-2): senses + motor, object permanence at ~8mo; (2) Preoperational (2-7): symbolic thinking but egocentrism, no conservation; (3) Concrete operational (7-11): logical thought about concrete things, conservation; (4) Formal operational (12+): abstract/hypothetical thinking.",mn:"🔑 Sensorimotor = object permanence. Preoperational = egocentrism."},
{id:"ps2",cat:"PSYCH_SOC",diff:1,q:"Bystander effect explained by:",o:["Diffusion of responsibility","Social facilitation","Groupthink","Deindividuation"],a:0,ex:"More bystanders → less likely any individual helps. Diffusion of responsibility: each assumes someone else will act. Also involves pluralistic ignorance (others seem calm so it must be fine) and evaluation apprehension (fear of looking foolish). Overcome by singling someone out specifically.",mn:"🔑 More watchers = less help. Responsibility dilutes."},
{id:"ps3",cat:"PSYCH_SOC",diff:1,q:"Erikson adolescent crisis:",o:["Identity vs Role Confusion","Intimacy vs Isolation","Initiative vs Guilt","Trust vs Mistrust"],a:0,ex:"Erikson's 8 stages: Trust/Mistrust (0-1), Autonomy/Shame (1-3), Initiative/Guilt (3-6), Industry/Inferiority (6-12), Identity/Role Confusion (12-18), Intimacy/Isolation (18-40), Generativity/Stagnation (40-65), Integrity/Despair (65+). Teens explore 'Who am I?'",mn:"🔑 Teens = identity crisis. Young adults = intimacy."},
{id:"ps4",cat:"PSYCH_SOC",diff:2,q:"Schachter-Singer two-factor:",o:["Arousal + cognitive label","Only arousal","Cognition first","Facial feedback"],a:0,ex:"Three emotion theories: James-Lange: body → emotion. Cannon-Bard: simultaneous/independent. Schachter-Singer: arousal + cognitive labeling = emotion. Same arousal can become different emotions based on context (bridge study: scary bridge arousal mislabeled as attraction).",mn:"🔑 Two factors: body buzz + brain interpretation = emotion"},
{id:"ps5",cat:"PSYCH_SOC",diff:1,q:"Classical conditioning by:",o:["Pavlov","Skinner","Bandura","Watson"],a:0,ex:"Pavlov's dogs: bell (NS→CS) paired with food (UCS) → bell alone produces salivation (CR). Key terms: acquisition, extinction, spontaneous recovery, generalization, discrimination. Watson applied this to human fear (Little Albert). Skinner developed operant conditioning (consequences shape behavior).",mn:"🔑 Pavlov = involuntary associations. Skinner = voluntary behavior."},
{id:"ps6",cat:"PSYCH_SOC",diff:2,q:"Negative reinforcement:",o:["Remove aversive → increase behavior","Add punishment","Remove pleasant","Ignore"],a:0,ex:"Operant conditioning 4 quadrants: Positive reinforcement (add pleasant → increase). Negative reinforcement (remove unpleasant → increase). Positive punishment (add unpleasant → decrease). Negative punishment (remove pleasant → decrease). Key: positive=add, negative=remove, reinforcement=increase, punishment=decrease.",mn:"🔑 Negative=remove. Reinforcement=increase. NOT punishment!"},
{id:"ps7",cat:"PSYCH_SOC",diff:2,q:"Conventional morality:",o:["Follow rules for social order","Self-interest","Universal principles","Seek rewards"],a:0,ex:"Kohlberg: Pre-conventional (1-2): self-interest, avoid punishment. Conventional (3-4): conform to norms, maintain order — 'good boy/girl' and law-and-order. Post-conventional (5-6): social contract, universal ethical principles. Most adults remain at conventional level.",mn:"🔑 Pre=selfish. Conventional=conformist. Post=principled."},
{id:"ps8",cat:"PSYCH_SOC",diff:2,q:"Broca area damage:",o:["Cannot produce speech","Cannot understand","Visual loss","Memory loss"],a:0,ex:"Broca's (left inferior frontal): speech PRODUCTION. Damage = expressive/non-fluent aphasia — understands but can't produce fluent speech, output is halting and telegraphic. Wernicke's (left superior temporal): COMPREHENSION. Damage = receptive/fluent aphasia — produces fluent but meaningless 'word salad.'",mn:"🔑 Broca = Broken output. Wernicke = Wordy nonsense."},
{id:"ps9",cat:"PSYCH_SOC",diff:2,q:"James-Lange theory:",o:["Body reacts THEN emotion","Simultaneous","Cognition first","Facial expressions"],a:0,ex:"James-Lange: stimulus → physiological arousal → brain interprets body state → conscious emotion. 'You do not run because you are afraid; you are afraid because you run.' Evidence: spinal cord injury patients report diminished emotional intensity. Criticism: same body response (racing heart) for different emotions.",mn:"🔑 Body FIRST → brain interprets → emotion"},
{id:"ps10",cat:"PSYCH_SOC",diff:3,q:"Symbolic interactionism:",o:["Meaning through social interaction","Large-scale structures","Biology","Unconscious"],a:0,ex:"Three sociological perspectives: Functionalism (Durkheim): parts work together for stability. Conflict theory (Marx): power struggles and inequality. Symbolic interactionism (Mead, Cooley): micro-level, meaning created through daily interactions and shared symbols. Language and gestures are negotiated between individuals.",mn:"🔑 Micro-level. Meaning = interactions + shared symbols."},
{id:"ps11",cat:"PSYCH_SOC",diff:2,q:"Fundamental attribution error:",o:["Over-attribute others to disposition","Own to situation","Victim blaming","Just world"],a:0,ex:"FAE: when explaining OTHERS' behavior, we overemphasize internal factors (personality) and underestimate situational factors. For OUR behavior, we do the opposite (actor-observer bias). Self-serving bias: attribute our success to internal factors, failure to external. Just-world hypothesis: people get what they deserve.",mn:"🔑 Others fail = 'lazy.' I fail = 'bad luck.'"},
{id:"ps12",cat:"PSYCH_SOC",diff:2,q:"Maslow hierarchy base:",o:["Physiological","Safety","Love/belonging","Self-actualization"],a:0,ex:"Bottom to top: Physiological (food, water, sleep) → Safety → Love/belonging → Esteem → Self-actualization. Lower needs must be substantially met before higher needs motivate. Criticism: too rigid/Western-centric; some pursue higher needs despite unmet lower ones.",mn:"🔑 Bottom = survival. Top = self-actualization. Lower first."},
{id:"bs1",cat:"BIO_SYSTEMS",diff:1,q:"SA node location:",o:["Right atrium","Left atrium","Right ventricle","Left ventricle"],a:0,ex:"Conduction pathway: SA node (right atrium, pacemaker at 60-100 bpm) → AV node (40-60 bpm backup) → Bundle of His → left/right bundle branches → Purkinje fibers. Vagus nerve (parasympathetic) slows SA node; sympathetic speeds it up.",mn:"🔑 SA = Start Atrium = pacemaker in right atrium"},
{id:"bs2",cat:"BIO_SYSTEMS",diff:2,q:"ADH acts on:",o:["Collecting duct","PCT","Ascending loop","Glomerulus"],a:0,ex:"ADH (vasopressin) from posterior pituitary inserts aquaporin-2 channels into collecting duct apical membrane → water reabsorbed → concentrated urine. Without ADH: dilute urine (diabetes insipidus). Alcohol inhibits ADH → frequent urination and dehydration.",mn:"🔑 ADH = aquaporins in collecting duct → water retention"},
{id:"bs3",cat:"BIO_SYSTEMS",diff:2,q:"Sympathetic releases at targets:",o:["Norepinephrine","ACh","Dopamine","Serotonin"],a:0,ex:"ALL preganglionic neurons (both divisions) release ACh at nicotinic receptors. Postganglionic: sympathetic → NE at adrenergic receptors (except sweat glands → ACh). Parasympathetic → ACh at muscarinic receptors. Adrenal medulla releases epi (80%) and NE (20%) into blood. Alpha1=vasoconstriction, Beta1=heart, Beta2=bronchodilation.",mn:"🔑 Sympathetic postganglionic = NE (except sweat = ACh)"},
{id:"bs4",cat:"BIO_SYSTEMS",diff:2,q:"GFR regulated by:",o:["Afferent/efferent arterioles","BP only","ADH only","Urine volume"],a:0,ex:"GFR adjusted by afferent (arriving) and efferent (exiting) arteriole tone. Dilate afferent OR constrict efferent → more glomerular pressure → more GFR. RAAS: angiotensin II constricts efferent → maintains GFR when BP low. NSAIDs block prostaglandins that dilate afferent → can decrease GFR dangerously.",mn:"🔑 Afferent=Arriving, Efferent=Exiting. Constrict efferent → more GFR."},
{id:"bs5",cat:"BIO_SYSTEMS",diff:1,q:"T cells mature in:",o:["Thymus","Bone marrow","Spleen","Lymph nodes"],a:0,ex:"T=Thymus (positive and negative selection for self-tolerance). B=Bone marrow. Both originate from bone marrow stem cells. CD4+ T-helper cells activate other immune cells. CD8+ cytotoxic T cells kill infected/cancer cells. T-reg cells suppress immune response to prevent autoimmunity.",mn:"🔑 T=Thymus, B=Bone marrow. Both start in bone marrow."},
{id:"bs6",cat:"BIO_SYSTEMS",diff:1,q:"Universal RBC donor:",o:["O negative","AB positive","O positive","A negative"],a:0,ex:"Type O: no A/B antigens. Rh negative: no Rh antigen. O- has NO antigens → safe for any recipient. AB+ has ALL antigens → universal recipient (won't make antibodies against donor blood). For plasma donation it reverses: AB = universal plasma donor.",mn:"🔑 O neg = universal RBC donor. AB+ = universal recipient."},
{id:"bs7",cat:"BIO_SYSTEMS",diff:3,q:"Aldosterone effect:",o:["Na+ reabsorption up K+ secretion up","Water directly","Na+ down","Glucose up"],a:0,ex:"Aldosterone from adrenal cortex acts on DCT/collecting duct principal cells: increases Na+/K+-ATPase and ENaC channels. Na+ reabsorbed, K+ and H+ secreted. Water follows Na+ passively. Part of RAAS: low BP → renin → angiotensin II → aldosterone. Hyperaldosteronism → hypokalemia + metabolic alkalosis.",mn:"🔑 Aldosterone: Na+ in, K+ out, H+ out. Holds onto salt."},
{id:"bs8",cat:"BIO_SYSTEMS",diff:2,q:"Hemoglobin O2 curve:",o:["Sigmoidal","Hyperbolic","Linear","Exponential"],a:0,ex:"Hemoglobin (4 subunits, alpha2beta2) has cooperative O2 binding → sigmoidal curve. Myoglobin (single subunit) has no cooperativity → hyperbolic curve with higher affinity at all PO2 values. The sigmoidal shape allows efficient loading in lungs (high PO2) and unloading in tissues (low PO2).",mn:"🔑 Hb = sigmoidal (cooperative). Mb = hyperbolic (single subunit)."},
{id:"bs9",cat:"BIO_SYSTEMS",diff:3,q:"Right shift Hb curve caused by:",o:["More CO2 H+ temp BPG","Less CO2","Higher pH","More CO"],a:0,ex:"Right shift = decreased O2 affinity = release O2 more easily to active tissues. Caused by: increased CO2, increased H+ (Bohr effect), increased temperature, increased 2,3-BPG. These are all conditions found in actively metabolizing tissues. Left shift = increased affinity (fetal Hb, CO poisoning, opposite conditions). CADET face Right.",mn:"🔑 CADET: CO2, Acid, DPG, Exercise, Temperature → Right shift"},
{id:"mb1",cat:"MOLECULAR_BIO",diff:1,q:"Helicase function:",o:["Unwinds DNA helix","Relieves tension","Makes primers","Synthesizes DNA"],a:0,ex:"Replication fork team: Helicase unwinds (breaks H-bonds). Topoisomerase relieves supercoiling tension AHEAD. SSBs stabilize single strands. Primase makes RNA primers. DNA Pol III (pro) or delta/epsilon (eu) synthesizes new strand 5 to 3.",mn:"🔑 Helicase = Helix-ase = unzips DNA"},
{id:"mb2",cat:"MOLECULAR_BIO",diff:2,q:"Wobble position:",o:["3rd codon position","1st","2nd","All"],a:0,ex:"64 codons for 20 AAs → degenerate code. Most redundancy at position 3. The 1st anticodon position (pairs with 3rd codon position) allows non-standard base pairs (G-U, inosine-U/C/A). One tRNA can recognize multiple codons differing at position 3.",mn:"🔑 Position 3 wobbles → code degeneracy"},
{id:"mb3",cat:"MOLECULAR_BIO",diff:2,q:"5 prime cap is:",o:["7-methylguanosine","Poly-A","Intron","Methyl-C"],a:0,ex:"Eukaryotic mRNA processing: (1) 5 prime cap: 7-methylguanosine via unusual 5-5 triphosphate linkage → protects from exonuclease, ribosome recognition, nuclear export. (2) 3 prime poly-A tail: ~200 As → stability, export. (3) Splicing: spliceosome (snRNPs) removes introns, joins exons.",mn:"🔑 Cap = protective helmet. Poly-A = protective cushion."},
{id:"mb4",cat:"MOLECULAR_BIO",diff:2,q:"Okazaki fragments on:",o:["Lagging strand","Leading","Both","mRNA"],a:0,ex:"DNA pol only synthesizes 5 to 3. Leading strand: continuous (toward fork). Lagging strand: discontinuous Okazaki fragments (away from fork), each needing its own primer. DNA Pol I removes primers and fills gaps. DNA ligase seals nicks between fragments.",mn:"🔑 Lagging = discontinuous fragments. Ligase = glue."},
{id:"mb5",cat:"MOLECULAR_BIO",diff:1,q:"DNA pol direction:",o:["5 to 3","3 to 5","Both","Random"],a:0,ex:"ALL DNA polymerases build 5 to 3 only — they add nucleotides to a free 3 prime OH group. They READ template 3 to 5. Proofreading: 3 to 5 exonuclease activity removes mismatches. Error rate: about 1 in 10^9. RNA polymerase also builds 5 to 3 but needs no primer.",mn:"🔑 Build 5→3. Read template 3→5. No exceptions ever."},
{id:"mb6",cat:"MOLECULAR_BIO",diff:3,q:"Nonsense mutation produces:",o:["Premature stop codon","Different AA","Frameshift","No change"],a:0,ex:"Point mutations: Silent = same AA (usually wobble position change). Missense = different AA (e.g., sickle cell GAG→GTG = Glu→Val). Nonsense = new STOP codon (UAA/UAG/UGA) → truncated protein. Frameshift = insertion/deletion (not multiple of 3) → everything downstream scrambled.",mn:"🔑 Nonsense=STOP. Missense=wrong AA. Silent=same. Frameshift=all downstream wrong."},
{id:"mb7",cat:"MOLECULAR_BIO",diff:2,q:"Lac operon induced by:",o:["Allolactose when lactose present glucose absent","Glucose","ATP","Tryptophan"],a:0,ex:"Full activation needs two signals: (1) Lactose present → allolactose binds and removes repressor from operator. (2) Glucose absent → cAMP rises → cAMP-CAP complex binds upstream → enhances RNA polymerase binding. With glucose present, even with lactose, only basal transcription occurs. Glucose is always preferred — why make lactose enzymes when glucose is available?",mn:"🔑 Full induction = lactose ON + glucose OFF"},
{id:"mb8",cat:"MOLECULAR_BIO",diff:3,q:"Telomerase prevents:",o:["Chromosome shortening","Mismatch errors","DNA unwinding","Methylation"],a:0,ex:"End replication problem: DNA pol needs a primer, so chromosome ends shorten by 50-200bp each division. Telomeres (TTAGGG repeats, ~2500x) buffer this. Telomerase is a reverse transcriptase with its own RNA template that extends telomeres. Active in stem cells, germ cells, and ~90% of cancers. Somatic cells: low/no telomerase → Hayflick limit (~50 divisions).",mn:"🔑 Telomerase = reverse transcriptase extending chromosome ends"},
{id:"mb9",cat:"MOLECULAR_BIO",diff:2,q:"Prokaryotic vs eukaryotic ribosomes:",o:["70S vs 80S","80S vs 70S","Both 80S","Both 70S"],a:0,ex:"Pro: 70S (30S + 50S). Eu: 80S (40S + 60S). Svedberg units are NOT additive. Many antibiotics target 70S specifically without harming our 80S: chloramphenicol/macrolides (50S), tetracyclines/aminoglycosides (30S). Mitochondrial ribosomes are 70S — supporting endosymbiotic theory.",mn:"🔑 Pro=70S, Eu=80S. Antibiotics target 70S."},
{id:"mb10",cat:"MOLECULAR_BIO",diff:3,q:"p53 function:",o:["Arrest cell cycle and trigger apoptosis on DNA damage","Promote division","Activate telomerase","Increase mutations"],a:0,ex:"p53 = guardian of the genome. When DNA damage detected: activates p21 (inhibits cyclin-CDK → G1/S arrest), activates repair enzymes, and triggers apoptosis if damage is irreparable (intrinsic/mitochondrial pathway). Loss of p53 (both alleles — two-hit hypothesis) removes this checkpoint → damaged cells proliferate → cancer. Mutated in over 50% of all cancers.",mn:"🔑 p53: damage → STOP cycle → repair or self-destruct"},
];

const MODES={BLITZ:{name:"Blitz",icon:"⚡",desc:"30s per question",time:30},MARATHON:{name:"Marathon",icon:"🏃",desc:"No timer, deep learning",time:null},BOSS_BATTLE:{name:"Boss Battle",icon:"👹",desc:"5 hard Qs, 3 lives",time:45},HARD_QS:{name:"Hard Questions",icon:"💀",desc:"Questions you get wrong most",time:null,smart:true},NEW_QS:{name:"New Questions",icon:"✨",desc:"Unseen questions",time:null,smart:true},WEAK_TOPICS:{name:"Weak Topics",icon:"🎯",desc:"Your lowest categories",time:null,smart:true},REVIEW:{name:"Review Missed",icon:"📝",desc:"Replay recent mistakes",time:null,smart:true}};
const RANKS=[{name:"Pre-Med Newbie",min:0,b:"🥚"},{name:"Anatomy Apprentice",min:100,b:"🐣"},{name:"Lab Rat",min:300,b:"🐁"},{name:"Study Machine",min:600,b:"⚙️"},{name:"Knowledge Knight",min:1000,b:"🛡️"},{name:"Science Sorcerer",min:1800,b:"🧙"},{name:"MCAT Warrior",min:3000,b:"⚔️"},{name:"528 Legend",min:5000,b:"👑"}];
function getRank(x){let r=RANKS[0];for(const k of RANKS)if(x>=k.min)r=k;return r;}
function getNext(x){for(const r of RANKS)if(x<r.min)return r;return null;}
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
const DD={xp:0,totalCorrect:0,totalAnswered:0,bestStreak:0,questionStats:{},sessionHistory:[]};
function getCatAcc(data,cat){const qs=QS.filter(q=>q.cat===cat);let s=0,c=0;qs.forEach(q=>{const st=data.questionStats[q.id];if(st){s+=st.seen;c+=st.correct;}});return{seen:s,correct:c,pct:s>0?Math.round(c/s*100):null};}
function getSmartPool(mode,data){
  if(mode==="HARD_QS"){const h=QS.filter(q=>{const s=data.questionStats[q.id];return s&&s.seen>=1&&(s.correct/s.seen)<0.7;});return h.length?{pool:h}:{msg:"No hard questions yet!"};}
  if(mode==="NEW_QS"){const u=QS.filter(q=>!data.questionStats[q.id]);return u.length?{pool:u}:{msg:"All questions seen!"};}
  if(mode==="WEAK_TOPICS"){const cs=Object.keys(CATS).map(k=>({key:k,...getCatAcc(data,k)})).filter(c=>c.seen>=2).sort((a,b)=>a.pct-b.pct);if(!cs.length)return{msg:"Play more!"};return{pool:QS.filter(q=>cs.slice(0,3).some(c=>c.key===q.cat))};}
  if(mode==="REVIEW"){const m=QS.filter(q=>{const s=data.questionStats[q.id];return s&&s.seen>0&&(s.correct/s.seen)<0.6;});return m.length?{pool:m}:{msg:"No missed questions!"};}
  return{pool:QS};
}
function buildQSet(pool,mode){const count=mode==="BOSS_BATTLE"?5:Math.min(15,pool.length);const byCat={};pool.forEach(q=>{if(!byCat[q.cat])byCat[q.cat]=[];byCat[q.cat].push(q);});Object.keys(byCat).forEach(k=>{byCat[k]=shuf(byCat[k]);});const ck=shuf(Object.keys(byCat));const picked=[];let r=0;while(picked.length<count){let any=false;for(const c of ck){if(picked.length>=count)break;if(r<byCat[c].length){picked.push(byCat[c][r]);any=true;}}if(!any)break;r++;}return shuf(picked).map(q=>{const ct=q.o[q.a];const so=shuf([...q.o]);return{...q,o:so,a:so.indexOf(ct)};});}

function PinScreen({onLogin}){
  const[pin,setPin]=useState("");const[loading,setLoading]=useState(false);const[err,setErr]=useState("");const saved=getSavedPin();
  useEffect(()=>{if(saved){setPin(saved);dl(saved);}},[]);
  async function dl(p){if(p.length<3){setErr("PIN must be 3+ chars");return;}setLoading(true);setErr("");const d=await loadFromCloud(p);rememberPin(p);onLogin(p,d||{...DD});}
  if(saved&&loading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0f0f14"}}><div style={{textAlign:"center"}}><div style={{fontSize:48,animation:"pulse 1.5s infinite"}}>🧬</div><div style={{fontSize:12,color:"#555",marginTop:10}}>Loading progress...</div></div></div>;
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0f0f14",padding:20}}><div style={{maxWidth:340,width:"100%",textAlign:"center"}}><div style={{fontSize:52,marginBottom:8}}>🧬</div><h1 style={{fontSize:28,fontWeight:900,color:"#fff",letterSpacing:3,margin:"0 0 4px"}}>MCAT<span style={{background:"linear-gradient(135deg,#667eea,#764ba2)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>QUEST</span></h1><p style={{fontSize:11,color:"#555",marginBottom:30,letterSpacing:2}}>ENTER PIN TO SYNC PROGRESS</p><input type="text" value={pin} onChange={e=>setPin(e.target.value.toLowerCase().replace(/[^a-z0-9]/g,""))} onKeyDown={e=>e.key==="Enter"&&dl(pin)} placeholder="your-pin" style={{width:"100%",padding:"14px 16px",background:"rgba(255,255,255,0.06)",border:"1.5px solid rgba(255,255,255,0.12)",borderRadius:10,color:"#fff",fontSize:18,fontFamily:"inherit",textAlign:"center",letterSpacing:4,outline:"none"}} autoFocus /><p style={{fontSize:10,color:"#666",marginTop:8,lineHeight:1.5}}>Same PIN on every device. New PIN = new save.</p>{err&&<p style={{fontSize:11,color:"#f87171",marginTop:8}}>{err}</p>}<button onClick={()=>dl(pin)} disabled={loading||pin.length<3} style={{width:"100%",padding:14,marginTop:16,background:pin.length>=3?"linear-gradient(135deg,#667eea,#764ba2)":"rgba(255,255,255,0.06)",color:"#fff",borderRadius:10,fontSize:15,fontWeight:700,letterSpacing:1,opacity:pin.length>=3?1:.4}}>{loading?"Loading...":"Enter"}</button></div></div>;
}

function Game({pin,initialData}){
  const[scr,setScr]=useState("home");const[data,setData]=useState(initialData);const[ss,setSS]=useState("");const[streak,setStreak]=useState(0);const[gm,setGM]=useState(null);const[selCats,setSelCats]=useState([]);const[qs,setQs]=useState([]);const[qi,setQI]=useState(0);const[sel,setSel]=useState(null);const[sr,setSR]=useState(false);const[tl,setTL]=useState(null);const[sScore,setSScore]=useState(0);const[sCorrect,setSC]=useState(0);const[sTotal,setST]=useState(0);const[wrong,setWrong]=useState([]);const[shake,setShake]=useState(false);const[flash,setFlash]=useState(false);const[lives,setLives]=useState(3);const[showMn,setShowMn]=useState(false);const[sTab,setSTab]=useState("overview");const tr=useRef(null);

  useEffect(()=>{const t=setTimeout(async()=>{setSS("saving");const ok=await saveToCloud(pin,data);setSS(ok?"saved":"error");if(ok)setTimeout(()=>setSS(""),1500);},600);return()=>clearTimeout(t);},[data]);
  useEffect(()=>{if(tl===null||tl<=0||sr)return;tr.current=setTimeout(()=>setTL(t=>t-1),1000);return()=>clearTimeout(tr.current);},[tl,sr]);
  useEffect(()=>{if(tl===0&&!sr)handleAnswer(-1);},[tl]);

  const startGame=(mode,cats)=>{let pool;if(MODES[mode].smart){const r=getSmartPool(mode,data);if(!r.pool){alert(r.msg);return;}pool=r.pool;}else{const ck=cats.length?cats:Object.keys(CATS);pool=QS.filter(q=>ck.includes(q.cat));}const built=buildQSet(pool,mode);setQs(built);setQI(0);setSel(null);setSR(false);setSScore(0);setSC(0);setST(0);setWrong([]);setGM(mode);setLives(3);setShowMn(false);setStreak(0);setTL(MODES[mode].time||null);setScr("play");};
  const handleAnswer=(idx)=>{if(sr)return;const q=qs[qi];const correct=idx===q.a;setSel(idx);setSR(true);setST(t=>t+1);clearTimeout(tr.current);let earned=0;if(correct){const tb=tl?Math.floor(tl*2):0;const sb=streak>=5?25:streak>=3?15:0;earned=(gm==="BOSS_BATTLE"?30:15)+tb+sb+(q.diff||1)*3;setSScore(s=>s+earned);setSC(c=>c+1);setStreak(s=>s+1);setFlash(true);setTimeout(()=>setFlash(false),600);}else{setStreak(0);setWrong(w=>[...w,q]);setShake(true);setTimeout(()=>setShake(false),500);if(gm==="BOSS_BATTLE")setLives(l=>l-1);}setData(d=>{const st={...d.questionStats};const p=st[q.id]||{seen:0,correct:0,lastSeen:null,streak:0};st[q.id]={seen:p.seen+1,correct:p.correct+(correct?1:0),lastSeen:Date.now(),streak:correct?p.streak+1:0};return{...d,xp:d.xp+earned,totalCorrect:d.totalCorrect+(correct?1:0),totalAnswered:d.totalAnswered+1,bestStreak:correct?Math.max(d.bestStreak,streak+1):d.bestStreak,questionStats:st};});};
  const nextQ=()=>{if(gm==="BOSS_BATTLE"&&lives<=0){fin();return;}if(qi+1>=qs.length){fin();return;}setQI(i=>i+1);setSel(null);setSR(false);setShowMn(false);if(MODES[gm].time)setTL(MODES[gm].time);};
  const fin=()=>{setData(d=>({...d,sessionHistory:[...d.sessionHistory,{date:Date.now(),mode:gm,correct:sCorrect,total:sTotal,score:sScore,cats:[...new Set(qs.map(q=>q.cat))]}].slice(-50)}));setScr("results");};

  const rank=getRank(data.xp);const nr=getNext(data.xp);const newC=QS.filter(q=>!data.questionStats[q.id]).length;const hardC=QS.filter(q=>{const s=data.questionStats[q.id];return s&&s.seen>=1&&(s.correct/s.seen)<0.7;}).length;const missC=QS.filter(q=>{const s=data.questionStats[q.id];return s&&s.seen>0&&(s.correct/s.seen)<0.6;}).length;const weakC=Object.keys(CATS).map(k=>({key:k,...getCatAcc(data,k)})).filter(c=>c.seen>=2).sort((a,b)=>a.pct-b.pct).slice(0,3);
  const SB=()=>ss? <div style={{position:"fixed",bottom:12,right:12,fontSize:9,padding:"4px 10px",borderRadius:10,background:ss==="saved"?"rgba(74,222,128,.15)":ss==="error"?"rgba(248,113,113,.15)":"rgba(102,126,234,.15)",color:ss==="saved"?"#4ade80":ss==="error"?"#f87171":"#667eea",zIndex:999}}>{ss==="saving"?"💾 Syncing...":ss==="saved"?"✅ Synced":"⚠️ Error"}</div>:null;

  if(scr==="home"){const acc=data.totalAnswered>0?Math.round(data.totalCorrect/data.totalAnswered*100):0;
  return <div style={S.c}><SB /><div style={S.i}>
    <div style={{textAlign:"center",mb:20,marginBottom:20}}><div style={{fontSize:42}}>🧬</div><h1 style={S.t}>MCAT<span style={S.a}>QUEST</span></h1><p style={{fontSize:11,color:"#555",letterSpacing:2,textTransform:"uppercase"}}>Master the MCAT through play</p></div>
    <div style={S.sb}><div style={S.si}><span style={S.sv}>{rank.b} {rank.name}</span><span style={S.sl}>Rank</span></div><div style={S.dv} /><div style={S.si}><span style={S.sv}>{data.xp} XP</span><span style={S.sl}>Experience</span></div><div style={S.dv} /><div style={S.si}><span style={S.sv}>{acc}%</span><span style={S.sl}>Accuracy</span></div><div style={S.dv} /><div style={S.si}><span style={S.sv}>{data.totalAnswered}</span><span style={S.sl}>Answered</span></div></div>
    {nr&& <div style={{marginBottom:20,textAlign:"center"}}><div style={{height:6,background:"rgba(255,255,255,.08)",borderRadius:3,overflow:"hidden",marginBottom:4}}><div style={{height:"100%",background:"linear-gradient(90deg,#667eea,#764ba2)",borderRadius:3,transition:"width .5s",width:`${Math.min(((data.xp-rank.min)/(nr.min-rank.min))*100,100)}%`}} /></div><span style={{fontSize:10,color:"#555"}}>{nr.min-data.xp} XP to {nr.b} {nr.name}</span></div>}
    <div style={{marginBottom:20}}><div style={S.sh}><span style={S.sln} /><span style={S.stt}>TOPIC MASTERY</span><span style={S.sln} /></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5}}>{Object.entries(CATS).map(([k,cat])=>{const ac=getCatAcc(data,k);const p=ac.pct??0;const c=p>=80?"#4ade80":p>=60?"#fbbf24":p>0?"#f87171":"#333";return <div key={k} style={{padding:"7px 4px",background:"rgba(255,255,255,.03)",borderRadius:7,textAlign:"center",borderBottom:`2px solid ${c}`}}><div style={{fontSize:15}}>{cat.icon}</div><div style={{fontSize:8,color:"#777",marginTop:1}}>{cat.name}</div><div style={{fontSize:12,fontWeight:700,color:c,marginTop:1}}>{ac.seen>0?`${p}%`:"—"}</div></div>;})}</div></div>
    <div style={S.sh}><span style={S.sln} /><span style={S.stt}>GAME MODES</span><span style={S.sln} /></div>
    <div style={{display:"flex",flexDirection:"column",gap:6}}>{["BLITZ","MARATHON","BOSS_BATTLE"].map(key=> <button key={key} style={S.mc} onClick={()=>{setGM(key);setScr("select_cats");}}><span style={{fontSize:22,width:32,textAlign:"center"}}>{MODES[key].icon}</span><div><span style={{fontSize:13,fontWeight:700,color:"#fff",display:"block"}}>{MODES[key].name}</span><span style={{fontSize:10,color:"#666"}}>{MODES[key].desc}</span></div></button>)}</div>
    <div style={{...S.sh,marginTop:16}}><span style={S.sln} /><span style={S.stt}>SMART PRACTICE</span><span style={S.sln} /></div>
    <div style={{display:"flex",flexDirection:"column",gap:6}}>{[{k:"HARD_QS",n:hardC,l:hardC?`${hardC} below 70%`:"Play more to unlock"},{k:"NEW_QS",n:newC,l:newC?`${newC} unseen`:"All seen!"},{k:"WEAK_TOPICS",n:weakC.length,l:weakC.length?weakC.map(c=>`${CATS[c.key].icon}${c.pct}%`).join("  "):"Play more"},{k:"REVIEW",n:missC,l:missC?`${missC} to review`:"No missed Qs"}].map(({k,n,l})=> <button key={k} style={{...S.mc,opacity:n?1:.4}} onClick={()=>{if(n)startGame(k,[]);}}><span style={{fontSize:22,width:32,textAlign:"center"}}>{MODES[k].icon}</span><div><span style={{fontSize:13,fontWeight:700,color:"#fff",display:"block"}}>{MODES[k].name}</span><span style={{fontSize:10,color:n?"#888":"#555"}}>{l}</span></div></button>)}</div>
    <div style={{display:"flex",gap:8,marginTop:14}}>{data.bestStreak>0&& <div style={{flex:1,textAlign:"center",padding:8,background:"rgba(255,150,50,.08)",borderRadius:8,fontSize:12,color:"#ffa033",fontWeight:600}}>🔥 Best: {data.bestStreak}</div>}<button onClick={()=>setScr("stats")} style={{flex:1,padding:8,background:"rgba(102,126,234,.1)",borderRadius:8,fontSize:12,color:"#667eea",fontWeight:600}}>📊 Stats</button></div>
    <div style={{textAlign:"center",marginTop:14}}><span style={{fontSize:9,color:"#444"}}>{QS.length} Qs · ☁️ "{pin}" · {newC} unseen</span></div>
  </div></div>;}

  if(scr==="stats"){const acc=data.totalAnswered>0?Math.round(data.totalCorrect/data.totalAnswered*100):0;const cs=Object.entries(CATS).map(([k,c])=>({key:k,...c,...getCatAcc(data,k)})).sort((a,b)=>(a.pct??999)-(b.pct??999));const rec=[...data.sessionHistory].reverse().slice(0,10);const qd=QS.map(q=>({...q,stats:data.questionStats[q.id]||null})).filter(q=>q.stats).sort((a,b)=>(a.stats.correct/a.stats.seen)-(b.stats.correct/b.stats.seen));const trend=data.sessionHistory.slice(-20).map((s,i)=>({i,pct:s.total>0?Math.round(s.correct/s.total*100):0}));
  return <div style={S.c}><SB /><div style={S.i}>
    <button style={S.bk} onClick={()=>setScr("home")}>← Back</button><h2 style={{fontSize:20,fontWeight:800,color:"#fff",margin:"0 0 16px"}}>📊 Statistics</h2>
    <div style={{display:"flex",gap:3,marginBottom:16,background:"rgba(255,255,255,.04)",padding:3,borderRadius:10}}>{[["overview","Overview"],["topics","Topics"],["questions","Questions"],["history","History"]].map(([k,l])=> <button key={k} onClick={()=>setSTab(k)} style={{flex:1,padding:"7px 3px",borderRadius:7,fontSize:11,fontWeight:600,background:sTab===k?"rgba(102,126,234,.25)":"transparent",color:sTab===k?"#667eea":"#555"}}>{l}</button>)}</div>
    {sTab==="overview"&& <div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>{[{l:"XP",v:data.xp,i:"⭐"},{l:"Accuracy",v:`${acc}%`,i:"🎯"},{l:"Answered",v:data.totalAnswered,i:"📝"},{l:"Streak",v:data.bestStreak,i:"🔥"},{l:"Sessions",v:data.sessionHistory.length,i:"🎮"},{l:"Unseen",v:newC,i:"✨"}].map((x,i)=> <div key={i} style={{padding:12,background:"rgba(255,255,255,.03)",borderRadius:10,border:"1px solid rgba(255,255,255,.06)"}}><div style={{fontSize:9,color:"#666",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>{x.i} {x.l}</div><div style={{fontSize:18,fontWeight:800,color:"#fff"}}>{x.v}</div></div>)}</div>{trend.length>1&& <div><h3 style={{fontSize:12,color:"#777",marginBottom:8,fontWeight:600}}>Trend</h3><div style={{display:"flex",alignItems:"flex-end",gap:2,height:60,marginBottom:16}}>{trend.map((t,i)=> <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"100%"}}><div style={{width:"100%",maxWidth:18,background:t.pct>=80?"#4ade80":t.pct>=60?"#fbbf24":"#f87171",borderRadius:"2px 2px 0 0",height:`${Math.max(t.pct*.6,3)}%`,minHeight:2}} /><div style={{fontSize:6,color:"#555",marginTop:1}}>{t.pct}</div></div>)}</div></div>}{weakC.length>0&& <div style={{padding:12,background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.2)",borderRadius:10}}><div style={{fontSize:12,fontWeight:700,color:"#f87171",marginBottom:4}}>🎯 Weak Areas</div>{weakC.map(c=> <div key={c.key} style={{fontSize:11,color:"#ccc",lineHeight:1.6}}>{CATS[c.key].icon} {CATS[c.key].name}: {c.pct}%</div>)}</div>}</div>}
    {sTab==="topics"&& <div style={{display:"flex",flexDirection:"column",gap:7}}>{cs.map(c=> <div key={c.key} style={{padding:10,background:"rgba(255,255,255,.03)",borderRadius:10,borderLeft:`3px solid ${c.color}`}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{c.icon} {c.name}</span><span style={{fontSize:13,fontWeight:800,color:c.pct!=null?(c.pct>=80?"#4ade80":c.pct>=60?"#fbbf24":"#f87171"):"#555"}}>{c.pct!=null?`${c.pct}%`:"—"}</span></div><div style={{height:3,background:"rgba(255,255,255,.08)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${c.pct??0}%`,background:c.color,borderRadius:2}} /></div><div style={{fontSize:9,color:"#555",marginTop:3}}>{c.correct}/{c.seen} · {QS.filter(q=>q.cat===c.key).length} total</div></div>)}</div>}
    {sTab==="questions"&& <div>{!qd.length? <div style={{color:"#555",fontSize:12,textAlign:"center",padding:30}}>Play first!</div>:<div style={{display:"flex",flexDirection:"column",gap:5}}>{qd.slice(0,25).map(q=>{const p=Math.round(q.stats.correct/q.stats.seen*100);return <div key={q.id} style={{padding:8,background:"rgba(255,255,255,.03)",borderRadius:7,borderLeft:`3px solid ${p>=80?"#4ade80":p>=60?"#fbbf24":"#f87171"}`}}><div style={{fontSize:11,color:"#bbb",lineHeight:1.4,marginBottom:3}}>{q.q}</div><div style={{display:"flex",gap:10,fontSize:9,color:"#555"}}><span style={{color:p>=80?"#4ade80":p>=60?"#fbbf24":"#f87171",fontWeight:700}}>{p}%</span><span>×{q.stats.seen}</span><span>{CATS[q.cat].icon}</span></div></div>;})}</div>}</div>}
    {sTab==="history"&& <div>{!rec.length? <div style={{color:"#555",fontSize:12,textAlign:"center",padding:30}}>No sessions</div>:<div style={{display:"flex",flexDirection:"column",gap:6}}>{rec.map((s,i)=>{const p=s.total>0?Math.round(s.correct/s.total*100):0;return <div key={i} style={{padding:10,background:"rgba(255,255,255,.03)",borderRadius:10,border:"1px solid rgba(255,255,255,.06)"}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{MODES[s.mode]?.icon} {MODES[s.mode]?.name||s.mode}</span><span style={{fontSize:12,fontWeight:800,color:p>=80?"#4ade80":p>=60?"#fbbf24":"#f87171"}}>{p}%</span></div><div style={{fontSize:10,color:"#555",marginTop:3}}>{new Date(s.date).toLocaleDateString()} · {s.correct}/{s.total} · +{s.score} XP</div></div>;})}</div>}</div>}
    <button onClick={()=>{if(confirm("Reset ALL progress?")){setData({...DD});setScr("home");}}} style={{marginTop:24,border:"1px solid rgba(248,113,113,.3)",color:"#f87171",padding:"8px 16px",borderRadius:8,fontSize:11,display:"block",margin:"24px auto 0"}}>Reset Progress</button>
  </div></div>;}

  if(scr==="select_cats"){const tog=k=>setSelCats(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k]);const secs={};Object.entries(CATS).forEach(([k,c])=>{if(!secs[c.sec])secs[c.sec]=[];secs[c.sec].push({key:k,...c});});
  return <div style={S.c}><SB /><div style={S.i}>
    <button style={S.bk} onClick={()=>{setSelCats([]);setScr("home");}}>← Back</button>
    <h2 style={{fontSize:20,fontWeight:800,color:"#fff",margin:"0 0 3px",display:"flex",alignItems:"center",gap:8}}>{MODES[gm].icon} {MODES[gm].name}</h2><p style={{fontSize:11,color:"#666",marginBottom:16,marginTop:3}}>Select topics or start with all</p>
    {Object.entries(secs).map(([sec,cats])=> <div key={sec} style={{marginBottom:14}}><h3 style={{fontSize:10,color:"#555",letterSpacing:2,textTransform:"uppercase",marginBottom:6,fontWeight:600}}>{sec}</h3><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:6}}>{cats.map(c=>{const is=selCats.includes(c.key);const ac=getCatAcc(data,c.key);return <button key={c.key} onClick={()=>tog(c.key)} style={{position:"relative",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"10px 6px",borderRadius:9,border:`1.5px solid ${is?c.color:"rgba(255,255,255,.08)"}`,background:is?`${c.color}22`:"rgba(255,255,255,.03)"}}><span style={{fontSize:18}}>{c.icon}</span><span style={{fontSize:10,fontWeight:600}}>{c.name}</span><span style={{fontSize:8,color:ac.pct!=null?(ac.pct>=80?"#4ade80":ac.pct>=60?"#fbbf24":"#f87171"):"#555"}}>{ac.pct!=null?`${ac.pct}%`:`${QS.filter(q=>q.cat===c.key).length} Qs`}</span>{is&& <span style={{position:"absolute",top:3,right:3,width:14,height:14,borderRadius:7,background:c.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",fontWeight:700}}>✓</span>}</button>;})}</div></div>)}
    <button style={S.btn} onClick={()=>startGame(gm,selCats)}>{selCats.length===0?"Start All Topics":`Start ${selCats.length} Topic${selCats.length>1?"s":""}`}</button>
  </div></div>;}

  if(scr==="play"){const q=qs[qi];if(!q){setScr("results");return null;}const cat=CATS[q.cat];const prog=((qi+1)/qs.length)*100;const low=tl!=null&&tl<=10;const qSt=data.questionStats[q.id];
  return <div style={{...S.c,...(flash?{animation:"fG .5s"}:{}),...(shake?{animation:"sS .4s"}:{})}}>
    <SB />
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 14px 4px",maxWidth:640,margin:"0 auto"}}><button style={{background:"rgba(255,255,255,.06)",width:28,height:28,borderRadius:7,fontSize:13,color:"#888"}} onClick={fin}>✕</button><div style={{flex:1,display:"flex",alignItems:"center",gap:6}}><div style={{flex:1,height:4,background:"rgba(255,255,255,.08)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:"linear-gradient(90deg,#667eea,#764ba2)",borderRadius:2,transition:"width .4s",width:`${prog}%`}} /></div><span style={{fontSize:10,color:"#555",fontWeight:600}}>{qi+1}/{qs.length}</span></div><div style={{display:"flex",gap:5}}>{streak>=2&& <span style={{fontSize:11,fontWeight:700,color:"#ff9933",padding:"2px 7px",background:"rgba(255,153,51,.12)",borderRadius:14}}>🔥{streak}</span>}<span style={{fontSize:11,fontWeight:700,color:"#667eea",padding:"2px 7px",background:"rgba(102,126,234,.12)",borderRadius:14}}>⭐{sScore}</span></div></div>
    {tl!=null&& <div style={{textAlign:"center",fontSize:16,fontWeight:800,padding:"1px 0",maxWidth:640,margin:"0 auto",color:low?"#ff4444":"#88ff88",animation:low?"pu .8s infinite":"none"}}>⏱ {tl}s</div>}
    {gm==="BOSS_BATTLE"&& <div style={{textAlign:"center",padding:"1px 0",display:"flex",justifyContent:"center",gap:3}}>{[0,1,2].map(i=> <span key={i} style={{fontSize:18,opacity:i<lives?1:.2}}>❤️</span>)}</div>}
    <div style={{maxWidth:640,margin:"0 auto",padding:"3px 14px 8px",display:"flex",alignItems:"center",gap:6}}><span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"3px 10px",borderRadius:14,fontSize:10,fontWeight:600,color:"#fff",background:cat.color}}>{cat.icon} {cat.name}{q.pri&& <span style={{marginLeft:3,fontSize:8,background:"rgba(255,255,255,.25)",padding:"1px 5px",borderRadius:7,fontWeight:700}}>★</span>}</span><span style={{fontSize:9,color:"#555"}}>{["","Easy","Med","Hard"][q.diff||1]}</span>{qSt&& <span style={{fontSize:9,color:"#444",marginLeft:"auto"}}>×{qSt.seen}</span>}</div>
    <div style={{maxWidth:640,margin:"0 auto",padding:"0 14px 12px"}}><h2 style={{fontSize:17,fontWeight:700,color:"#fff",lineHeight:1.5,margin:0}}>{q.q}</h2></div>
    <div style={{maxWidth:640,margin:"0 auto",padding:"0 14px",display:"flex",flexDirection:"column",gap:7}}>{q.o.map((opt,i)=>{let bg="rgba(255,255,255,.04)",bc="rgba(255,255,255,.1)",op=1;if(sr){if(i===q.a){bg="rgba(74,222,128,.12)";bc="#4ade80";}else if(i===sel&&i!==q.a){bg="rgba(248,113,113,.12)";bc="#f87171";}else op=0.4;}return <button key={`${qi}-${i}`} style={{display:"flex",alignItems:"flex-start",gap:9,padding:"11px 12px",background:bg,border:`1.5px solid ${bc}`,borderRadius:9,textAlign:"left",opacity:op,width:"100%"}} onClick={()=>!sr&&handleAnswer(i)} disabled={sr}><span style={{width:22,height:22,borderRadius:5,background:"rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#888",flexShrink:0}}>{String.fromCharCode(65+i)}</span><span style={{fontSize:12,lineHeight:1.5}}>{opt}</span></button>;})}</div>
    {sr&& <div style={{maxWidth:640,margin:"12px auto 0",padding:"0 14px 24px",animation:"sU .3s"}}>
      <div style={{marginBottom:8}}>{sel===q.a? <span style={{fontSize:14,fontWeight:700,color:"#4ade80"}}>✅ Correct!</span>:<span style={{fontSize:14,fontWeight:700,color:"#f87171"}}>❌ {tl===0&&sel===-1?"Time's up!":"Incorrect"}</span>}</div>
      <div style={{padding:"12px 14px",background:"rgba(255,255,255,.04)",borderRadius:10,border:"1px solid rgba(255,255,255,.06)",marginBottom:10}}><p style={{fontSize:12,color:"#ccc",lineHeight:1.7,margin:0}}>{q.ex}</p></div>
      {q.mn&& <><button onClick={()=>setShowMn(!showMn)} style={{background:"rgba(255,200,50,.1)",border:"1px solid rgba(255,200,50,.25)",color:"#ffc832",padding:"5px 12px",borderRadius:7,fontSize:10,fontWeight:600,marginBottom:6,display:"block"}}>{showMn?"Hide":"Show"} Memory Trick</button>{showMn&& <div style={{padding:"8px 12px",background:"rgba(255,200,50,.08)",borderRadius:7,borderLeft:"3px solid #ffc832",fontSize:12,color:"#ffd866",marginBottom:8,lineHeight:1.5,fontWeight:600,animation:"pI .25s"}}>{q.mn}</div>}</>}
      <button onClick={nextQ} style={S.btn}>{qi+1>=qs.length?"See Results →":"Next →"}</button>
    </div>}
  </div>;}

  if(scr==="results"){const pct=sTotal>0?Math.round(sCorrect/sTotal*100):0;const grade=pct>=90?"S":pct>=80?"A":pct>=70?"B":pct>=60?"C":"D";const gc={S:"#ffd700",A:"#4ade80",B:"#60a5fa",C:"#fb923c",D:"#f87171"}[grade];const gl={S:"OUTSTANDING",A:"EXCELLENT",B:"GOOD",C:"NEEDS WORK",D:"KEEP STUDYING"}[grade];
  return <div style={S.c}><SB />
    <div style={{...S.i,textAlign:"center"}}>
      <h2 style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:16}}>{MODES[gm]?.icon} {MODES[gm]?.name} Complete!</h2>
      <div style={{width:100,height:100,borderRadius:"50%",border:`4px solid ${gc}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",margin:"0 auto 18px",animation:"gI .6s"}}><span style={{fontSize:36,fontWeight:900,color:gc}}>{grade}</span><span style={{fontSize:7,letterSpacing:2,color:"#888",textTransform:"uppercase",fontWeight:600}}>{gl}</span></div>
      <div style={{display:"flex",justifyContent:"center",gap:20,marginBottom:20,flexWrap:"wrap",animation:"fI .5s .3s both"}}>{[{n:`${sCorrect}/${sTotal}`,l:"Correct"},{n:`${pct}%`,l:"Accuracy"},{n:`+${sScore}`,l:"XP"}].map((x,i)=> <div key={i}><span style={{fontSize:20,fontWeight:800,color:"#fff",display:"block"}}>{x.n}</span><span style={{fontSize:9,color:"#666",textTransform:"uppercase",letterSpacing:1}}>{x.l}</span></div>)}</div>
      {wrong.length>0&& <div style={{textAlign:"left",marginBottom:16,animation:"fI .5s .5s both"}}><h3 style={{fontSize:14,fontWeight:700,color:"#fff",marginBottom:8}}>📝 Review ({wrong.length})</h3>{wrong.map((q,i)=> <div key={i} style={{padding:10,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.06)",borderRadius:9,marginBottom:6}}><div style={{fontSize:11,color:"#ccc",marginBottom:4,lineHeight:1.5}}>{q.q}</div><div style={{fontSize:11,color:"#4ade80",fontWeight:600,marginBottom:4}}>✅ {q.o[q.a]}</div><div style={{fontSize:10,color:"#aaa",lineHeight:1.5}}>{q.ex}</div>{q.mn&& <div style={{fontSize:10,color:"#ffd866",marginTop:4,padding:"4px 7px",background:"rgba(255,200,50,.06)",borderRadius:5,lineHeight:1.4}}>{q.mn}</div>}</div>)}</div>}
      <div style={{display:"flex",gap:8,justifyContent:"center"}}><button style={{...S.btn,width:"auto",padding:"12px 20px"}} onClick={()=>startGame(gm,selCats)}>Play Again</button><button onClick={()=>setScr("home")} style={{padding:"12px 20px",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,fontSize:13,fontWeight:700,color:"#aaa"}}>Home</button></div>
    </div></div>;}
  return null;
}

function App(){const[auth,setAuth]=useState(null);if(!auth)return <PinScreen onLogin={(p,d)=>setAuth({pin:p,data:d})} />;return <Game pin={auth.pin} initialData={auth.data} />;}
const S={c:{minHeight:"100vh",background:"#0f0f14",color:"#e8e6e3",fontFamily:"inherit",overflowX:"hidden"},i:{maxWidth:640,margin:"0 auto",padding:"24px 16px 40px"},t:{fontSize:32,fontWeight:900,color:"#fff",margin:0,letterSpacing:4},a:{background:"linear-gradient(135deg,#667eea,#764ba2)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"},sb:{display:"flex",alignItems:"center",justifyContent:"center",gap:12,padding:"12px 14px",background:"rgba(255,255,255,.04)",borderRadius:11,border:"1px solid rgba(255,255,255,.06)",marginBottom:14,flexWrap:"wrap"},si:{display:"flex",flexDirection:"column",alignItems:"center",gap:2},sv:{fontSize:13,fontWeight:700,color:"#fff"},sl:{fontSize:8,color:"#666",textTransform:"uppercase",letterSpacing:1},dv:{width:1,height:26,background:"rgba(255,255,255,.08)"},sh:{display:"flex",alignItems:"center",gap:8,marginBottom:12},sln:{flex:1,height:1,background:"rgba(255,255,255,.08)"},stt:{fontSize:9,color:"#555",letterSpacing:3,fontWeight:600},mc:{display:"flex",alignItems:"center",gap:10,padding:"13px 14px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.08)",borderRadius:10,textAlign:"left",width:"100%"},btn:{display:"block",width:"100%",padding:13,marginTop:12,background:"linear-gradient(135deg,#667eea,#764ba2)",color:"#fff",borderRadius:10,fontSize:14,fontWeight:700,letterSpacing:1},bk:{color:"#888",fontSize:12,padding:"3px 0",marginBottom:10}};
ReactDOM.render(<App />,document.getElementById("root"));
</script></body></html>
