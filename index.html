const COLLECTION = "mcatquest";

async function loadFromCloud(pin) {
  try {
    const doc = await db.collection(COLLECTION).doc(pin).get();
    if (doc.exists) return doc.data();
  } catch (e) { console.error("Load failed:", e); }
  return null;
}

async function saveToCloud(pin, data) {
  try {
    await db.collection(COLLECTION).doc(pin).set(data);
    return true;
  } catch (e) { console.error("Save failed:", e); return false; }
}

function getSavedPin() {
  try { return localStorage.getItem("mcat_pin") || ""; } catch(e) { return ""; }
}
function rememberPin(pin) {
  try { localStorage.setItem("mcat_pin", pin); } catch(e) {}
}

const GAME_MODES = {
  BLITZ:{name:"Blitz",icon:"⚡",desc:"30s per question.",time:30},
  MARATHON:{name:"Marathon",icon:"🏃",desc:"No timer. Deep learning.",time:null},
  BOSS_BATTLE:{name:"Boss Battle",icon:"👹",desc:"5 hard Qs. 3 lives.",time:45},
  WEAK_SPOTS:{name:"Weak Spots",icon:"🎯",desc:"Your weakest areas.",time:null},
  REVIEW:{name:"Review Missed",icon:"📝",desc:"Replay wrong answers.",time:null},
};
const RANKS=[
  {name:"Pre-Med Newbie",minXP:0,badge:"🥚"},{name:"Anatomy Apprentice",minXP:100,badge:"🐣"},
  {name:"Lab Rat",minXP:300,badge:"🐁"},{name:"Study Machine",minXP:600,badge:"⚙️"},
  {name:"Knowledge Knight",minXP:1000,badge:"🛡️"},{name:"Science Sorcerer",minXP:1800,badge:"🧙"},
  {name:"MCAT Warrior",minXP:3000,badge:"⚔️"},{name:"528 Legend",minXP:5000,badge:"👑"},
];
function getRank(xp){let r=RANKS[0];for(const x of RANKS)if(xp>=x.minXP)r=x;return r;}
function getNextRank(xp){for(const r of RANKS)if(xp<r.minXP)return r;return null;}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

const DEFAULT_DATA={xp:0,totalCorrect:0,totalAnswered:0,bestStreak:0,questionStats:{},sessionHistory:[]};

// PIN SCREEN
// ═══════════════════════════════════════════
function PinScreen({onLogin}) {
  const [pin, setPin] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const saved = getSavedPin();

  useEffect(() => {
    if (saved) { setPin(saved); doLogin(saved); }
  }, []);

  async function doLogin(p) {
    if (p.length < 3) { setError("PIN must be at least 3 characters"); return; }
    setLoading(true); setError("");
    const data = await loadFromCloud(p);
    rememberPin(p);
    onLogin(p, data || {...DEFAULT_DATA});
  }

  if (saved && loading) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0f0f14"}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:48,animation:"pulse 1.5s infinite"}}>🧬</div>
      <div style={{fontSize:12,color:"#555",marginTop:10}}>Loading progress...</div></div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0f0f14",padding:20}}>
      <div style={{maxWidth:340,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:8}}>🧬</div>
        <h1 style={{fontSize:28,fontWeight:900,color:"#fff",letterSpacing:3,margin:"0 0 4px"}}>MCAT<span style={{background:"linear-gradient(135deg,#667eea,#764ba2)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>QUEST</span></h1>
        <p style={{fontSize:11,color:"#555",marginBottom:30,letterSpacing:2}}>ENTER YOUR PIN TO SYNC PROGRESS</p>
        <input
          type="text"
          value={pin}
          onChange={e => setPin(e.target.value.toLowerCase().replace(/[^a-z0-9]/g,""))}
          onKeyDown={e => e.key==="Enter" && doLogin(pin)}
          placeholder="your-pin"
          style={{width:"100%",padding:"14px 16px",background:"rgba(255,255,255,0.06)",border:"1.5px solid rgba(255,255,255,0.12)",borderRadius:10,color:"#fff",fontSize:18,fontFamily:"inherit",textAlign:"center",letterSpacing:4,outline:"none"}}
          autoFocus
        />
        <p style={{fontSize:10,color:"#666",marginTop:8,lineHeight:1.5}}>Use the same PIN on every device to sync. First time? Just pick any PIN — it creates your save automatically.</p>
        {error && <p style={{fontSize:11,color:"#f87171",marginTop:8}}>{error}</p>}
        <button
          onClick={() => doLogin(pin)}
          disabled={loading || pin.length < 3}
          style={{width:"100%",padding:14,marginTop:16,background:pin.length>=3?"linear-gradient(135deg,#667eea,#764ba2)":"rgba(255,255,255,0.06)",color:"#fff",borderRadius:10,fontSize:15,fontWeight:700,letterSpacing:1,opacity:pin.length>=3?1:0.4}}
        >{loading ? "Loading..." : "Enter"}</button>
      </div>
    </div>
  );
}

// MAIN GAME (same logic, Firebase storage)
// ═══════════════════════════════════════════
function Game({pin, initialData}) {
  const [screen,setScreen]=useState("home");
  const [data,setData]=useState(initialData);
  const [saveStatus,setSaveStatus]=useState("");
  const [streak,setStreak]=useState(0);
  const [gameMode,setGameMode]=useState(null);
  const [selectedCats,setSelectedCats]=useState([]);
  const [questions,setQuestions]=useState([]);
  const [qIndex,setQIndex]=useState(0);
  const [selected,setSelected]=useState(null);
  const [showResult,setShowResult]=useState(false);
  const [timeLeft,setTimeLeft]=useState(null);
  const [sessionScore,setSessionScore]=useState(0);
  const [sessionCorrect,setSessionCorrect]=useState(0);
  const [sessionTotal,setSessionTotal]=useState(0);
  const [wrongAnswers,setWrongAnswers]=useState([]);
  const [shakeWrong,setShakeWrong]=useState(false);
  const [flashCorrect,setFlashCorrect]=useState(false);
  const [bossLives,setBossLives]=useState(3);
  const [showMnemonic,setShowMnemonic]=useState(false);
  const [statsTab,setStatsTab]=useState("overview");
  const timerRef=useRef(null);

  // Save to Firebase whenever data changes
  useEffect(() => {
    const t = setTimeout(async () => {
      setSaveStatus("saving");
      const ok = await saveToCloud(pin, data);
      setSaveStatus(ok ? "saved" : "error");
      if (ok) setTimeout(() => setSaveStatus(""), 1500);
    }, 600);
    return () => clearTimeout(t);
  }, [data]);

  // Timer
  useEffect(()=>{if(timeLeft===null||timeLeft<=0||showResult)return;timerRef.current=setTimeout(()=>setTimeLeft(t=>t-1),1000);return()=>clearTimeout(timerRef.current);},[timeLeft,showResult]);
  useEffect(()=>{if(timeLeft===0&&!showResult)handleAnswer(-1);},[timeLeft]);

  const getCatAccuracy=(k)=>{const qs=ALL_QUESTIONS.filter(q=>q.cat===k);let s=0,c=0;qs.forEach(q=>{const st=data.questionStats[q.id];if(st){s+=st.seen;c+=st.correct;}});return{seen:s,correct:c,pct:s>0?Math.round(c/s*100):null};};
  const getWeakestCats=()=>{const a=Object.keys(CATEGORIES).map(k=>({key:k,...getCatAccuracy(k)})).filter(c=>c.seen>=2);a.sort((x,y)=>x.pct-y.pct);return a.slice(0,3).map(c=>c.key);};
  const getMissedIds=()=>Object.entries(data.questionStats).filter(([_,s])=>s.seen>0&&(s.correct/s.seen)<0.6).map(([id])=>id);

  const startGame=(mode,cats)=>{
    let pool;
    if(mode==="WEAK_SPOTS"){const wc=getWeakestCats();if(!wc.length){alert("Play some games first!");return;}pool=ALL_QUESTIONS.filter(q=>wc.includes(q.cat));setSelectedCats(wc);}
    else if(mode==="REVIEW"){const mi=getMissedIds();if(!mi.length){alert("No missed questions yet!");return;}pool=ALL_QUESTIONS.filter(q=>mi.includes(q.id));}
    else{const ck=cats.length?cats:Object.keys(CATEGORIES);pool=ALL_QUESTIONS.filter(q=>ck.includes(q.cat));}
    const count=mode==="BOSS_BATTLE"?5:Math.min(15,pool.length);
    const byCat={};pool.forEach(q=>{if(!byCat[q.cat])byCat[q.cat]=[];byCat[q.cat].push(q);});
    Object.keys(byCat).forEach(k=>{byCat[k]=shuffle(byCat[k]);});
    const catKeys=shuffle(Object.keys(byCat));const picked=[];let round=0;
    while(picked.length<count){let any=false;for(const ck of catKeys){if(picked.length>=count)break;if(round<byCat[ck].length){picked.push(byCat[ck][round]);any=true;}}if(!any)break;round++;}
    let sel=shuffle(picked).map(q=>{const ct=q.options[q.answer];const so=shuffle([...q.options]);return{...q,options:so,answer:so.indexOf(ct)};});
    setQuestions(sel);setQIndex(0);setSelected(null);setShowResult(false);setSessionScore(0);setSessionCorrect(0);setSessionTotal(0);setWrongAnswers([]);setGameMode(mode);setBossLives(3);setShowMnemonic(false);setStreak(0);setTimeLeft(GAME_MODES[mode].time||null);setScreen("play");
  };

  const handleAnswer=(idx)=>{
    if(showResult)return;const q=questions[qIndex];const correct=idx===q.answer;
    setSelected(idx);setShowResult(true);setSessionTotal(t=>t+1);clearTimeout(timerRef.current);
    let earned=0;
    if(correct){const tb=timeLeft?Math.floor(timeLeft*2):0;const sb=streak>=5?25:streak>=3?15:0;earned=(gameMode==="BOSS_BATTLE"?30:15)+tb+sb+(q.diff||1)*3;setSessionScore(s=>s+earned);setSessionCorrect(c=>c+1);setStreak(s=>s+1);setFlashCorrect(true);setTimeout(()=>setFlashCorrect(false),600);
    }else{setStreak(0);setWrongAnswers(w=>[...w,q]);setShakeWrong(true);setTimeout(()=>setShakeWrong(false),500);if(gameMode==="BOSS_BATTLE")setBossLives(l=>l-1);}
    setData(d=>{const qs={...d.questionStats};const p=qs[q.id]||{seen:0,correct:0,lastSeen:null,streak:0};qs[q.id]={seen:p.seen+1,correct:p.correct+(correct?1:0),lastSeen:Date.now(),streak:correct?p.streak+1:0};return{...d,xp:d.xp+earned,totalCorrect:d.totalCorrect+(correct?1:0),totalAnswered:d.totalAnswered+1,bestStreak:correct?Math.max(d.bestStreak,streak+1):d.bestStreak,questionStats:qs};});
  };

  const nextQuestion=()=>{if(gameMode==="BOSS_BATTLE"&&bossLives<=0){finishSession();return;}if(qIndex+1>=questions.length){finishSession();return;}setQIndex(i=>i+1);setSelected(null);setShowResult(false);setShowMnemonic(false);if(GAME_MODES[gameMode].time)setTimeLeft(GAME_MODES[gameMode].time);};
  const finishSession=()=>{setData(d=>({...d,sessionHistory:[...d.sessionHistory,{date:Date.now(),mode:gameMode,correct:sessionCorrect,total:sessionTotal,score:sessionScore,cats:[...new Set(questions.map(q=>q.cat))]}].slice(-50)}));setScreen("results");};
  const resetProgress=()=>{if(confirm("Reset ALL progress?")){setData({...DEFAULT_DATA});setScreen("home");}};

  const rank=getRank(data.xp);const nextRankData=getNextRank(data.xp);

  const SaveBadge=()=>saveStatus?<div style={{position:"fixed",bottom:12,right:12,fontSize:9,padding:"4px 10px",borderRadius:10,background:saveStatus==="saved"?"rgba(74,222,128,0.15)":saveStatus==="error"?"rgba(248,113,113,0.15)":"rgba(102,126,234,0.15)",color:saveStatus==="saved"?"#4ade80":saveStatus==="error"?"#f87171":"#667eea",zIndex:999}}>{saveStatus==="saving"?"💾 Syncing...":saveStatus==="saved"?"✅ Synced to cloud":"⚠️ Sync error"}</div>:null;

  // ═══ HOME ═══
  if(screen==="home"){
    const accuracy=data.totalAnswered>0?Math.round(data.totalCorrect/data.totalAnswered*100):0;
    return(<div style={st.ctr}><SaveBadge/><div style={st.inn}>
      <div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:42}}>🧬</div><h1 style={st.ttl}>MCAT<span style={st.acc}>QUEST</span></h1><p style={{fontSize:11,color:"#555",letterSpacing:2,textTransform:"uppercase"}}>Master the MCAT through play</p></div>
      <div style={st.sBar}><div style={st.si}><span style={st.sv}>{rank.badge} {rank.name}</span><span style={st.sl}>Rank</span></div><div style={st.dv}/><div style={st.si}><span style={st.sv}>{data.xp} XP</span><span style={st.sl}>Experience</span></div><div style={st.dv}/><div style={st.si}><span style={st.sv}>{accuracy}%</span><span style={st.sl}>Accuracy</span></div><div style={st.dv}/><div style={st.si}><span style={st.sv}>{data.totalAnswered}</span><span style={st.sl}>Answered</span></div></div>
      {nextRankData&&<div style={{marginBottom:20,textAlign:"center"}}><div style={{height:6,background:"rgba(255,255,255,.08)",borderRadius:3,overflow:"hidden",marginBottom:4}}><div style={{height:"100%",background:"linear-gradient(90deg,#667eea,#764ba2)",borderRadius:3,transition:"width .5s",width:`${Math.min(((data.xp-rank.minXP)/(nextRankData.minXP-rank.minXP))*100,100)}%`}}/></div><span style={{fontSize:10,color:"#555"}}>{nextRankData.minXP-data.xp} XP to {nextRankData.badge} {nextRankData.name}</span></div>}
      <div style={{marginBottom:20}}><div style={st.sh}><span style={st.sln}/><span style={st.stt}>TOPIC MASTERY</span><span style={st.sln}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5}}>{Object.entries(CATEGORIES).map(([k,cat])=>{const ac=getCatAccuracy(k);const p=ac.pct??0;const c=p>=80?"#4ade80":p>=60?"#fbbf24":p>0?"#f87171":"#333";return<div key={k} style={{padding:"7px 4px",background:"rgba(255,255,255,.03)",borderRadius:7,textAlign:"center",borderBottom:`2px solid ${c}`}}><div style={{fontSize:15}}>{cat.icon}</div><div style={{fontSize:8,color:"#777",marginTop:1}}>{cat.name}</div><div style={{fontSize:12,fontWeight:700,color:c,marginTop:1}}>{ac.seen>0?`${p}%`:"—"}</div></div>;})}</div></div>
      <div style={st.sh}><span style={st.sln}/><span style={st.stt}>CHOOSE YOUR BATTLE</span><span style={st.sln}/></div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>{Object.entries(GAME_MODES).map(([key,mode])=>{const dis=(key==="WEAK_SPOTS"&&!getWeakestCats().length)||(key==="REVIEW"&&!getMissedIds().length);return<button key={key} style={{...st.mc,opacity:dis?0.4:1}} onClick={()=>{if(dis)return;if(key==="WEAK_SPOTS"||key==="REVIEW")startGame(key,[]);else{setGameMode(key);setScreen("select_cats");}}}><span style={{fontSize:24,width:36,textAlign:"center"}}>{mode.icon}</span><div><span style={{fontSize:14,fontWeight:700,color:"#fff",display:"block"}}>{mode.name}</span><span style={{fontSize:10,color:"#666"}}>{mode.desc}{key==="REVIEW"&&getMissedIds().length>0?` (${getMissedIds().length})`:""}</span></div></button>;})}</div>
      <div style={{display:"flex",gap:8,marginTop:14}}>{data.bestStreak>0&&<div style={{flex:1,textAlign:"center",padding:8,background:"rgba(255,150,50,.08)",borderRadius:8,fontSize:12,color:"#ffa033",fontWeight:600}}>🔥 Best: {data.bestStreak}</div>}<button onClick={()=>setScreen("stats")} style={{flex:1,padding:8,background:"rgba(102,126,234,.1)",borderRadius:8,fontSize:12,color:"#667eea",fontWeight:600}}>📊 Stats</button></div>
      <div style={{textAlign:"center",marginTop:14}}><span style={{fontSize:9,color:"#444"}}>{ALL_QUESTIONS.length} Qs · ☁️ Synced as "{pin}"</span></div>
    </div></div>);
  }

  // ═══ STATS ═══
  if(screen==="stats"){
    const accuracy=data.totalAnswered>0?Math.round(data.totalCorrect/data.totalAnswered*100):0;const catStats=Object.entries(CATEGORIES).map(([k,c])=>({key:k,...c,...getCatAccuracy(k)})).sort((a,b)=>(a.pct??999)-(b.pct??999));const recent=[...data.sessionHistory].reverse().slice(0,10);const qDetails=ALL_QUESTIONS.map(q=>({...q,stats:data.questionStats[q.id]||null})).filter(q=>q.stats).sort((a,b)=>(a.stats.correct/a.stats.seen)-(b.stats.correct/b.stats.seen));const trend=data.sessionHistory.slice(-20).map((s,i)=>({i,pct:s.total>0?Math.round(s.correct/s.total*100):0}));
    return(<div style={st.ctr}><SaveBadge/><div style={st.inn}>
      <button style={st.bk} onClick={()=>setScreen("home")}>← Back</button>
      <h2 style={{fontSize:20,fontWeight:800,color:"#fff",margin:"0 0 16px"}}>📊 Statistics</h2>
      <div style={{display:"flex",gap:3,marginBottom:16,background:"rgba(255,255,255,.04)",padding:3,borderRadius:10}}>{[["overview","Overview"],["topics","Topics"],["questions","Questions"],["history","History"]].map(([k,l])=><button key={k} onClick={()=>setStatsTab(k)} style={{flex:1,padding:"7px 3px",borderRadius:7,fontSize:11,fontWeight:600,background:statsTab===k?"rgba(102,126,234,.25)":"transparent",color:statsTab===k?"#667eea":"#555"}}>{l}</button>)}</div>
      {statsTab==="overview"&&<div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>{[{l:"Total XP",v:data.xp,i:"⭐"},{l:"Accuracy",v:`${accuracy}%`,i:"🎯"},{l:"Questions",v:data.totalAnswered,i:"📝"},{l:"Best Streak",v:data.bestStreak,i:"🔥"},{l:"Sessions",v:data.sessionHistory.length,i:"🎮"},{l:"Rank",v:rank.name,i:rank.badge}].map((x,i)=><div key={i} style={{padding:12,background:"rgba(255,255,255,.03)",borderRadius:10,border:"1px solid rgba(255,255,255,.06)"}}><div style={{fontSize:9,color:"#666",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>{x.i} {x.l}</div><div style={{fontSize:18,fontWeight:800,color:"#fff"}}>{x.v}</div></div>)}</div>
        {trend.length>1&&<div><h3 style={{fontSize:12,color:"#777",marginBottom:8,fontWeight:600}}>Accuracy Trend</h3><div style={{display:"flex",alignItems:"flex-end",gap:2,height:70,marginBottom:16}}>{trend.map((t,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"100%"}}><div style={{width:"100%",maxWidth:20,background:t.pct>=80?"#4ade80":t.pct>=60?"#fbbf24":"#f87171",borderRadius:"2px 2px 0 0",height:`${Math.max(t.pct*0.7,3)}%`,minHeight:2}}/><div style={{fontSize:7,color:"#555",marginTop:1}}>{t.pct}</div></div>)}</div></div>}
        {getWeakestCats().length>0&&<div style={{padding:12,background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.2)",borderRadius:10}}><div style={{fontSize:12,fontWeight:700,color:"#f87171",marginBottom:4}}>🎯 Focus Areas</div>{getWeakestCats().map(k=>{const ac=getCatAccuracy(k);return<div key={k} style={{fontSize:11,color:"#ccc",lineHeight:1.6}}>{CATEGORIES[k].icon} {CATEGORIES[k].name}: {ac.pct}%</div>;})}</div>}</div>}
      {statsTab==="topics"&&<div style={{display:"flex",flexDirection:"column",gap:7}}>{catStats.map(c=><div key={c.key} style={{padding:10,background:"rgba(255,255,255,.03)",borderRadius:10,borderLeft:`3px solid ${c.color}`}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{c.icon} {c.name}</span><span style={{fontSize:13,fontWeight:800,color:c.pct!=null?(c.pct>=80?"#4ade80":c.pct>=60?"#fbbf24":"#f87171"):"#555"}}>{c.pct!=null?`${c.pct}%`:"—"}</span></div><div style={{height:3,background:"rgba(255,255,255,.08)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${c.pct??0}%`,background:c.color,borderRadius:2}}/></div><div style={{fontSize:9,color:"#555",marginTop:3}}>{c.correct}/{c.seen} · {ALL_QUESTIONS.filter(q=>q.cat===c.key).length} total</div></div>)}</div>}
      {statsTab==="questions"&&<div>{!qDetails.length?<div style={{color:"#555",fontSize:12,textAlign:"center",padding:30}}>Play first!</div>:<div style={{display:"flex",flexDirection:"column",gap:5}}>{qDetails.slice(0,25).map(q=>{const p=Math.round(q.stats.correct/q.stats.seen*100);return<div key={q.id} style={{padding:8,background:"rgba(255,255,255,.03)",borderRadius:7,borderLeft:`3px solid ${p>=80?"#4ade80":p>=60?"#fbbf24":"#f87171"}`}}><div style={{fontSize:11,color:"#bbb",lineHeight:1.4,marginBottom:3}}>{q.q}</div><div style={{display:"flex",gap:10,fontSize:9,color:"#555"}}><span style={{color:p>=80?"#4ade80":p>=60?"#fbbf24":"#f87171",fontWeight:700}}>{p}%</span><span>×{q.stats.seen}</span><span>{CATEGORIES[q.cat].icon}</span></div></div>;})}</div>}</div>}
      {statsTab==="history"&&<div>{!recent.length?<div style={{color:"#555",fontSize:12,textAlign:"center",padding:30}}>No sessions</div>:<div style={{display:"flex",flexDirection:"column",gap:6}}>{recent.map((s,i)=>{const p=s.total>0?Math.round(s.correct/s.total*100):0;return<div key={i} style={{padding:10,background:"rgba(255,255,255,.03)",borderRadius:10,border:"1px solid rgba(255,255,255,.06)"}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{GAME_MODES[s.mode]?.icon} {GAME_MODES[s.mode]?.name||s.mode}</span><span style={{fontSize:12,fontWeight:800,color:p>=80?"#4ade80":p>=60?"#fbbf24":"#f87171"}}>{p}%</span></div><div style={{fontSize:10,color:"#555",marginTop:3}}>{new Date(s.date).toLocaleDateString()} · {s.correct}/{s.total} · +{s.score} XP</div></div>;})}</div>}</div>}
      <button onClick={resetProgress} style={{marginTop:24,border:"1px solid rgba(248,113,113,.3)",color:"#f87171",padding:"8px 16px",borderRadius:8,fontSize:11,display:"block",margin:"24px auto 0"}}>Reset Progress</button>
    </div></div>);
  }

  // ═══ CATEGORY SELECT ═══
  if(screen==="select_cats"){
    const toggle=k=>setSelectedCats(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k]);const secs={};Object.entries(CATEGORIES).forEach(([k,c])=>{if(!secs[c.section])secs[c.section]=[];secs[c.section].push({key:k,...c});});
    return(<div style={st.ctr}><SaveBadge/><div style={st.inn}>
      <button style={st.bk} onClick={()=>{setSelectedCats([]);setScreen("home");}}>← Back</button>
      <h2 style={{fontSize:20,fontWeight:800,color:"#fff",margin:"0 0 3px",display:"flex",alignItems:"center",gap:8}}>{GAME_MODES[gameMode].icon} {GAME_MODES[gameMode].name}</h2>
      <p style={{fontSize:11,color:"#666",marginBottom:16,marginTop:3}}>Select topics or start with all</p>
      {Object.entries(secs).map(([sec,cats])=><div key={sec} style={{marginBottom:14}}><h3 style={{fontSize:10,color:"#555",letterSpacing:2,textTransform:"uppercase",marginBottom:6,fontWeight:600}}>{sec}</h3><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:6}}>{cats.map(c=>{const is=selectedCats.includes(c.key);const ac=getCatAccuracy(c.key);return<button key={c.key} onClick={()=>toggle(c.key)} style={{position:"relative",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"10px 6px",borderRadius:9,border:`1.5px solid ${is?c.color:"rgba(255,255,255,.08)"}`,background:is?`${c.color}22`:"rgba(255,255,255,.03)"}}><span style={{fontSize:18}}>{c.icon}</span><span style={{fontSize:10,fontWeight:600}}>{c.name}</span><span style={{fontSize:8,color:ac.pct!=null?(ac.pct>=80?"#4ade80":ac.pct>=60?"#fbbf24":"#f87171"):"#555"}}>{ac.pct!=null?`${ac.pct}%`:`${ALL_QUESTIONS.filter(q=>q.cat===c.key).length} Qs`}</span>{is&&<span style={{position:"absolute",top:3,right:3,width:14,height:14,borderRadius:7,background:c.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",fontWeight:700}}>✓</span>}</button>;})}</div></div>)}
      <button style={st.startBtn} onClick={()=>startGame(gameMode,selectedCats)}>{selectedCats.length===0?"Start All Topics":`Start ${selectedCats.length} Topic${selectedCats.length>1?"s":""}`}</button>
    </div></div>);
  }

  // ═══ PLAY ═══
  if(screen==="play"){
    const q=questions[qIndex];if(!q){setScreen("results");return null;}
    const cat=CATEGORIES[q.cat];const prog=((qIndex+1)/questions.length)*100;const low=timeLeft!=null&&timeLeft<=10;const qStat=data.questionStats[q.id];
    return(<div style={{...st.ctr,...(flashCorrect?{animation:"fG .5s"}:{}),...(shakeWrong?{animation:"sS .4s"}:{})}}>
      <SaveBadge/>
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 14px 4px",maxWidth:640,margin:"0 auto"}}>
        <button style={{background:"rgba(255,255,255,.06)",width:28,height:28,borderRadius:7,fontSize:13,color:"#888"}} onClick={finishSession}>✕</button>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:6}}><div style={{flex:1,height:4,background:"rgba(255,255,255,.08)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:"linear-gradient(90deg,#667eea,#764ba2)",borderRadius:2,transition:"width .4s",width:`${prog}%`}}/></div><span style={{fontSize:10,color:"#555",fontWeight:600}}>{qIndex+1}/{questions.length}</span></div>
        <div style={{display:"flex",gap:5}}>{streak>=2&&<span style={{fontSize:11,fontWeight:700,color:"#ff9933",padding:"2px 7px",background:"rgba(255,153,51,.12)",borderRadius:14}}>🔥{streak}</span>}<span style={{fontSize:11,fontWeight:700,color:"#667eea",padding:"2px 7px",background:"rgba(102,126,234,.12)",borderRadius:14}}>⭐{sessionScore}</span></div>
      </div>
      {timeLeft!=null&&<div style={{textAlign:"center",fontSize:16,fontWeight:800,padding:"1px 0",maxWidth:640,margin:"0 auto",color:low?"#ff4444":"#88ff88",animation:low?"pu .8s infinite":"none"}}>⏱ {timeLeft}s</div>}
      {gameMode==="BOSS_BATTLE"&&<div style={{textAlign:"center",padding:"1px 0",display:"flex",justifyContent:"center",gap:3}}>{[0,1,2].map(i=><span key={i} style={{fontSize:18,opacity:i<bossLives?1:.2}}>❤️</span>)}</div>}
      <div style={{maxWidth:640,margin:"0 auto",padding:"3px 14px 8px",display:"flex",alignItems:"center",gap:6}}><span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"3px 10px",borderRadius:14,fontSize:10,fontWeight:600,color:"#fff",background:cat.color}}>{cat.icon} {cat.name}{q.priority&&<span style={{marginLeft:3,fontSize:8,background:"rgba(255,255,255,.25)",padding:"1px 5px",borderRadius:7,fontWeight:700}}>★</span>}</span><span style={{fontSize:9,color:"#555"}}>{["","Easy","Med","Hard"][q.diff||1]}</span>{qStat&&<span style={{fontSize:9,color:"#444",marginLeft:"auto"}}>×{qStat.seen}</span>}</div>
      <div style={{maxWidth:640,margin:"0 auto",padding:"0 14px 12px"}}><h2 style={{fontSize:17,fontWeight:700,color:"#fff",lineHeight:1.5,margin:0}}>{q.q}</h2></div>
      <div style={{maxWidth:640,margin:"0 auto",padding:"0 14px",display:"flex",flexDirection:"column",gap:7}}>{q.options.map((opt,i)=>{let bg="rgba(255,255,255,.04)",bc="rgba(255,255,255,.1)",op=1;if(showResult){if(i===q.answer){bg="rgba(74,222,128,.12)";bc="#4ade80";}else if(i===selected&&i!==q.answer){bg="rgba(248,113,113,.12)";bc="#f87171";}else op=0.4;}return<button key={`${qIndex}-${i}`} style={{display:"flex",alignItems:"flex-start",gap:9,padding:"11px 12px",background:bg,border:`1.5px solid ${bc}`,borderRadius:9,textAlign:"left",opacity:op}} onClick={()=>!showResult&&handleAnswer(i)} disabled={showResult}><span style={{width:22,height:22,borderRadius:5,background:"rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#888",flexShrink:0}}>{String.fromCharCode(65+i)}</span><span style={{fontSize:12,lineHeight:1.5}}>{opt}</span></button>;})}</div>
      {showResult&&<div style={{maxWidth:640,margin:"12px auto 0",padding:"0 14px 24px",animation:"sU .3s"}}>
        <div style={{marginBottom:6}}>{selected===q.answer?<span style={{fontSize:14,fontWeight:700,color:"#4ade80"}}>✅ Correct!</span>:<span style={{fontSize:14,fontWeight:700,color:"#f87171"}}>❌ {timeLeft===0&&selected===-1?"Time's up!":"Incorrect"}</span>}</div>
        <p style={{fontSize:11,color:"#aaa",lineHeight:1.7,margin:"0 0 8px"}}>{q.explain}</p>
        {q.mnemonic&&<><button onClick={()=>setShowMnemonic(!showMnemonic)} style={{background:"rgba(255,200,50,.1)",border:"1px solid rgba(255,200,50,.25)",color:"#ffc832",padding:"5px 12px",borderRadius:7,fontSize:10,fontWeight:600,marginBottom:6,display:"block"}}>{showMnemonic?"Hide":"Show"} Memory Trick</button>{showMnemonic&&<div style={{padding:"8px 12px",background:"rgba(255,200,50,.08)",borderRadius:7,borderLeft:"3px solid #ffc832",fontSize:12,color:"#ffd866",marginBottom:8,lineHeight:1.5,fontWeight:600,animation:"pI .25s"}}>{q.mnemonic}</div>}</>}
        <button onClick={nextQuestion} style={st.startBtn}>{qIndex+1>=questions.length?"See Results →":"Next →"}</button>
      </div>}
    </div>);
  }

  // ═══ RESULTS ═══
  if(screen==="results"){
    const pct=sessionTotal>0?Math.round(sessionCorrect/sessionTotal*100):0;const grade=pct>=90?"S":pct>=80?"A":pct>=70?"B":pct>=60?"C":"D";const gc={S:"#ffd700",A:"#4ade80",B:"#60a5fa",C:"#fb923c",D:"#f87171"}[grade];const gl={S:"OUTSTANDING",A:"EXCELLENT",B:"GOOD",C:"NEEDS WORK",D:"KEEP STUDYING"}[grade];
    return(<div style={st.ctr}><SaveBadge/>
      <div style={{...st.inn,textAlign:"center"}}>
        <h2 style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:16}}>{GAME_MODES[gameMode]?.icon} {GAME_MODES[gameMode]?.name} Complete!</h2>
        <div style={{width:100,height:100,borderRadius:"50%",border:`4px solid ${gc}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",margin:"0 auto 18px",animation:"gI .6s"}}><span style={{fontSize:36,fontWeight:900,color:gc}}>{grade}</span><span style={{fontSize:7,letterSpacing:2,color:"#888",textTransform:"uppercase",fontWeight:600}}>{gl}</span></div>
        <div style={{display:"flex",justifyContent:"center",gap:20,marginBottom:20,flexWrap:"wrap",animation:"fI .5s .3s both"}}>{[{n:`${sessionCorrect}/${sessionTotal}`,l:"Correct"},{n:`${pct}%`,l:"Accuracy"},{n:`+${sessionScore}`,l:"XP"}].map((x,i)=><div key={i}><span style={{fontSize:20,fontWeight:800,color:"#fff",display:"block"}}>{x.n}</span><span style={{fontSize:9,color:"#666",textTransform:"uppercase",letterSpacing:1}}>{x.l}</span></div>)}</div>
        {wrongAnswers.length>0&&<div style={{textAlign:"left",marginBottom:16,animation:"fI .5s .5s both"}}><h3 style={{fontSize:14,fontWeight:700,color:"#fff",marginBottom:8}}>📝 Review ({wrongAnswers.length})</h3>{wrongAnswers.map((q,i)=><div key={i} style={{padding:10,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.06)",borderRadius:9,marginBottom:6}}><div style={{fontSize:11,color:"#ccc",marginBottom:4,lineHeight:1.5}}>{q.q}</div><div style={{fontSize:11,color:"#4ade80",fontWeight:600}}>✅ {q.options[q.answer]}</div>{q.mnemonic&&<div style={{fontSize:10,color:"#ffd866",marginTop:4,padding:"4px 7px",background:"rgba(255,200,50,.06)",borderRadius:5,lineHeight:1.4}}>{q.mnemonic}</div>}</div>)}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"center"}}><button style={{...st.startBtn,width:"auto",padding:"12px 20px"}} onClick={()=>startGame(gameMode,selectedCats)}>Play Again</button><button onClick={()=>setScreen("home")} style={{padding:"12px 20px",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,fontSize:13,fontWeight:700,color:"#aaa"}}>Home</button></div>
      </div>
    </div>);
  }
  return null;
}

// ═══════════════════════════════════════════
// APP WRAPPER
// ═══════════════════════════════════════════
function App() {
  const [auth, setAuth] = useState(null); // {pin, data}
  if (!auth) return <PinScreen onLogin={(pin, data) => setAuth({pin, data})} />;
  return <Game pin={auth.pin} initialData={auth.data} />;
}

// ═══════════════════════════════════════════
// STYLES
// ═══════════════════════════════════════════
const st={
  ctr:{minHeight:"100vh",background:"#0f0f14",color:"#e8e6e3",fontFamily:"inherit",overflowX:"hidden"},
  inn:{maxWidth:640,margin:"0 auto",padding:"24px 16px"},
  ttl:{fontSize:32,fontWeight:900,color:"#fff",margin:0,letterSpacing:4},
  acc:{background:"linear-gradient(135deg,#667eea,#764ba2)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"},
  sBar:{display:"flex",alignItems:"center",justifyContent:"center",gap:12,padding:"12px 14px",background:"rgba(255,255,255,.04)",borderRadius:11,border:"1px solid rgba(255,255,255,.06)",marginBottom:14,flexWrap:"wrap"},
  si:{display:"flex",flexDirection:"column",alignItems:"center",gap:2},sv:{fontSize:13,fontWeight:700,color:"#fff"},sl:{fontSize:8,color:"#666",textTransform:"uppercase",letterSpacing:1},
  dv:{width:1,height:26,background:"rgba(255,255,255,.08)"},
  sh:{display:"flex",alignItems:"center",gap:8,marginBottom:12},sln:{flex:1,height:1,background:"rgba(255,255,255,.08)"},stt:{fontSize:9,color:"#555",letterSpacing:3,fontWeight:600},
  mc:{display:"flex",alignItems:"center",gap:10,padding:"13px 14px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.08)",borderRadius:10,textAlign:"left"},
  startBtn:{display:"block",width:"100%",padding:13,marginTop:12,background:"linear-gradient(135deg,#667eea,#764ba2)",color:"#fff",borderRadius:10,fontSize:14,fontWeight:700,letterSpacing:1},
  bk:{color:"#888",fontSize:12,padding:"3px 0",marginBottom:10},
};

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
